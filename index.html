<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - QR FIX</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Excel & Zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0d1117; color: #c9d1d9; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .active-tab { background: #0891b2; color: white; }
        .active-mode-islam { background: #15803d; color: white; }
        .active-mode-kristen { background: #1d4ed8; color: white; }
        #reader { border: none !important; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-10">

<!-- Firebase Config -->
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center hidden">
    <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="fixed inset-0 bg-black/95 z-[999] flex items-center justify-center p-4">
    <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center">
        <h2 class="text-2xl font-bold text-white mb-2">LOGIN GURU</h2>
        <input type="password" id="password" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl text-white text-center mb-4">
        <button onclick="login()" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl">MASUK</button>
    </div>
</div>

<!-- Header -->
<header class="py-8 text-center relative">
    <h1 class="text-4xl font-extrabold bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">DZUHUR 12</h1>
    <p class="text-[9px] text-cyan-500 uppercase tracking-[0.3em]">QR SUPER PARSER</p>
    <button id="btnLogout" onclick="logout()" class="hidden absolute top-4 right-4 bg-red-900/30 text-red-500 px-3 py-1.5 rounded-xl text-[8px]">KELUAR</button>
</header>

<!-- Tab Nav -->
<div class="flex justify-center mb-8 px-4">
    <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
        <button onclick="switchTab('admin')" id="btnAdmin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs">ADMIN</button>
        <button onclick="switchTab('scan')" id="btnScan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-400 text-xs">SCAN</button>
    </div>
</div>

<main class="max-w-2xl mx-auto px-4">
    <!-- ADMIN TAB -->
    <section id="tabAdmin" class="space-y-6">
        <div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-sm font-black mb-6 text-white uppercase">Tambah Siswa</h2>
            <div class="grid gap-4">
                <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-white">
                <div class="flex gap-4">
                    <select id="kelas" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl text-white"></select>
                    <input type="number" id="absen" placeholder="No. Absen" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl text-white">
                </div>
                <div class="flex gap-4">
                    <select id="jk" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl text-white">
                        <option value="L">LAKI</option>
                        <option value="P">PEREMPUAN</option>
                    </select>
                    <select id="agama" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl text-white">
                        <option value="Islam">ISLAM</option>
                        <option value="Kristen">KRISTEN</option>
                    </select>
                </div>
                <button onclick="buatQR()" class="bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase">BUAT QR</button>
            </div>
        </div>
        <div id="qrArea" class="flex flex-col items-center"></div>
    </section>

    <!-- SCAN TAB -->
    <section id="tabScan" class="hidden space-y-6">
        <!-- Mode -->
        <div class="glass p-2 rounded-[2rem] flex gap-2">
            <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase border border-gray-800 active-mode-islam">☪️ ISLAM</button>
            <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase border border-gray-800">✝️ KRISTEN</button>
        </div>

        <!-- Kamera -->
        <div class="flex gap-3">
            <button onclick="startCam()" id="btnStart" class="flex-1 py-5 bg-cyan-600 text-white font-black rounded-[2rem] text-[10px] uppercase">AKTIFKAN KAMERA</button>
            <button onclick="stopCam()" id="btnStop" class="hidden flex-1 py-5 bg-red-600 text-white font-black rounded-[2rem] text-[10px] uppercase">MATIKAN</button>
        </div>

        <!-- Scanner -->
        <div class="glass p-5 rounded-[3rem] relative min-h-[300px]">
            <div id="reader"></div>
            <div id="feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden">
                <div id="fbBox" class="text-center text-white p-10 rounded-[3rem] shadow-2xl">
                    <div id="fbIcon" class="text-6xl mb-3"></div>
                    <p id="fbNama" class="text-2xl font-black uppercase mb-1"></p>
                    <p id="fbMsg" class="text-[10px] opacity-80 font-bold uppercase"></p>
                </div>
            </div>
        </div>

        <!-- Download -->
        <div class="glass p-6 rounded-[2.5rem]">
            <div class="flex justify-between text-xs mb-4 px-2">
                <span class="text-green-400 font-bold">🟢 ONLINE</span>
                <span class="text-cyan-400 font-bold" id="totalHadir">0 HADIR</span>
            </div>
            <button onclick="downloadLaporan()" class="w-full py-5 bg-green-700 text-white font-black rounded-2xl text-[10px] uppercase mb-4">📥 DOWNLOAD LAPORAN</button>
            <div id="logPresensi" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
        </div>
    </section>
</main>

<script>
    const PASSWORD = "bintang31";
    const KELAS_LIST = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    
    // Init
    window.onload = function() {
        const select = document.getElementById('kelas');
        KELAS_LIST.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
        
        if(localStorage.getItem('login') === 'true') {
            isLogin = true;
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            listenPresensi();
        }
    };
    
    // Login
    window.login = function() {
        if(document.getElementById('password').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    window.switchTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modalLogin').classList.remove('hidden');
            return;
        }
        document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tabScan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btnAdmin').classList.toggle('active-tab', tab === 'admin');
        document.getElementById('btnScan').classList.toggle('active-tab', tab === 'scan');
        if(tab !== 'scan') stopCam();
    };
    
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').classList.toggle('active-mode-islam', m === 'Islam');
        document.getElementById('modeKristen').classList.toggle('active-mode-kristen', m === 'Kristen');
    };
    
    // Listen realtime
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerText = entries.length + ' HADIR';
            
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<p class="text-center text-gray-600 py-10">Belum ada presensi</p>';
                return;
            }
            
            entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            let html = '';
            entries.slice(0,30).forEach(e => {
                html += `<div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2">
                    <div><b class="text-white uppercase text-xs">${e.nama}</b>
                    <div class="text-[8px] text-gray-500">${e.kelas} • ${e.status} • ${e.jam}</div></div>
                    <div class="bg-gray-900 px-3 py-1 rounded-lg text-cyan-400 font-black text-[10px]">#${e.totalHadir}</div>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    // ========== ADMIN ==========
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        
        if(!nama || !absen) return alert("Lengkapi data!");
        
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas, absen, jk, agama,
            totalHadir: 0,
            terdaftar: Date.now()
        });
        
        const area = document.getElementById('qrArea');
        area.innerHTML = `<div id="qrCard" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
            <div id="qrImg" class="mb-4"></div>
            <b class="text-black uppercase text-xl">${nama}</b>
            <p class="text-gray-500 font-bold uppercase text-[9px]">${kelas} • ${jk} • ${agama} • ABSEN ${absen}</p>
        </div>`;
        
        new QRCode(document.getElementById("qrImg"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200, height: 200
        });
    };
    
    // ========== SCANNER ==========
    window.startCam = function() {
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => { scanner.pause(); prosesQR(text); },
            () => {}
        );
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    // ========== PROSES QR - SUPER PARSER ==========
    async function prosesQR(text) {
        try {
            console.log("📄 RAW QR:", text);
            
            // Bersihin teks dari karakter aneh
            let cleanText = text.replace(/[–—|\[\]{}]/g, '-').trim();
            cleanText = cleanText.replace(/\s+/g, ' ').trim();
            
            console.log("🧹 CLEAN:", cleanText);
            
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            // ========== FORMAT 1: Ada newline (format foto) ==========
            if(text.includes('\n')) {
                const lines = text.split('\n').filter(l => l.trim() !== '');
                console.log("📄 LINES:", lines);
                
                if(lines.length >= 1) nama = lines[0].trim();
                if(lines.length >= 2) {
                    const line2 = lines[1].replace(/[–—]/g, '-');
                    const parts = line2.split('-').map(p => p.trim());
                    
                    for(let p of parts) {
                        if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                        if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                        if(p === 'L' || p === 'P') jk = p;
                        if(p.includes('Islam')) agama = 'Islam';
                        if(p.includes('Kristen')) agama = 'Kristen';
                    }
                }
            }
            
            // ========== FORMAT 2: Pipe separator ==========
            if(!kelas && text.includes('|')) {
                const parts = text.split('|');
                if(parts.length >= 1) nama = parts[0];
                for(let p of parts) {
                    if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                    if(p.match(/^[0-9]+$/)) absen = p;
                    if(p === 'L' || p === 'P') jk = p;
                }
                if(text.includes('Islam')) agama = 'Islam';
                if(text.includes('Kristen')) agama = 'Kristen';
            }
            
            // ========== FORMAT 3: Parse manual ==========
            if(!kelas) {
                // Cari pola X-1, XI-2, XII-3
                const kelasMatch = cleanText.match(/X[I]*-[0-9]+/);
                if(kelasMatch) kelas = kelasMatch[0];
                
                // Cari angka (absen)
                const absenMatch = cleanText.match(/\b[0-9]+\b/);
                if(absenMatch) absen = absenMatch[0];
                
                // Ambil 3 kata pertama sebagai nama
                const words = cleanText.split(' ');
                nama = words.slice(0, 3).join(' ');
            }
            
            // Fallback
            if(!nama) nama = "SISWA";
            if(!kelas) kelas = "X-1";
            if(!absen) absen = "1";
            
            console.log("✅ HASIL:", {nama, kelas, absen, jk, agama});
            
            // Validasi mode
            if(agama !== mode) throw `Mode harus ${mode}`;
            
            // Ambil atau buat data siswa
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const snap = await siswaRef.once('value');
            let totalHadir = snap.exists() ? (snap.val().totalHadir || 0) : 0;
            totalHadir++;
            
            await siswaRef.set({
                nama, kelas, absen, jk, agama,
                totalHadir,
                lastUpdate: Date.now()
            });
            
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await db.ref('presensi/' + today + '/' + kelas + '_' + absen).set({
                nama, kelas, absen, jk, agama, jam, status,
                totalHadir,
                timestamp: Date.now()
            });
            
            feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-green-600');
            
        } catch(e) {
            console.error("❌ ERROR:", e);
            feedback('❌', 'GAGAL', e, 'bg-red-700');
        }
        setTimeout(() => scanner?.resume(), 2000);
    }
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== DOWNLOAD LAPORAN ==========
    window.downloadLaporan = async function() {
        document.getElementById('loading').classList.remove('hidden');
        
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        
        // 1. PRESENSI HARIAN (per kelas)
        const presensiSnap = await db.ref('presensi/' + today).once('value');
        const presensi = presensiSnap.val() || {};
        
        // Kelompokkan per kelas
        const perKelas = {};
        Object.values(presensi).forEach(p => {
            if(!perKelas[p.kelas]) perKelas[p.kelas] = [];
            perKelas[p.kelas].push(p);
        });
        
        for(let kelas in perKelas) {
            const siswa = perKelas[kelas].sort((a,b) => parseInt(a.absen) - parseInt(b.absen));
            const rows = [['NO', 'NAMA', 'KETERANGAN', 'JAM']];
            siswa.forEach(s => {
                rows.push([s.absen, s.nama, s.status, s.jam]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Presensi');
            zip.file(`PRESENSI_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        
        // 2. REKAP SISWA
        const siswaSnap = await db.ref('siswa').once('value');
        const semuaSiswa = siswaSnap.val() || {};
        const rekapRows = [['KELAS', 'NO ABSEN', 'NAMA', 'JK', 'AGAMA', 'TOTAL HADIR']];
        
        const semuaData = [];
        for(let kelas in semuaSiswa) {
            for(let absen in semuaSiswa[kelas]) {
                semuaData.push({
                    kelas,
                    absen: parseInt(absen),
                    ...semuaSiswa[kelas][absen]
                });
            }
        }
        
        semuaData.sort((a,b) => {
            if(a.kelas !== b.kelas) return a.kelas.localeCompare(b.kelas);
            return a.absen - b.absen;
        });
        
        semuaData.forEach(s => {
            rekapRows.push([s.kelas, s.absen, s.nama, s.jk, s.agama, s.totalHadir || 0]);
        });
        
        const wsRekap = XLSX.utils.aoa_to_sheet(rekapRows);
        const wbRekap = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wbRekap, wsRekap, 'Rekap');
        zip.file(`REKAP_SISWA.xlsx`, XLSX.write(wbRekap, { type: 'array' }));
        
        // Download
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `LAPORAN_DZUHUR_${today}.zip`;
        link.click();
        
        document.getElementById('loading').classList.add('hidden');
    };
</script>

<!-- Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>

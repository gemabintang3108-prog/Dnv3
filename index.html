<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Absensi Pro - Fast Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { background: #0891b2; color: white; box-shadow: 0 0 20px rgba(8, 145, 178, 0.4); }
        /* Style Scanner agar lebih bersih */
        #reader { border: none !important; border-radius: 20px; overflow: hidden; }
        video { border-radius: 20px; }
        #reader__dashboard_section_csr button { display: none; } /* Sembunyikan tombol bawaan */
    </style>
</head>
<body class="pb-10">

    <header class="py-6 text-center">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">
            QR-FAST SCANNER
        </h1>
    </header>

    <div class="flex justify-center mb-6 px-4">
        <div class="glass p-1.5 rounded-2xl flex gap-2">
            <button onclick="switchTab('scan')" id="btn-scan" class="py-3 px-6 rounded-xl font-bold transition-all active-tab">📷 MULAI SCAN</button>
            <button onclick="switchTab('admin')" id="btn-admin" class="py-3 px-6 rounded-xl font-bold transition-all text-gray-400">⚙️ DATA MURID</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4">
        
        <section id="tab-scan" class="space-y-4">
            <div class="glass p-4 rounded-[2rem] border-2 border-cyan-500/30 relative">
                <div id="reader" class="w-full mx-auto shadow-2xl"></div>
                <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center bg-green-500/80 rounded-[2rem] hidden transition-opacity duration-300">
                    <div class="text-center text-white">
                        <span class="text-5xl">✅</span>
                        <p id="scanned-name" class="text-2xl font-black mt-2 uppercase"></p>
                    </div>
                </div>
            </div>
            
            <div class="glass p-6 rounded-[2rem]">
                <h3 class="font-bold text-cyan-400 mb-4 flex items-center gap-2">🕒 Riwayat Scan Terbaru</h3>
                <div id="log-absen" class="space-y-2 max-h-60 overflow-y-auto"></div>
            </div>
        </section>

        <section id="tab-admin" class="hidden space-y-6 text-slate-900">
            <div class="glass p-8 rounded-[2rem] text-white border border-white/10">
                <h2 class="text-xl font-bold mb-4">Input Data Baru</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="input-nama" placeholder="Nama Murid" class="p-4 rounded-xl bg-slate-800 border border-slate-600 outline-none focus:border-cyan-500">
                    <input type="text" id="input-nis" placeholder="NIS / No. Absen" class="p-4 rounded-xl bg-slate-800 border border-slate-600 outline-none focus:border-cyan-500">
                </div>
                <button onclick="simpanMurid()" class="w-full mt-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl transition">BUAT BARCODE</button>
            </div>

            <div id="list-qr-murid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <script>
        let dataMurid = JSON.parse(localStorage.getItem('murid_db')) || [];
        let riwayatAbsen = JSON.parse(localStorage.getItem('absen_log')) || [];
        let html5QrScanner;

        // --- LOGIKA SCAN (OTOMATIS) ---
        function startScanner() {
            html5QrScanner = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 250 } };
            
            html5QrScanner.start({ facingMode: "environment" }, config, (decodedText) => {
                const murid = dataMurid.find(m => m.nis === decodedText);
                const nama = murid ? murid.nama : "Tamu (" + decodedText + ")";
                
                // Efek visual sukses
                const feedback = document.getElementById('scan-feedback');
                document.getElementById('scanned-name').innerText = nama;
                feedback.classList.remove('hidden');

                // Simpan Data
                riwayatAbsen.push({ nama, waktu: new Date().toLocaleTimeString('id-ID') });
                localStorage.setItem('absen_log', JSON.stringify(riwayatAbsen));
                renderAbsen();

                // Matikan sebentar lalu nyalakan lagi otomatis
                setTimeout(() => {
                    feedback.classList.add('hidden');
                }, 1500);
            });
        }

        // --- LOGIKA DOWNLOAD (ANTI REPOT) ---
        function downloadKartu(id, nama) {
            const node = document.getElementById(id);
            html2canvas(node, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `QR_${nama}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // --- SISTEM TAB ---
        function switchTab(tab) {
            document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
            document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
            
            if (tab === 'scan') {
                startScanner();
            } else {
                if(html5QrScanner) html5QrScanner.stop();
                renderMurid();
            }
        }

        function simpanMurid() {
            const nama = document.getElementById('input-nama').value;
            const nis = document.getElementById('input-nis').value;
            if(!nama || !nis) return alert("Isi dulu!");
            dataMurid.push({ nama, nis });
            localStorage.setItem('murid_db', JSON.stringify(dataMurid));
            renderMurid();
            document.getElementById('input-nama').value = "";
            document.getElementById('input-nis').value = "";
        }

        function renderMurid() {
            const container = document.getElementById('list-qr-murid');
            container.innerHTML = "";
            dataMurid.forEach((m, i) => {
                const cardId = `kartu-${i}`;
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-3xl flex flex-col items-center gap-2";
                div.innerHTML = `
                    <div id="${cardId}" class="p-4 bg-white text-center border-2 border-slate-100 rounded-2xl">
                        <div id="qr-img-${i}" class="mb-2"></div>
                        <p class="font-black text-slate-800 uppercase text-sm">${m.nama}</p>
                        <p class="text-xs text-slate-400 font-bold">${m.nis}</p>
                    </div>
                    <div class="flex gap-2 w-full">
                        <button onclick="downloadKartu('${cardId}', '${m.nama}')" class="flex-1 bg-green-500 text-white py-2 rounded-xl text-xs font-bold italic">💾 UNDUH</button>
                        <button onclick="hapusMurid(${i})" class="bg-red-100 text-red-500 px-3 rounded-xl text-xs">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-img-${i}`), { text: m.nis, width: 140, height: 140 });
            });
        }

        function renderAbsen() {
            const list = document.getElementById('log-absen');
            list.innerHTML = riwayatAbsen.slice().reverse().map(a => `
                <div class="flex justify-between p-3 glass rounded-xl border-l-4 border-cyan-400">
                    <span class="font-bold text-sm">${a.nama}</span>
                    <span class="text-xs text-cyan-400 font-mono">${a.waktu}</span>
                </div>
            `).join('');
        }

        function hapusMurid(i) { dataMurid.splice(i, 1); localStorage.setItem('murid_db', JSON.stringify(dataMurid)); renderMurid(); }

        // Start scanner on load
        window.onload = () => {
            startScanner();
            renderAbsen();
        };
    </script>
</body>
</html>

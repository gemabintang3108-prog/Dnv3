<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DZUHUR 12 | Admin Panel</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
        }
        
        /* Card Style */
        .card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 24px;
            transition: all 0.2s ease;
        }
        
        .card:hover {
            border-color: #333333;
        }
        
        /* Input Style */
        input, select {
            background: #0d0d0d;
            border: 1px solid #222222;
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.1);
        }
        
        /* Button Style */
        .btn-primary {
            background: #06b6d4;
            border-radius: 16px;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #0891b2;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #1f2937;
            border-radius: 16px;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #374151;
        }
        
        /* Tab Active */
        .tab-active {
            background: #06b6d4;
            color: white;
        }
        
        .tab-inactive {
            background: #1f2937;
            color: #9ca3af;
        }
        
        .tab-inactive:hover {
            background: #374151;
            color: white;
        }
        
        /* Mode Active */
        .mode-islam-active {
            background: #059669;
            color: white;
        }
        
        .mode-kristen-active {
            background: #2563eb;
            color: white;
        }
        
        .mode-inactive {
            background: #1f2937;
            color: #9ca3af;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }
        
        /* QR Reader */
        #reader {
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 20px;
        }
        
        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-8">

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center hidden">
    <div class="loading-spinner"></div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="fixed inset-0 bg-black/95 z-[999] flex items-center justify-center p-4">
    <div class="card w-full max-w-sm p-8 text-center">
        <div class="text-5xl mb-3">🔐</div>
        <h2 class="text-2xl font-bold mb-1">LOGIN GURU</h2>
        <p class="text-xs text-gray-500 mb-6">Akses panel administrator</p>
        <input type="password" id="password" placeholder="Password" class="w-full mb-4">
        <button onclick="login()" class="btn-primary w-full">MASUK</button>
    </div>
</div>

<!-- Header -->
<div class="max-w-3xl mx-auto px-4 pt-6 pb-4">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">DZUHUR<span class="text-cyan-500">12</span></h1>
            <p class="text-[10px] text-gray-600 tracking-wider mt-0.5">ATTENDANCE SYSTEM</p>
        </div>
        <button id="btnLogout" onclick="logout()" class="hidden px-4 py-2 bg-red-500/10 text-red-400 rounded-xl text-xs font-medium hover:bg-red-500/20 transition">KELUAR</button>
    </div>
</div>

<!-- Tab Navigation -->
<div class="max-w-3xl mx-auto px-4 mb-6">
    <div class="flex gap-2 p-1 bg-[#111111] rounded-2xl border border-[#222222]">
        <button onclick="switchTab('admin')" id="btnAdmin" class="flex-1 py-3 rounded-xl font-semibold text-sm tab-active transition">📝 ADMIN</button>
        <button onclick="switchTab('scan')" id="btnScan" class="flex-1 py-3 rounded-xl font-semibold text-sm tab-inactive transition">📷 SCAN</button>
    </div>
</div>

<main class="max-w-3xl mx-auto px-4">
    <!-- ADMIN TAB -->
    <section id="tabAdmin" class="space-y-5">
        <div class="card p-6">
            <h2 class="text-sm font-bold mb-5 text-gray-300">TAMBAH SISWA</h2>
            <div class="space-y-3">
                <input type="text" id="nama" placeholder="Nama lengkap" class="w-full">
                <div class="flex gap-3">
                    <select id="kelas" class="flex-1"></select>
                    <input type="number" id="absen" placeholder="No. absen" class="w-24 text-center">
                </div>
                <div class="flex gap-3">
                    <select id="jk" class="flex-1">
                        <option value="L">LAKI-LAKI</option>
                        <option value="P">PEREMPUAN</option>
                    </select>
                    <select id="agama" class="flex-1">
                        <option value="Islam">ISLAM</option>
                        <option value="Kristen">KRISTEN</option>
                    </select>
                </div>
                <button onclick="buatQR()" class="btn-primary w-full">BUAT QR CODE</button>
            </div>
        </div>
        <div id="qrArea" class="flex flex-col items-center"></div>
    </section>

    <!-- SCAN TAB -->
    <section id="tabScan" class="hidden space-y-5">
        <!-- Mode Toggle -->
        <div class="card p-1.5 flex gap-2">
            <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-3 rounded-xl font-bold text-xs mode-islam-active transition">☪ ISLAM</button>
            <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-3 rounded-xl font-bold text-xs mode-inactive transition">✝ KRISTEN</button>
        </div>

        <!-- Camera Control -->
        <div class="flex gap-3">
            <button onclick="startCam()" id="btnStart" class="btn-primary flex-1">AKTIFKAN KAMERA</button>
            <button onclick="stopCam()" id="btnStop" class="hidden btn-secondary flex-1 bg-red-600/20 text-red-400 hover:bg-red-600/30">MATIKAN</button>
        </div>

        <!-- Scanner -->
        <div class="card p-4 relative min-h-[320px]">
            <div id="reader"></div>
            <div id="feedback" class="absolute inset-0 flex items-center justify-center rounded-2xl hidden bg-black/80 backdrop-blur-sm">
                <div id="fbBox" class="text-center p-8 rounded-2xl">
                    <div id="fbIcon" class="text-5xl mb-2"></div>
                    <p id="fbNama" class="text-xl font-bold mb-1"></p>
                    <p id="fbMsg" class="text-xs opacity-80"></p>
                </div>
            </div>
        </div>

        <!-- Download Section -->
        <div class="card p-5">
            <div class="flex justify-between items-center mb-4 px-1">
                <span class="text-xs text-green-400 font-medium">● ONLINE</span>
                <span class="text-xs font-bold text-cyan-400" id="totalHadir">0 HADIR</span>
            </div>
            <div class="grid grid-cols-3 gap-2 mb-5">
                <button onclick="downloadHarian()" class="py-3 bg-blue-600 rounded-xl text-[11px] font-bold uppercase">HARIAN</button>
                <button onclick="downloadRekap()" class="py-3 bg-purple-600 rounded-xl text-[11px] font-bold uppercase">REKAP</button>
                <button onclick="cekDataSiswa()" class="py-3 bg-gray-700 rounded-xl text-[11px] font-bold uppercase">DEBUG</button>
            </div>
            <div id="logPresensi" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
        </div>
    </section>
</main>

<script>
    // Proteksi dasar
    (function() {
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if(e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
                e.preventDefault();
                return false;
            }
        });
    })();

    // Config
    const PASSWORD = "bintang31";
    const KELAS_LIST = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    let scanning = false;
    
    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Init
    window.onload = () => {
        const select = document.getElementById('kelas');
        KELAS_LIST.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
        if(localStorage.getItem('login') === 'true') {
            isLogin = true;
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            listenPresensi();
        }
    };
    
    window.login = () => {
        if(document.getElementById('password').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
        } else alert('Password salah!');
    };
    
    window.logout = () => {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    window.switchTab = (tab) => {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modalLogin').classList.remove('hidden');
            return;
        }
        document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tabScan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btnAdmin').className = `flex-1 py-3 rounded-xl font-semibold text-sm ${tab === 'admin' ? 'tab-active' : 'tab-inactive'} transition`;
        document.getElementById('btnScan').className = `flex-1 py-3 rounded-xl font-semibold text-sm ${tab === 'scan' ? 'tab-active' : 'tab-inactive'} transition`;
        if(tab !== 'scan') stopCam();
    };
    
    window.setMode = (m) => {
        mode = m;
        document.getElementById('modeIslam').className = `flex-1 py-3 rounded-xl font-bold text-xs ${m === 'Islam' ? 'mode-islam-active' : 'mode-inactive'} transition`;
        document.getElementById('modeKristen').className = `flex-1 py-3 rounded-xl font-bold text-xs ${m === 'Kristen' ? 'mode-kristen-active' : 'mode-inactive'} transition`;
    };
    
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerText = entries.length + ' HADIR';
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<p class="text-center text-gray-600 py-10 text-sm">Belum ada presensi</p>';
                return;
            }
            entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            let html = '';
            entries.slice(0,30).forEach(e => {
                html += `<div class="bg-[#0d0d0d] p-3 rounded-xl border border-[#1a1a1a] flex justify-between items-center">
                    <div><b class="text-white text-sm">${e.nama}</b>
                    <div class="text-[10px] text-gray-500">${e.kelas} • ${e.status} • ${e.jam}</div></div>
                    <div class="bg-[#1a1a1a] px-3 py-1 rounded-lg text-cyan-400 font-bold text-xs">#${e.totalHadir}</div>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        if(!nama || !absen) return alert("Lengkapi data!");
        
        document.getElementById('loading').classList.remove('hidden');
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(), kelas, absen, jk, agama, totalHadir: 0, terdaftar: Date.now()
        });
        
        const area = document.getElementById('qrArea');
        area.innerHTML = `<div class="card p-6 flex flex-col items-center w-full">
            <div id="qrImg" class="mb-3 bg-white p-3 rounded-xl"></div>
            <b class="text-white text-lg">${nama}</b>
            <p class="text-gray-500 text-[10px] mt-1">${kelas} • ${jk} • ${agama} • NO ${absen}</p>
        </div>`;
        new QRCode(document.getElementById("qrImg"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 180, height: 180
        });
        document.getElementById('loading').classList.add('hidden');
    };
    
    window.startCam = function() {
        if(scanning) return;
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(scanning) return;
            scanning = true;
            scanner.pause();
            prosesQR(text);
        }, () => {});
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) scanner.stop();
        scanning = false;
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    async function prosesQR(text) {
        try {
            let cleanText = text.replace(/[–—|]/g, '-').trim().replace(/\s+/g, ' ');
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            if(text.includes('\n')) {
                const lines = text.split('\n').filter(l => l.trim());
                if(lines[0]) nama = lines[0].trim();
                if(lines[1]) {
                    const parts = lines[1].split('-').map(p => p.trim());
                    for(let p of parts) {
                        if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                        if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                        if(p === 'L' || p === 'P') jk = p;
                        if(p.includes('Islam')) agama = 'Islam';
                        if(p.includes('Kristen')) agama = 'Kristen';
                    }
                }
            }
            
            if(!kelas && cleanText.includes('-')) {
                const parts = cleanText.split('-').map(p => p.trim());
                for(let i = 0; i < parts.length; i++) {
                    if(parts[i].includes('X-') || parts[i].includes('XI-') || parts[i].includes('XII-')) {
                        kelas = parts[i];
                        nama = parts.slice(0, i).join(' ');
                        break;
                    }
                }
                for(let p of parts) {
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    else if(p.match(/^\d+$/) && !absen) absen = p;
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                }
            }
            
            if(!nama) nama = "SISWA";
            if(!kelas) kelas = "X-1";
            if(!absen) { const angka = cleanText.match(/\b(\d+)\b/); absen = angka ? angka[1] : "1"; }
            if(agama !== mode) throw `Mode harus ${mode}`;
            
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const presensiSnap = await db.ref('presensi/' + today + '/' + kelas + '_' + absen).once('value');
            if(presensiSnap.exists()) throw `Sudah absen jam ${presensiSnap.val().jam}`;
            
            const siswaSnap = await db.ref('siswa/' + kelas + '/' + absen).once('value');
            let totalHadir = 0;
            let dataSiswa = {};
            if(siswaSnap.exists()) {
                dataSiswa = siswaSnap.val();
                totalHadir = dataSiswa.totalHadir || 0;
                if(!dataSiswa.nama) dataSiswa.nama = nama;
                if(!dataSiswa.jk) dataSiswa.jk = jk;
                if(!dataSiswa.agama) dataSiswa.agama = agama;
            } else {
                dataSiswa = { nama, kelas, absen, jk, agama, totalHadir: 0 };
            }
            totalHadir++;
            dataSiswa.totalHadir = totalHadir;
            await db.ref('siswa/' + kelas + '/' + absen).set(dataSiswa);
            
            const jam = new Date().toLocaleTimeString('id-ID');
            await db.ref('presensi/' + today + '/' + kelas + '_' + absen).set({
                nama: dataSiswa.nama, kelas, absen, jk, agama, jam,
                status: mode === 'Islam' ? 'DZUHUR' : 'IBADAH',
                totalHadir, timestamp: Date.now()
            });
            
            feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-green-600');
        } catch(e) {
            feedback('❌', 'GAGAL', e.toString(), 'bg-red-600');
        }
        setTimeout(() => { scanning = false; scanner?.resume(); }, 2000);
    }
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center p-8 rounded-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    window.downloadHarian = async function() {
        document.getElementById('loading').classList.remove('hidden');
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        const presensi = (await db.ref('presensi/' + today).once('value')).val() || {};
        const perKelas = {};
        Object.values(presensi).forEach(p => { if(!perKelas[p.kelas]) perKelas[p.kelas] = []; perKelas[p.kelas].push(p); });
        
        for(let kelas in perKelas) {
            const rows = [['NO', 'NAMA', 'KETERANGAN', 'JAM']];
            const hadir = {};
            perKelas[kelas].forEach(s => hadir[s.absen] = s);
            const semuaSiswa = (await db.ref('siswa/' + kelas).once('value')).val() || {};
            Object.keys(semuaSiswa).map(Number).sort((a,b)=>a-b).forEach(no => {
                if(hadir[no]) rows.push([no, hadir[no].nama, hadir[no].status, hadir[no].jam]);
                else if(semuaSiswa[no]) rows.push([no, semuaSiswa[no].nama, 'A', '-']);
            });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Presensi');
            zip.file(`PRESENSI_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        const link = document.createElement('a');
        link.href = URL.createObjectURL(await zip.generateAsync({ type: 'blob' }));
        link.download = `HARIAN_${today}.zip`;
        link.click();
        document.getElementById('loading').classList.add('hidden');
    };
    
    window.downloadRekap = async function() {
        document.getElementById('loading').classList.remove('hidden');
        const zip = new JSZip();
        const semuaSiswa = (await db.ref('siswa').once('value')).val() || {};
        for(let kelas in semuaSiswa) {
            const rows = [['NO', 'NAMA', 'JK', 'AGAMA', 'TOTAL HADIR']];
            Object.keys(semuaSiswa[kelas]).map(Number).sort((a,b)=>a-b).forEach(no => {
                const s = semuaSiswa[kelas][no];
                rows.push([no, s.nama || '-', s.jk === 'L' ? 'L' : 'P', s.agama || '-', s.totalHadir || 0]);
            });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Rekap');
            zip.file(`REKAP_${kelas}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        const link = document.createElement('a');
        link.href = URL.createObjectURL(await zip.generateAsync({ type: 'blob' }));
        link.download = `REKAP_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.zip`;
        link.click();
        document.getElementById('loading').classList.add('hidden');
    };
    
    window.cekDataSiswa = async function() {
        const snap = await db.ref('siswa').once('value');
        const data = snap.val();
        let pesan = "DATA SISWA:\n\n";
        if(!data) pesan = "TIDAK ADA DATA!";
        else for(let kelas in data) {
            pesan += `📚 ${kelas}:\n`;
            for(let absen in data[kelas]) {
                const s = data[kelas][absen];
                pesan += `   ${absen}. ${s.nama || '?'} | ${s.jk || '?'} | ${s.agama || '?'} | Hadir: ${s.totalHadir || 0}\n`;
            }
            pesan += "\n";
        }
        alert(pesan);
    };
</script>
</body>
</html>

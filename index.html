<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZUHUR 12 - FINAL FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">

<div id="loginModal" class="fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-2xl w-80">
        <h2 class="text-xl font-bold mb-4">LOGIN GURU</h2>
        <input type="password" id="password" class="w-full p-3 bg-gray-700 rounded mb-3" placeholder="bintang31">
        <button onclick="login()" class="w-full py-3 bg-cyan-600 rounded font-bold">MASUK</button>
    </div>
</div>

<div class="max-w-md mx-auto">
    <div class="text-center mb-4">
        <h1 class="text-3xl font-black">DZUHUR 12</h1>
        <p class="text-cyan-400">FINAL FIX - PASTI WORKING</p>
    </div>

    <!-- Kamera -->
    <div class="bg-gray-800 p-4 rounded-2xl mb-4">
        <div id="reader" class="w-full"></div>
        <button onclick="startKamera()" id="btnStart" class="w-full py-4 bg-cyan-600 rounded-xl font-bold mt-2">AKTIFKAN KAMERA</button>
        <button onclick="stopKamera()" id="btnStop" class="w-full py-4 bg-red-600 rounded-xl font-bold mt-2 hidden">MATIKAN</button>
    </div>

    <!-- Status -->
    <div class="text-center text-green-400 mb-4" id="status">🟢 Siap scan</div>

    <!-- Log -->
    <div class="bg-gray-800 p-4 rounded-2xl">
        <h3 class="font-bold mb-2">HASIL SCAN:</h3>
        <div id="log" class="text-sm"></div>
    </div>
</div>

<script>
// FIREBASE CONFIG - UDAH BENER
firebase.initializeApp({
    apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
    authDomain: "absen-dzuhur.firebaseapp.com",
    databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "absen-dzuhur",
    storageBucket: "absen-dzuhur.firebasestorage.app",
    messagingSenderId: "254784143918",
    appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
});

const db = firebase.database();
let scanner = null;

// LOGIN
function login() {
    if(document.getElementById('password').value === "bintang31") {
        document.getElementById('loginModal').classList.add('hidden');
        startKamera();
    } else {
        alert("Salah!");
    }
}

// KAMERA
function startKamera() {
    document.getElementById('btnStart').classList.add('hidden');
    document.getElementById('btnStop').classList.remove('hidden');
    
    scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            scanner.pause();
            prosesQR(text);
        },
        () => {}
    );
}

function stopKamera() {
    if(scanner?.isScanning) scanner.stop();
    document.getElementById('btnStart').classList.remove('hidden');
    document.getElementById('btnStop').classList.add('hidden');
}

// ========== PROSES QR - FOKUS KE FORMAT FOTO LU ==========
async function prosesQR(text) {
    try {
        console.log("QR MENTAH:", text);
        document.getElementById('status').innerText = "⏳ Memproses...";
        
        // FORMAT FOTO LU:
        // "ADAM ATRIA PUTRA\nX-1 - L - Islam - ABSEN 1"
        
        // Split per baris
        const lines = text.split('\n').filter(l => l.trim() !== '');
        console.log("BARIS:", lines);
        
        if(lines.length < 2) throw "QR harus 2 baris";
        
        // Baris 1 = NAMA
        const nama = lines[0].trim();
        
        // Baris 2 = "X-1 - L - Islam - ABSEN 1"
        let baris2 = lines[1];
        
        // Ganti semua varian strip jadi "-"
        baris2 = baris2.replace(/[–—]/g, '-');
        
        // Pisah berdasarkan "-"
        let parts = baris2.split('-').map(p => p.trim());
        console.log("PARTS:", parts);
        
        let kelas = "", jk = "L", agama = "Islam", absen = "";
        
        // Loop setiap part
        for(let p of parts) {
            if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) {
                kelas = p;
            }
            else if(p === 'L' || p === 'P') {
                jk = p;
            }
            else if(p.includes('Islam')) {
                agama = 'Islam';
            }
            else if(p.includes('Kristen')) {
                agama = 'Kristen';
            }
            else if(p.includes('ABSEN')) {
                absen = p.replace('ABSEN', '').trim();
            }
            // Kalo part berupa angka doang, itu absen
            else if(p.match(/^[0-9]+$/)) {
                absen = p;
            }
        }
        
        // Validasi
        if(!nama) throw "Nama tidak ditemukan";
        if(!kelas) throw "Kelas tidak ditemukan";
        if(!absen) throw "Nomor absen tidak ditemukan";
        
        console.log("HASIL:", {nama, kelas, absen, jk, agama});
        
        // Simpan ke Firebase
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const jam = new Date().toLocaleTimeString('id-ID');
        
        await db.ref('presensi/' + today + '/' + kelas + '_' + absen).set({
            nama: nama,
            kelas: kelas,
            absen: absen,
            jk: jk,
            agama: agama,
            jam: jam,
            timestamp: Date.now()
        });
        
        // Tampilkan sukses
        document.getElementById('log').innerHTML = `
            <div class="bg-green-700 p-3 rounded-lg">
                ✅ ${nama}<br>
                <small>${kelas} • ${jam}</small>
            </div>
        ` + document.getElementById('log').innerHTML;
        
        document.getElementById('status').innerText = "✅ Berhasil!";
        
    } catch(e) {
        console.error(e);
        document.getElementById('status').innerText = "❌ Error: " + e;
        document.getElementById('log').innerHTML = `
            <div class="bg-red-700 p-3 rounded-lg">
                ❌ GAGAL: ${e}<br>
                <small class="text-xs">${text.substring(0,50)}...</small>
            </div>
        ` + document.getElementById('log').innerHTML;
    }
    
    setTimeout(() => scanner.resume(), 2000);
}

// Listen realtime
db.ref('presensi/' + new Date().toLocaleDateString('id-ID').replace(/\//g, '-')).on('value', (snap) => {
    const data = snap.val();
    if(data) {
        document.getElementById('status').innerText = `🟢 Online • ${Object.keys(data).length} hadir`;
    }
});
</script>

</body>
</html>

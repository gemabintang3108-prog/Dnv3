<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - Smart Absen</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .active-tab { background: #0891b2; color: white; box-shadow: 0 0 20px rgba(8, 145, 178, 0.5); }
        #reader { border: none !important; border-radius: 1.5rem; overflow: hidden; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .log-item { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-10">

    <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center gap-4 transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-cyan-400 font-bold text-xs tracking-[0.3em] animate-pulse">SINKRONISASI DATABASE...</p>
    </div>

    <header class="py-8 text-center">
        <h1 class="text-4xl font-extrabold bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent italic uppercase tracking-tighter">Dzuhur 12</h1>
        <div class="inline-block mt-2 px-3 py-1 bg-cyan-950/30 border border-cyan-500/20 rounded-full">
            <p class="text-[9px] text-cyan-500 uppercase tracking-[0.2em] font-black">Smart Attendance System</p>
        </div>
    </header>

    <div class="flex justify-center mb-8 px-4">
        <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
            <button onclick="switchTab('admin')" id="btn-admin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs transition-all duration-300">🎫 KARTU</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-500 text-xs transition-all duration-300">📷 SCANNER</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[60] flex items-center justify-center hidden p-4">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] border border-cyan-500/30 text-center">
            <div class="w-16 h-16 bg-cyan-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-cyan-500/30">
                <span class="text-2xl">🔐</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 italic">GURU LOGIN</h2>
            <p class="text-[10px] text-gray-500 mb-8 uppercase tracking-widest">Akses Scanner & Laporan</p>
            <input type="password" id="login-pass" placeholder="••••••••" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-white focus:border-cyan-500 text-center text-xl mb-4 tracking-[0.5em]">
            <button onclick="prosesLogin()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95 text-sm uppercase">Buka Akses</button>
            <button onclick="document.getElementById('modal-login').classList.add('hidden')" class="mt-4 text-gray-500 text-[10px] uppercase font-bold tracking-widest hover:text-white transition">Batal</button>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4">
        <section id="tab-admin" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem] border border-white/5">
                <h2 class="text-sm font-black mb-6 text-white uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full shadow-[0_0_10px_cyan]"></span> Buat Kartu Baru
                </h2>
                <div class="grid gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] text-gray-500 ml-2 font-bold uppercase tracking-widest">Nama Lengkap Murid</label>
                        <input type="text" id="input-nama" placeholder="Contoh: Bintang Ramadhan" class="w-full bg-gray-900/50 border border-gray-800 p-4 rounded-2xl outline-none text-white focus:border-cyan-500/50 transition-all">
                    </div>
                    <div class="flex gap-4">
                        <div class="w-1/2 space-y-1">
                            <label class="text-[9px] text-gray-500 ml-2 font-bold uppercase tracking-widest">Pilih Kelas</label>
                            <select id="select-kelas-admin" class="w-full bg-gray-900/50 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm focus:border-cyan-500/50"></select>
                        </div>
                        <div class="w-1/2 space-y-1">
                            <label class="text-[9px] text-gray-500 ml-2 font-bold uppercase tracking-widest">No. Absen</label>
                            <input type="number" id="input-nis" placeholder="00" class="w-full bg-gray-900/50 border border-gray-800 p-4 rounded-2xl outline-none text-white focus:border-cyan-500/50 transition-all">
                        </div>
                    </div>
                    <button onclick="buatQR()" class="bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black shadow-xl transition-all active:scale-95 mt-4 text-xs uppercase tracking-widest">Generate Kartu QR</button>
                </div>
            </div>
            
            <div id="qr-result-area" class="flex flex-col items-center"></div>

            <div id="bulk-area-guru" class="hidden glass p-8 rounded-[2.5rem] border border-yellow-500/20">
                <h2 class="text-sm font-black mb-2 text-yellow-500 uppercase tracking-widest italic">🛠️ Bulk ZIP Generator</h2>
                <p class="text-[9px] text-gray-500 mb-6 font-medium leading-relaxed uppercase">Paste daftar nama & absen dari Excel. <br>Format: <span class="text-yellow-500/50">Nama Murid [Spasi] NoAbsen</span></p>
                <textarea id="bulk-input" rows="4" placeholder="Farras Kaysan 10&#10;Bintang 31" class="w-full bg-black/40 border border-gray-800 p-5 rounded-2xl text-xs text-white mb-4 outline-none focus:border-yellow-500/30"></textarea>
                <button onclick="prosesBulkQR()" id="btn-bulk" class="w-full py-4 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95 text-[10px] uppercase">🚀 Download ZIP <span id="label-bulk-kelas"></span></button>
            </div>
        </section>

        <section id="tab-scan" class="hidden space-y-6">
            <div class="flex gap-3">
                <button id="btn-start-cam" onclick="startScanner()" class="flex-1 py-5 bg-cyan-600 hover:bg-cyan-500 text-white font-black rounded-[2rem] shadow-xl text-[10px] uppercase tracking-widest transition-all active:scale-95">📷 Nyalakan Kamera</button>
                <button id="btn-stop-cam" onclick="stopScanner()" class="hidden flex-1 py-5 bg-red-600 hover:bg-red-500 text-white font-black rounded-[2rem] shadow-xl text-[10px] uppercase tracking-widest">🛑 Matikan</button>
            </div>

            <div class="glass p-5 rounded-[3rem] border-2 border-cyan-500/10 relative min-h-[280px] flex items-center justify-center overflow-hidden">
                <div id="reader" class="w-full mx-auto overflow-hidden rounded-[2rem]"></div>
                <div id="cam-placeholder" class="text-gray-700 text-center italic space-y-3">
                    <div class="text-6xl animate-pulse-slow">📷</div>
                    <p class="text-[9px] font-black uppercase tracking-[0.3em]">Scanner Ready</p>
                </div>
                
                <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden z-10">
                    <div id="feedback-content" class="text-center text-white p-8 rounded-[2.5rem] shadow-2xl scale-110">
                        <div id="check-icons" class="text-6xl mb-3"></div>
                        <p id="scanned-name" class="text-2xl font-black uppercase tracking-tighter leading-none mb-1"></p>
                        <p id="scanned-info" class="text-[10px] opacity-80 font-bold tracking-widest"></p>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem] border border-white/5">
                <div class="flex flex-col gap-3">
                    <button onclick="downloadZipLaporan()" id="btn-zip-laporan" class="w-full py-5 bg-gradient-to-r from-green-700 to-green-600 hover:from-green-600 hover:to-green-500 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 text-[10px] uppercase tracking-widest transition-all active:scale-95">
                        📦 Download Laporan Semua Kelas (ZIP)
                    </button>
                </div>
                
                <div class="mt-8 flex items-center justify-between px-2">
                    <h3 class="font-black text-gray-500 text-[10px] uppercase tracking-[0.3em]">Scan Terbaru (Hari Ini)</h3>
                    <div class="flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[8px] text-green-500 font-bold uppercase">Live Log</span>
                    </div>
                </div>
                
                <hr class="border-gray-800/50 my-4">
                <div id="log-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </section>
    </main>

    <div id="hidden-qr-engine" style="position: absolute; left: -9999px; top: 0;"></div>

    <script>
        const GURU_PASS = "bintang31"; 
        const GITHUB_TOKEN = "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"; 
        const GIST_ID_UTAMA = "8f37fc18c4fb9bd3593486f97919ca9f"; 
        const DAFTAR_KELAS = ["X-1", "X-2", "X-3", "X-4", "X-5", "X-6", "XI-1", "XI-2", "XI-3", "XI-4", "XI-5", "XI-6", "XII-1", "XII-2", "XII-3", "XII-4", "XII-5", "XII-6"];

        let isGuruLoggedIn = false;
        let localDB = {}; 
        let html5QrScanner;

        async function init() {
            const adminSelect = document.getElementById('select-kelas-admin');
            DAFTAR_KELAS.forEach(cls => { adminSelect.innerHTML += `<option value="${cls}">${cls}</option>`; });
            
            await loadAllData();
            
            // Sembunyikan loading overlay
            document.getElementById('loading-overlay').classList.add('opacity-0');
            setTimeout(() => { document.getElementById('loading-overlay').classList.add('hidden'); }, 500);

            setInterval(() => {
                const k = document.getElementById('select-kelas-admin').value;
                if(document.getElementById('label-bulk-kelas')) document.getElementById('label-bulk-kelas').innerText = `[${k}]`;
            }, 1000);
        }

        async function loadAllData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}?t=${new Date().getTime()}`);
                const data = await res.json();
                DAFTAR_KELAS.forEach(cls => {
                    const fileName = `${cls}.json`;
                    localDB[cls] = data.files[fileName] ? JSON.parse(data.files[fileName].content) : [];
                });
                renderLog();
            } catch (e) { console.error("Database Down!"); }
        }

        async function syncToGithub(kelas) {
            const fileName = `${kelas}.json`;
            await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(localDB[kelas], null, 2) } } })
            });
        }

        async function downloadZipLaporan() {
            const btn = document.getElementById('btn-zip-laporan');
            const originalText = btn.innerHTML;
            btn.innerText = "⏳ PROCESSING DATA...";
            btn.disabled = true;

            const zip = new JSZip();
            const today = new Date().toLocaleDateString('id-ID');
            let adaData = false;

            DAFTAR_KELAS.forEach(cls => {
                const dataRaw = localDB[cls].filter(d => d.Tanggal === today);
                if (dataRaw.length > 0) {
                    adaData = true;
                    // Format data biar rapi di Excel
                    const dataExcel = dataRaw.map(d => ({
                        "NO ABSEN": d.Absen,
                        "NAMA LENGKAP": d.Nama.toUpperCase(),
                        "JAM MASUK": d.Jam,
                        "SESI": parseInt(d.Jam.split(':')[0]) < 12 ? "PAGI" : "SIANG",
                        "KEHADIRAN KE-": d.KehadiranKe
                    }));

                    const ws = XLSX.utils.json_to_sheet(dataExcel);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "ABSENSI");
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    zip.file(`LAPORAN_${cls}_${today.replace(/\//g, '-')}.xlsx`, excelBuffer);
                }
            });

            if (!adaData) {
                alert("Kagak ada yang absen hari ini, Cok!");
            } else {
                const content = await zip.generateAsync({type:"blob"});
                const l = document.createElement('a');
                l.href = URL.createObjectURL(content);
                l.download = `ABSEN_DZUHUR_12_${today.replace(/\//g, '-')}.zip`;
                l.click();
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        function switchTab(tab) {
            if (tab === 'scan' && !isGuruLoggedIn) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            if (tab !== 'scan') stopScanner();
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
            document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
            document.getElementById('btn-admin').classList.toggle('text-gray-500', tab !== 'admin');
            document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
            document.getElementById('btn-scan').classList.toggle('text-gray-500', tab !== 'scan');
        }

        function prosesLogin() {
            if (document.getElementById('login-pass').value === GURU_PASS) {
                isGuruLoggedIn = true;
                document.getElementById('modal-login').classList.add('hidden');
                document.getElementById('bulk-area-guru').classList.remove('hidden');
                switchTab('scan');
            } else { 
                alert("Salah Password!"); 
                document.getElementById('login-pass').value = "";
            }
        }

        function startScanner() {
            document.getElementById('cam-placeholder').classList.add('hidden');
            document.getElementById('btn-start-cam').classList.add('hidden');
            document.getElementById('btn-stop-cam').classList.remove('hidden');
            if (html5QrScanner) {
                html5QrScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, async (text) => {
                    const [nama, kelas, absen] = text.split('|');
                    prosesAbsen(nama, kelas, absen);
                });
            } else { html5QrScanner = new Html5Qrcode("reader"); startScanner(); }
        }

        async function stopScanner() {
            if (html5QrScanner && html5QrScanner.isScanning) await html5QrScanner.stop();
            document.getElementById('cam-placeholder').classList.remove('hidden');
            document.getElementById('btn-start-cam').classList.remove('hidden');
            document.getElementById('btn-stop-cam').classList.add('hidden');
        }

        async function prosesAbsen(nama, kelas, absen) {
            if(!localDB[kelas]) return;
            const now = new Date();
            const today = now.toLocaleDateString('id-ID');
            const sesi = now.getHours() < 12 ? "PAGI" : "SIANG";

            const sudah = localDB[kelas].find(d => {
                const jam = parseInt(d.Jam.split(':')[0]);
                const sData = jam < 12 ? "PAGI" : "SIANG";
                return d.Nama === nama && d.Tanggal === today && sData === sesi;
            });
            if (sudah) return; 

            const count = localDB[kelas].filter(d => d.Nama === nama).length + 1;
            const payload = { Nama: nama, Kelas: kelas, Absen: absen, Jam: now.toLocaleTimeString('id-ID'), Tanggal: today, KehadiranKe: count };
            
            showFeedback("✨", nama, `${kelas} • ABSEN ${absen}`, "bg-cyan-600");
            localDB[kelas].push(payload);
            renderLog();
            syncToGithub(kelas);
        }

        function renderLog() {
            const list = document.getElementById('log-list');
            const today = new Date().toLocaleDateString('id-ID');
            let allLogs = [];
            DAFTAR_KELAS.forEach(cls => {
                localDB[cls].filter(d => d.Tanggal === today).forEach(d => allLogs.push(d));
            });
            
            allLogs.sort((a,b) => b.Jam.localeCompare(a.Jam)); 

            list.innerHTML = allLogs.length === 0 ? `<div class="py-20 text-center text-gray-700 italic text-[10px] tracking-widest uppercase">Database Kosong</div>` :
                allLogs.slice(0, 30).map(d => `<div class="log-item glass p-5 rounded-[1.5rem] flex justify-between items-center border-l-4 border-cyan-500 mb-3">
                    <div>
                        <div class="flex items-center gap-2">
                            <b class="text-white text-xs uppercase tracking-tight">${d.Nama}</b>
                            <span class="bg-cyan-950 text-cyan-400 text-[7px] px-2 py-0.5 rounded-full font-black border border-cyan-500/20">${d.Kelas}</span>
                        </div>
                        <div class="text-[9px] text-gray-500 mt-1 font-bold">ABSEN ${d.Absen} • <span class="text-gray-600">${d.Jam}</span></div>
                    </div>
                    <div class="bg-gray-900 px-4 py-2 rounded-xl text-cyan-400 font-black text-xs border border-gray-800">#${d.KehadiranKe}</div>
                </div>`).join('');
        }

        async function buatQR() {
            const n = document.getElementById('input-nama').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            const a = document.getElementById('input-nis').value.trim();
            if(!n || !a) return alert("Isi yang bener, Cok!");
            
            // Cek duplikat absen di kelas yang dipilih
            if (localDB[k].some(d => d.Absen === a)) return alert("Absen ini udah ada di database!");

            const area = document.getElementById('qr-result-area');
            area.innerHTML = `
            <div id="qrd" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
                <div id="qri" class="mb-4"></div>
                <b class="text-black uppercase text-xl tracking-tighter">${n}</b>
                <p class="text-gray-500 font-black text-[10px] tracking-[0.2em] uppercase">${k} • ABSEN ${a}</p>
            </div>
            <button onclick="downloadQR('${n}')" class="mt-4 bg-cyan-600 p-4 w-full max-w-[280px] rounded-2xl font-black italic shadow-xl text-xs uppercase tracking-widest text-white">💾 Download Kartu</button>`;
            
            new QRCode(document.getElementById("qri"), { 
                text: `${n}|${k}|${a}`, 
                width: 200, 
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function downloadQR(n) {
            html2canvas(document.getElementById('qrd'), {scale: 3, backgroundColor: null}).then(c => {
                let l=document.createElement('a'); l.href=c.toDataURL("image/png"); l.download=`QR_${n}.png`; l.click();
            });
        }

        async function prosesBulkQR() {
            const input = document.getElementById('bulk-input').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            if(!input) return alert("Paste dulu daftar namanya!");
            
            const btn = document.getElementById('btn-bulk');
            btn.disabled = true;
            btn.innerText = "⏳ PROCESSING...";
            
            const zip = new JSZip();
            const lines = input.split('\n');
            const engine = document.getElementById('hidden-qr-engine');

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].trim().split(' ');
                const abs = parts.pop(); 
                const nam = parts.join(' ');
                if(!nam || isNaN(abs)) continue;

                engine.innerHTML = `
                <div id="tmp-card" style="padding:40px; background:white; width:350px; text-align:center; font-family: 'Plus Jakarta Sans', sans-serif;">
                    <div id="tmp-img" style="display:flex; justify-content:center;"></div>
                    <div style="margin-top:25px;">
                        <b style="color:black; font-size:24px; text-transform:uppercase; letter-spacing:-1px;">${nam}</b>
                        <p style="color:#666; font-weight:900; font-size:12px; margin-top:5px; letter-spacing:2px;">${k} • ABSEN ${abs}</p>
                    </div>
                </div>`;

                new QRCode(document.getElementById("tmp-img"), { 
                    text: `${nam}|${k}|${abs}`, 
                    width: 250, 
                    height: 250,
                    correctLevel : QRCode.CorrectLevel.H 
                });
                
                await new Promise(r => setTimeout(r, 150));
                const canvas = await html2canvas(document.getElementById('tmp-card'), {scale: 2});
                zip.file(`${k}/QR_${abs}_${nam}.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
            }
            
            const content = await zip.generateAsync({type:"blob"});
            const l = document.createElement('a'); l.href = URL.createObjectURL(content); l.download = `QR_MASAL_${k}.zip`; l.click();
            
            btn.disabled = false;
            btn.innerText = `🚀 DOWNLOAD ZIP [${k}]`;
        }

        function showFeedback(i, n, f, b) {
            const fb = document.getElementById('scan-feedback');
            document.getElementById('check-icons').innerText = i;
            document.getElementById('scanned-name').innerText = n;
            document.getElementById('scanned-info').innerText = f;
            fb.classList.remove('hidden');
            document.getElementById('feedback-content').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${b} border border-white/20`;
            setTimeout(() => fb.classList.add('hidden'), 1500);
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - Absen Real-time</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: system-ui; }
        .glass { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        .active-tab { background: #0891b2; color: white; }
        .active-mode-islam { background: #15803d; color: white; }
        .active-mode-kristen { background: #1d4ed8; color: white; }
    </style>
</head>
<body class="p-4">

<!-- Firebase Config - PASTE PUNYA LU DI SINI -->
<script>
    const firebaseConfig = {
    apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
    authDomain: "absen-dzuhur.firebaseapp.com",
    databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "absen-dzuhur",
    storageBucket: "absen-dzuhur.firebasestorage.app",
    messagingSenderId: "254784143918",
    appId: "1:254784143918:web:5d9769d58fced6a0b015bf",
    measurementId: "G-KZS8SZ5GZE"
};
    
    // Init Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
</script>

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
    <div class="text-cyan-400 text-xl">Loading...</div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-40">
    <div class="glass p-6 w-80">
        <h2 class="text-xl font-bold mb-4 text-center">LOGIN GURU</h2>
        <input type="password" id="password" class="w-full p-3 bg-gray-800 rounded mb-3" placeholder="Password">
        <button onclick="login()" class="w-full py-3 bg-cyan-600 rounded font-bold mb-2">MASUK</button>
        <button onclick="tutupLogin()" class="w-full py-2 text-gray-400 text-sm">Batal</button>
    </div>
</div>

<!-- Header -->
<div class="text-center mb-6 relative">
    <h1 class="text-3xl font-black text-white">DZUHUR 12</h1>
    <p class="text-cyan-500 text-xs">ABSEN REAL-TIME</p>
    <button id="btnLogout" onclick="logout()" class="hidden absolute top-0 right-0 bg-red-900/30 text-red-500 px-3 py-1 text-xs rounded">KELUAR</button>
</div>

<!-- Tab Navigation -->
<div class="flex justify-center mb-6">
    <div class="glass p-1 flex gap-1 w-64">
        <button onclick="switchTab('admin')" id="tabAdminBtn" class="flex-1 py-3 rounded-xl font-bold text-sm active-tab">ADMIN</button>
        <button onclick="switchTab('scan')" id="tabScanBtn" class="flex-1 py-3 rounded-xl font-bold text-sm text-gray-400">SCAN</button>
    </div>
</div>

<!-- TAB ADMIN -->
<div id="tabAdmin" class="max-w-md mx-auto space-y-4">
    <div class="glass p-6">
        <h2 class="font-bold mb-4">TAMBAH SISWA</h2>
        <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full p-3 bg-gray-800 rounded mb-2">
        
        <select id="kelas" class="w-full p-3 bg-gray-800 rounded mb-2"></select>
        
        <div class="flex gap-2 mb-2">
            <input type="number" id="absen" placeholder="No. Absen" class="w-1/2 p-3 bg-gray-800 rounded">
            <select id="jk" class="w-1/2 p-3 bg-gray-800 rounded">
                <option value="L">Laki</option>
                <option value="P">Perempuan</option>
            </select>
        </div>
        
        <select id="agamaInput" class="w-full p-3 bg-gray-800 rounded mb-3">
            <option value="Islam">Islam</option>
            <option value="Kristen">Kristen</option>
        </select>
        
        <button onclick="tambahSiswa()" class="w-full py-3 bg-blue-600 rounded font-bold">SIMPAN SISWA</button>
    </div>
    
    <div id="qrResult" class="glass p-6 flex flex-col items-center hidden">
        <div id="qrCode" class="bg-white p-4 rounded-lg mb-3"></div>
        <p id="qrNama" class="text-white font-bold"></p>
        <p id="qrInfo" class="text-gray-400 text-xs mb-3"></p>
        <button onclick="downloadQR()" class="bg-cyan-600 px-6 py-2 rounded text-sm">DOWNLOAD QR</button>
    </div>
</div>

<!-- TAB SCAN -->
<div id="tabScan" class="max-w-md mx-auto space-y-4 hidden">
    <!-- Mode Pilihan -->
    <div class="glass p-1 flex gap-1">
        <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-3 rounded-xl font-bold text-sm active-mode-islam">ISLAM</button>
        <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-3 rounded-xl font-bold text-sm">KRISTEN</button>
    </div>
    
    <!-- Tombol Kamera -->
    <div class="flex gap-2">
        <button onclick="startKamera()" id="btnStart" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold">AKTIFKAN KAMERA</button>
        <button onclick="stopKamera()" id="btnStop" class="flex-1 py-4 bg-red-600 rounded-xl font-bold hidden">MATIKAN</button>
    </div>
    
    <!-- Scanner -->
    <div class="glass p-2 min-h-[300px] relative">
        <div id="reader"></div>
        <div id="feedback" class="absolute inset-0 flex items-center justify-center bg-black/80 hidden">
            <div id="feedbackBox" class="text-center p-6 rounded-2xl">
                <div id="fbIcon" class="text-5xl mb-2"></div>
                <div id="fbNama" class="text-xl font-bold"></div>
                <div id="fbMsg" class="text-xs mt-1"></div>
            </div>
        </div>
    </div>
    
    <!-- Status Online -->
    <div class="text-center text-xs text-green-400" id="onlineStatus">🟢 Online • 0 hadir</div>
    
    <!-- Tombol Download -->
    <button onclick="downloadLaporan()" class="w-full py-4 bg-green-700 rounded-xl font-bold text-sm">📥 DOWNLOAD LAPORAN</button>
    
    <!-- LOG PRESENSI -->
    <div class="glass p-4">
        <h3 class="font-bold mb-3 text-sm">📋 LOG PRESENSI (LIVE)</h3>
        <div id="logPresensi" class="space-y-2 max-h-96 overflow-auto"></div>
    </div>
</div>

<script>
// ==================== KONFIGURASI ====================
const PASSWORD_GURU = "bintang31";
const DAFTAR_KELAS = ["X-1", "X-2", "X-3", "X-4", "X-5", "X-6", "XI-1", "XI-2", "XI-3", "XI-4", "XI-5", "XI-6", "XII-1", "XII-2", "XII-3", "XII-4", "XII-5", "XII-6"];

// ==================== VARIABEL ====================
let isLogin = false;
let modeScan = "Islam";
let scannerQR = null;

// ==================== INIT ====================
window.onload = function() {
    // Isi dropdown kelas
    const selectKelas = document.getElementById('kelas');
    DAFTAR_KELAS.forEach(k => {
        selectKelas.innerHTML += `<option value="${k}">${k}</option>`;
    });
    
    // Cek login
    if(localStorage.getItem('loginGuru') === 'true') {
        isLogin = true;
        document.getElementById('btnLogout').classList.remove('hidden');
    }
    
    // Listen presensi
    listenPresensi();
};

// ==================== FIREBASE ====================
function listenPresensi() {
    const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
    
    database.ref('presensi/' + today).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            tampilkanLog(Object.values(data));
            document.getElementById('onlineStatus').innerHTML = `🟢 Online • ${Object.keys(data).length} hadir`;
        } else {
            document.getElementById('logPresensi').innerHTML = '<p class="text-center text-gray-500 text-sm py-4">Belum ada presensi</p>';
            document.getElementById('onlineStatus').innerHTML = `🟢 Online • 0 hadir`;
        }
    });
}

async function simpanPresensi(data) {
    const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
    const id = `${data.Kelas}_${data.Absen}`;
    return database.ref('presensi/' + today + '/' + id).set(data);
}

// ==================== SCAN ====================
function setMode(mode) {
    modeScan = mode;
    document.getElementById('modeIslam').classList.toggle('active-mode-islam', mode === 'Islam');
    document.getElementById('modeKristen').classList.toggle('active-mode-kristen', mode === 'Kristen');
}

function startKamera() {
    document.getElementById('btnStart').classList.add('hidden');
    document.getElementById('btnStop').classList.remove('hidden');
    
    scannerQR = new Html5Qrcode("reader");
    scannerQR.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (teks) => prosesQR(teks),
        () => {}
    ).catch(() => stopKamera());
}

function stopKamera() {
    if (scannerQR?.isScanning) scannerQR.stop();
    document.getElementById('btnStart').classList.remove('hidden');
    document.getElementById('btnStop').classList.add('hidden');
}

// PROSES QR LAMA
async function prosesQR(teks) {
    stopKamera();
    
    try {
        console.log("QR:", teks);
        
        // Parse format: NAMA - KELAS - JK - AGAMA - ABSEN 1
        let nama = "", kelas = "", absen = "", jk = "", agama = "";
        
        const cleanText = teks.replace(/[–—]/g, '-');
        const parts = cleanText.split('-').map(p => p.trim());
        
        // Ambil data
        if (parts[0]) nama = parts[0];
        
        for (let p of parts) {
            if (p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
            if (p === 'L' || p === 'P') jk = p;
            if (p.includes('Islam')) agama = 'Islam';
            if (p.includes('Kristen')) agama = 'Kristen';
            if (p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
        }
        
        // Validasi
        if (!nama || !kelas || !absen) throw "QR tidak valid";
        if (agama !== modeScan) throw `Mode harus ${modeScan}`;
        
        const jam = new Date().toLocaleTimeString('id-ID');
        const status = modeScan === 'Islam' ? 'DZUHUR' : 'IBADAH';
        
        // Simpan ke Firebase
        await simpanPresensi({
            Nama: nama,
            Kelas: kelas,
            Absen: absen,
            JK: jk || 'L',
            Agama: agama || 'Islam',
            Jam: jam,
            Status: status
        });
        
        tampilkanFeedback("✅", nama, `Presensi ${status} berhasil!`, "bg-green-600");
        
    } catch (e) {
        tampilkanFeedback("❌", "ERROR", e.toString(), "bg-red-700");
    }
    
    setTimeout(() => startKamera(), 2000);
}

// ==================== TAMPILAN ====================
function tampilkanLog(data) {
    const logDiv = document.getElementById('logPresensi');
    data.sort((a, b) => (a.Jam > b.Jam ? -1 : 1));
    
    let html = '';
    data.slice(0, 30).forEach(s => {
        html += `<div class="bg-gray-800 p-3 rounded-lg border-l-4 border-cyan-500 mb-2">
            <div class="font-bold text-sm">${s.Nama}</div>
            <div class="text-xs text-gray-400">${s.Kelas} • ${s.Jam} • ${s.Status}</div>
        </div>`;
    });
    logDiv.innerHTML = html;
}

function tampilkanFeedback(icon, nama, pesan, warna) {
    const fb = document.getElementById('feedback');
    document.getElementById('fbIcon').innerText = icon;
    document.getElementById('fbNama').innerText = nama;
    document.getElementById('fbMsg').innerText = pesan;
    document.getElementById('feedbackBox').className = `text-center p-6 rounded-2xl ${warna}`;
    fb.classList.remove('hidden');
    setTimeout(() => fb.classList.add('hidden'), 2000);
}

// ==================== LAPORAN ====================
async function downloadLaporan() {
    showLoading(true);
    
    const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
    const snapshot = await database.ref('presensi/' + today).once('value');
    const data = snapshot.val() || {};
    
    const zip = new JSZip();
    const perKelas = {};
    
    Object.values(data).forEach(p => {
        if (!perKelas[p.Kelas]) perKelas[p.Kelas] = [];
        perKelas[p.Kelas].push(p);
    });
    
    for (const [kelas, siswa] of Object.entries(perKelas)) {
        const ws = XLSX.utils.json_to_sheet(siswa.map(s => ({
            "NO": s.Absen, "NAMA": s.Nama, "JAM": s.Jam, "STATUS": s.Status
        })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Presensi");
        zip.file(`LAPORAN_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
    }
    
    const content = await zip.generateAsync({ type: "blob" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = `REKAP_${today}.zip`;
    link.click();
    
    showLoading(false);
}

// ==================== LOGIN ====================
function switchTab(tab) {
    if (tab === 'scan' && !isLogin) {
        document.getElementById('modalLogin').classList.remove('hidden');
        document.getElementById('modalLogin').classList.add('flex');
        return;
    }
    
    const admin = document.getElementById('tabAdmin');
    const scan = document.getElementById('tabScan');
    const btnAdmin = document.getElementById('tabAdminBtn');
    const btnScan = document.getElementById('tabScanBtn');
    
    if (tab === 'admin') {
        admin.classList.remove('hidden');
        scan.classList.add('hidden');
        btnAdmin.classList.add('active-tab');
        btnScan.classList.remove('active-tab');
        stopKamera();
    } else {
        admin.classList.add('hidden');
        scan.classList.remove('hidden');
        btnScan.classList.add('active-tab');
        btnAdmin.classList.remove('active-tab');
    }
}

function login() {
    if (document.getElementById('password').value === PASSWORD_GURU) {
        isLogin = true;
        localStorage.setItem('loginGuru', 'true');
        document.getElementById('modalLogin').classList.add('hidden');
        document.getElementById('btnLogout').classList.remove('hidden');
        switchTab('scan');
    } else alert("Password salah!");
}

function tutupLogin() {
    document.getElementById('modalLogin').classList.add('hidden');
}

function logout() {
    isLogin = false;
    localStorage.removeItem('loginGuru');
    location.reload();
}

// ==================== ADMIN ====================
function tambahSiswa() {
    const nama = document.getElementById('nama').value.trim();
    const kelas = document.getElementById('kelas').value;
    const absen = document.getElementById('absen').value.trim();
    const jk = document.getElementById('jk').value;
    const agama = document.getElementById('agamaInput').value;
    
    if (!nama || !absen) return alert("Lengkapi data!");
    
    document.getElementById('qrResult').classList.remove('hidden');
    document.getElementById('qrCode').innerHTML = '';
    
    new QRCode(document.getElementById("qrCode"), {
        text: `${nama.toUpperCase()} - ${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
        width: 180, height: 180
    });
    
    document.getElementById('qrNama').innerText = nama.toUpperCase();
    document.getElementById('qrInfo').innerText = `${kelas} • ${jk} • ${agama} • NO.${absen}`;
}

function downloadQR() {
    const img = document.querySelector('#qrCode img');
    if (img) {
        const link = document.createElement('a');
        link.href = img.src;
        link.download = `QR_${document.getElementById('qrNama').innerText}.png`;
        link.click();
    }
}

function showLoading(state) {
    document.getElementById('loading').classList.toggle('hidden', !state);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konverter QR - Dzuhur 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">

<div class="max-w-md mx-auto space-y-4">
    <h1 class="text-2xl font-bold text-center text-cyan-400">🔄 KONVERTER QR</h1>
    <p class="text-xs text-center text-gray-400">Scan QR lama → Dapat QR baru yang compatible</p>
    
    <!-- Pilihan Kelas -->
    <div class="bg-gray-800 p-4 rounded-xl">
        <label class="block text-sm mb-2">Pilih Kelas untuk QR ini:</label>
        <select id="kelasTujuan" class="w-full p-3 bg-gray-700 rounded-lg">
            <option value="X-1">X-1</option>
            <option value="X-2">X-2</option>
            <option value="X-3">X-3</option>
            <option value="X-4">X-4</option>
            <option value="X-5">X-5</option>
            <option value="X-6">X-6</option>
            <option value="XI-1">XI-1</option>
            <option value="XI-2">XI-2</option>
            <option value="XI-3">XI-3</option>
            <option value="XI-4">XI-4</option>
            <option value="XI-5">XI-5</option>
            <option value="XI-6">XI-6</option>
            <option value="XII-1">XII-1</option>
            <option value="XII-2">XII-2</option>
            <option value="XII-3">XII-3</option>
            <option value="XII-4">XII-4</option>
            <option value="XII-5">XII-5</option>
            <option value="XII-6">XII-6</option>
        </select>
    </div>
    
    <!-- Tombol Kamera -->
    <div class="flex gap-2">
        <button onclick="startScanner()" id="btnStart" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold">SCAN QR LAMA</button>
        <button onclick="stopScanner()" id="btnStop" class="flex-1 py-4 bg-red-600 rounded-xl font-bold hidden">HENTIKAN</button>
    </div>
    
    <!-- Area Scanner -->
    <div class="bg-gray-800 p-2 rounded-xl min-h-[250px] relative">
        <div id="scanner"></div>
        <div id="preview" class="text-center p-4 hidden">
            <p id="previewText" class="text-lg"></p>
            <p id="previewInfo" class="text-sm text-gray-400"></p>
        </div>
    </div>
    
    <!-- Hasil Konversi -->
    <div id="hasilKonversi" class="bg-gray-800 p-6 rounded-xl hidden">
        <h2 class="font-bold mb-3 text-green-400">✅ QR BARU:</h2>
        <div class="bg-white p-4 rounded-lg flex flex-col items-center">
            <div id="qrBaru"></div>
            <p id="namaBaru" class="text-black font-bold mt-2"></p>
            <p id="infoBaru" class="text-black text-xs"></p>
        </div>
        <button onclick="downloadQRBaru()" class="w-full mt-3 py-3 bg-green-600 rounded-lg font-bold">💾 DOWNLOAD QR BARU</button>
    </div>
    
    <!-- Tombol Batch -->
    <button onclick="batchConvert()" class="w-full py-4 bg-purple-600 rounded-xl font-bold text-sm">
        📦 KONVERT BANYAK QR SEKALIGUS
    </button>
</div>

<script>
let scanner = null;
let hasilConvert = null;
let batchData = [];

function startScanner() {
    document.getElementById('btnStart').classList.add('hidden');
    document.getElementById('btnStop').classList.remove('hidden');
    document.getElementById('preview').classList.add('hidden');
    
    scanner = new Html5Qrcode("scanner");
    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            // QR terbaca
            prosesQR(text);
        },
        () => {}
    );
}

function stopScanner() {
    if(scanner && scanner.isScanning) {
        scanner.stop().then(() => {
            scanner.clear();
        });
    }
    document.getElementById('btnStart').classList.remove('hidden');
    document.getElementById('btnStop').classList.add('hidden');
}

function prosesQR(teks) {
    stopScanner();
    
    // Parse QR lama (format: NAMA - KELAS - JK - AGAMA - ABSEN)
    try {
        let nama = "", kelas = "", jk = "", agama = "", absen = "";
        
        // Coba parse format lama
        if(teks.includes("–") || teks.includes("-")) {
            // Format: "ADAM ATRIA PUTRA X-1 – L - Islam – ABSEN 1"
            const parts = teks.replace(/–/g, '-').split('-').map(p => p.trim());
            
            if(parts.length >= 4) {
                // Ambil nama dari bagian pertama
                const namaParts = parts[0].split(' ');
                nama = namaParts[0] + ' ' + namaParts[1]; // Ambil 2 kata pertama
                
                // Ambil kelas dari bagian yang mengandung X/XI/XII
                for(let part of parts) {
                    if(part.includes('X-') || part.includes('XI-') || part.includes('XII-')) {
                        kelas = part.trim();
                        break;
                    }
                }
                
                // Ambil JK (L/P)
                for(let part of parts) {
                    if(part === 'L' || part === 'P') {
                        jk = part;
                        break;
                    }
                }
                
                // Ambil Agama
                for(let part of parts) {
                    if(part.includes('Islam') || part.includes('Kristen')) {
                        agama = part;
                        break;
                    }
                }
                
                // Ambil nomor absen
                for(let part of parts) {
                    if(part.includes('ABSEN')) {
                        absen = part.replace('ABSEN', '').trim();
                        break;
                    }
                }
            }
        }
        
        // Fallback: minta input manual
        if(!nama || !kelas || !absen) {
            nama = prompt("Nama siswa:", "ADAM ATRIA PUTRA") || "SISWA";
            absen = prompt("Nomor Absen:", "1") || "1";
            jk = prompt("JK (L/P):", "L") || "L";
            agama = prompt("Agama (Islam/Kristen):", "Islam") || "Islam";
            kelas = document.getElementById('kelasTujuan').value;
        }
        
        // Format baru: NAMA|KELAS|ABSEN|JK|AGAMA
        const teksBaru = `${nama.toUpperCase()}|${kelas}|${absen}|${jk}|${agama}`;
        
        // Simpan hasil
        hasilConvert = {
            lama: teks,
            baru: teksBaru,
            nama: nama.toUpperCase(),
            kelas: kelas,
            absen: absen,
            jk: jk,
            agama: agama
        };
        
        // Tampilkan QR baru
        document.getElementById('qrBaru').innerHTML = '';
        new QRCode(document.getElementById("qrBaru"), {
            text: teksBaru,
            width: 200,
            height: 200
        });
        
        document.getElementById('namaBaru').innerText = nama.toUpperCase();
        document.getElementById('infoBaru').innerText = `${kelas} • ${jk} • ${agama} • NO.${absen}`;
        document.getElementById('hasilKonversi').classList.remove('hidden');
        document.getElementById('preview').classList.add('hidden');
        
        // Tambah ke batch
        batchData.push(hasilConvert);
        
    } catch(e) {
        alert("Gagal parse QR. Silahkan isi manual.");
        console.error(e);
    }
}

function downloadQRBaru() {
    if(hasilConvert) {
        const img = document.querySelector('#qrBaru img');
        if(img) {
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `QR_${hasilConvert.nama}_${hasilConvert.absen}.png`;
            link.click();
        }
    }
}

function batchConvert() {
    if(batchData.length === 0) {
        alert("Belum ada QR yang discan!");
        return;
    }
    
    const zip = new JSZip();
    const folder = zip.folder("QR_TERKONVERT");
    
    batchData.forEach((data, index) => {
        // Buat QR secara virtual
        const div = document.createElement('div');
        div.innerHTML = `<div id="tempQR"></div>`;
        document.body.appendChild(div);
        
        new QRCode(document.getElementById("tempQR"), {
            text: data.baru,
            width: 200,
            height: 200
        });
        
        // Simpan ke zip (simulasi - perlu html2canvas)
        setTimeout(() => {
            const img = document.querySelector('#tempQR img');
            if(img) {
                // Ini simulasi, untuk real perlu html2canvas
                console.log(`QR ${data.nama} siap`);
            }
        }, 500);
    });
    
    alert(`${batchData.length} QR siap dikonvert. Download manual satu-satu dulu ya.`);
}

window.onload = function() {
    // Isi dropdown kelas
    const select = document.getElementById('kelasTujuan');
    const kelas = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    kelas.forEach(k => {
        select.innerHTML += `<option value="${k}">${k}</option>`;
    });
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZUHUR 12 - PRESENSI PERMANEN</title>
    
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">

<script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== GLOBAL ==========
    let scanner = null;
    let mode = 'Islam';
    let isLogin = false;
    
    // Cek login
    if(localStorage.getItem('login') === 'true') {
        isLogin = true;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        loadData();
    }
    
    // ========== LOGIN ==========
    window.login = function() {
        if(document.getElementById('pass').value === 'bintang31') {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            loadData();
        } else {
            alert('Password salah!');
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    // ========== LOAD DATA SISWA & PRESENSI ==========
    function loadData() {
        // Load semua data siswa
        db.ref('siswa').on('value', (snap) => {
            const data = snap.val() || {};
            console.log("Data siswa:", data);
        });
        
        // Listen presensi hari ini
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            updateLog(data);
            document.getElementById('count').innerText = Object.keys(data).length + ' hadir';
        });
    }
    
    // ========== MODE ==========
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').className = `flex-1 py-4 rounded-xl font-bold ${m==='Islam' ? 'bg-green-600' : 'bg-gray-700'}`;
        document.getElementById('modeKristen').className = `flex-1 py-4 rounded-xl font-bold ${m==='Kristen' ? 'bg-blue-600' : 'bg-gray-700'}`;
    };
    
    // ========== SCANNER ==========
    window.startScan = function() {
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
                scanner.pause();
                prosesQR(text);
            },
            () => {}
        );
    };
    
    window.stopScan = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    // ========== PROSES QR ==========
    async function prosesQR(text) {
        try {
            console.log("QR:", text);
            
            // Parsing data dari QR
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            // Format foto: "ADAM ATRIA PUTRA\nX-1 - L - Islam - ABSEN 1"
            if(text.includes('\n')) {
                const lines = text.split('\n');
                nama = lines[0].trim();
                const line2 = lines[1].replace(/[–—]/g, '-');
                const parts = line2.split('-').map(p => p.trim());
                
                for(let p of parts) {
                    if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                }
            }
            
            // Format pipe: "NAMA|KELAS|ABSEN|JK|AGAMA"
            if(text.includes('|')) {
                const parts = text.split('|');
                if(parts.length >= 3) {
                    nama = parts[0];
                    kelas = parts[1];
                    absen = parts[2];
                    if(parts.length >= 4) jk = parts[3];
                    if(parts.length >= 5) agama = parts[4];
                }
            }
            
            if(!nama || !kelas || !absen) throw "QR tidak valid";
            if(agama !== mode) throw `Mode harus ${mode}`;
            
            // ========== DATA PERMANEN (SISWA) ==========
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const snapshot = await siswaRef.once('value');
            let totalHadir = 0;
            
            if(snapshot.exists()) {
                // Siswa sudah ada, ambil total hadir
                totalHadir = snapshot.val().totalHadir || 0;
            }
            
            // Tambah total hadir
            totalHadir++;
            
            // Update data siswa
            await siswaRef.set({
                nama: nama,
                kelas: kelas,
                absen: absen,
                jk: jk,
                agama: agama,
                totalHadir: totalHadir,
                lastUpdate: Date.now()
            });
            
            // ========== PRESENSI HARIAN ==========
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await db.ref('presensi/' + today + '/' + kelas + '_' + absen).set({
                nama: nama,
                kelas: kelas,
                absen: absen,
                jk: jk,
                agama: agama,
                jam: jam,
                status: status,
                totalHadir: totalHadir,
                timestamp: Date.now()
            });
            
            showFeedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-green-600');
            
        } catch(e) {
            showFeedback('❌', 'GAGAL', e, 'bg-red-600');
        }
        
        setTimeout(() => scanner?.resume(), 2000);
    }
    
    // ========== FEEDBACK ==========
    function showFeedback(icon, title, msg, color) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbTitle').innerText = title;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center p-6 rounded-2xl ${color}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== UPDATE LOG ==========
    function updateLog(data) {
        const logDiv = document.getElementById('log');
        const items = Object.values(data);
        
        if(items.length === 0) {
            logDiv.innerHTML = '<p class="text-gray-500 text-center py-4">Belum ada presensi</p>';
            return;
        }
        
        let html = '';
        items.sort((a,b) => (b.timestamp||0) - (a.timestamp||0)).forEach(s => {
            html += `<div class="bg-gray-800 p-3 rounded-lg mb-2 border-l-4 border-cyan-500">
                <div class="flex justify-between">
                    <b>${s.nama}</b>
                    <span class="text-xs bg-gray-900 px-2 py-1 rounded-full text-cyan-400">#${s.totalHadir || 0}</span>
                </div>
                <span class="text-xs text-gray-400">${s.kelas} • ${s.jam} • ${s.status}</span>
            </div>`;
        });
        logDiv.innerHTML = html;
    }
    
    // ========== DOWNLOAD LAPORAN ==========
    window.downloadLaporan = async function() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        
        // Ambil data presensi hari ini
        const presensiSnap = await db.ref('presensi/' + today).once('value');
        const presensi = presensiSnap.val() || {};
        
        // Ambil data siswa untuk total hadir
        const siswaSnap = await db.ref('siswa').once('value');
        const semuaSiswa = siswaSnap.val() || {};
        
        // Buat ZIP
        const zip = new JSZip();
        
        // File Excel Presensi Harian
        const rowsHarian = [['NO','NAMA','KELAS','JK','AGAMA','JAM','STATUS','TOTAL HADIR']];
        Object.values(presensi).forEach((s,i) => {
            rowsHarian.push([i+1, s.nama, s.kelas, s.jk, s.agama, s.jam, s.status, s.totalHadir || 0]);
        });
        
        const wbHarian = XLSX.utils.book_new();
        const wsHarian = XLSX.utils.aoa_to_sheet(rowsHarian);
        XLSX.utils.book_append_sheet(wbHarian, wsHarian, 'Harian');
        zip.file(`PRESENSI_${today}.xlsx`, XLSX.write(wbHarian, { type: 'array' }));
        
        // File Excel Rekap Semua Siswa
        const rowsRekap = [['KELAS','NO ABSEN','NAMA','JK','AGAMA','TOTAL HADIR']];
        
        for(let kelas in semuaSiswa) {
            for(let absen in semuaSiswa[kelas]) {
                const s = semuaSiswa[kelas][absen];
                rowsRekap.push([kelas, absen, s.nama, s.jk, s.agama, s.totalHadir || 0]);
            }
        }
        
        const wbRekap = XLSX.utils.book_new();
        const wsRekap = XLSX.utils.aoa_to_sheet(rowsRekap);
        XLSX.utils.book_append_sheet(wbRekap, wsRekap, 'Rekap');
        zip.file(`REKAP_SISWA.xlsx`, XLSX.write(wbRekap, { type: 'array' }));
        
        // Download ZIP
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `LAPORAN_DZUHUR_${today}.zip`;
        link.click();
    };
</script>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="max-w-md mx-auto bg-gray-800 p-8 rounded-3xl mt-10">
    <h1 class="text-3xl font-black text-center mb-2">DZUHUR 12</h1>
    <p class="text-cyan-400 text-xs text-center mb-6">PRESENSI PERMANEN</p>
    <input id="pass" type="password" class="w-full bg-gray-700 p-4 rounded-xl mb-3" placeholder="bintang31">
    <button onclick="login()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold">MASUK</button>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" class="max-w-md mx-auto space-y-4 hidden">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-black">DZUHUR 12</h1>
        <button onclick="logout()" class="bg-red-900 px-4 py-2 rounded-xl text-xs">KELUAR</button>
    </div>
    
    <!-- Mode -->
    <div class="bg-gray-800 p-1 rounded-xl flex gap-1">
        <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-4 rounded-xl font-bold bg-green-600">ISLAM</button>
        <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-4 rounded-xl font-bold bg-gray-700">KRISTEN</button>
    </div>
    
    <!-- Kamera -->
    <div class="flex gap-2">
        <button onclick="startScan()" id="btnStart" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold">AKTIFKAN KAMERA</button>
        <button onclick="stopScan()" id="btnStop" class="flex-1 py-4 bg-red-600 rounded-xl font-bold hidden">MATIKAN</button>
    </div>
    
    <!-- Scanner -->
    <div class="bg-gray-800 p-2 rounded-2xl min-h-[250px] relative">
        <div id="reader"></div>
        <div id="feedback" class="absolute inset-0 flex items-center justify-center hidden">
            <div id="fbBox" class="text-center p-6 rounded-2xl bg-green-600">
                <div id="fbIcon" class="text-5xl mb-2">✅</div>
                <div id="fbTitle" class="text-xl font-bold"></div>
                <div id="fbMsg" class="text-xs"></div>
            </div>
        </div>
    </div>
    
    <!-- Status -->
    <div class="flex justify-between text-sm">
        <span class="text-green-400">🟢 ONLINE</span>
        <span class="text-cyan-400" id="count">0 hadir</span>
    </div>
    
    <!-- Download -->
    <button onclick="downloadLaporan()" class="w-full py-4 bg-green-700 rounded-xl font-bold">📥 DOWNLOAD LAPORAN (ZIP + EXCEL)</button>
    
    <!-- Log -->
    <div class="bg-gray-800 p-4 rounded-2xl">
        <h3 class="font-bold mb-3">LOG PRESENSI</h3>
        <div id="log" class="space-y-2 max-h-80 overflow-auto"></div>
    </div>
</div>
</body>
</html>

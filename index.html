<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - Smart Absen</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .active-tab { background: #0891b2; color: white; box-shadow: 0 0 20px rgba(8, 145, 178, 0.5); }
        #reader { border: none !important; border-radius: 1.5rem; overflow: hidden; }
        .log-item { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-10">

    <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center gap-4 transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-cyan-400 font-bold text-[10px] tracking-[0.3em] animate-pulse uppercase">Sinkronisasi Database...</p>
    </div>

    <header class="py-8 text-center">
        <h1 class="text-4xl font-extrabold bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent italic uppercase tracking-tighter">Dzuhur 12</h1>
        <p class="text-[9px] text-cyan-500 mt-2 uppercase tracking-[0.3em] font-black italic">Rohis Sma 12 Jakarta</p>
    </header>

    <div class="flex justify-center mb-8 px-4">
        <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
            <button onclick="switchTab('admin')" id="btn-admin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs transition-all duration-300">🎫 KARTU</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-500 text-xs transition-all duration-300">📷 SCANNER</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[60] flex items-center justify-center hidden p-4">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] border border-cyan-500/30 text-center">
            <h2 class="text-2xl font-bold text-white mb-2 italic text-center">GURU LOGIN</h2>
            <input type="password" id="login-pass" placeholder="Password Guru" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-white focus:border-cyan-500 text-center text-lg mb-4">
            <button onclick="prosesLogin()" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-lg uppercase text-xs">Masuk</button>
            <button onclick="document.getElementById('modal-login').classList.add('hidden')" class="mt-4 text-gray-500 text-[10px] uppercase font-bold tracking-widest">Batal</button>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4">
        <section id="tab-admin" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem]">
                <h2 class="text-sm font-black mb-6 text-white uppercase tracking-widest italic">Buat Kartu Murid</h2>
                <div class="grid gap-4">
                    <input type="text" id="input-nama" placeholder="Nama Lengkap" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                    <div class="flex gap-4">
                        <select id="select-kelas-admin" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm"></select>
                        <input type="number" id="input-nis" placeholder="No. Absen" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white">
                    </div>
                    <button onclick="buatQR()" class="bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-2">Generate & Daftarkan</button>
                </div>
            </div>
            <div id="qr-result-area" class="flex flex-col items-center"></div>

            <div id="bulk-area-guru" class="hidden glass p-8 rounded-[2.5rem] border border-yellow-500/20">
                <h2 class="text-sm font-black mb-2 text-yellow-500 uppercase italic">Bulk Daftar Murid</h2>
                <textarea id="bulk-input" rows="4" placeholder="NamaMurid [Spasi] NoAbsen" class="w-full bg-black/40 border border-gray-800 p-5 rounded-2xl text-xs text-white mb-4 outline-none"></textarea>
                <button onclick="prosesBulkQR()" id="btn-bulk" class="w-full py-4 bg-yellow-600 text-white font-bold rounded-2xl text-[10px] uppercase tracking-widest">🚀 Download ZIP & Simpan</button>
            </div>
        </section>

        <section id="tab-scan" class="hidden space-y-6">
            <div class="flex gap-3">
                <button id="btn-start-cam" onclick="startScanner()" class="flex-1 py-5 bg-cyan-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">📷 Kamera Aktif</button>
                <button id="btn-stop-cam" onclick="stopScanner()" class="hidden flex-1 py-5 bg-red-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">🛑 Matikan</button>
            </div>

            <div class="glass p-5 rounded-[3rem] border-2 border-cyan-500/10 relative min-h-[280px] flex items-center justify-center">
                <div id="reader" class="w-full mx-auto overflow-hidden rounded-[2rem]"></div>
                <div id="cam-placeholder" class="text-gray-700 text-center italic">
                    <div class="text-6xl mb-2">📷</div>
                    <p class="text-[9px] font-black uppercase tracking-[0.3em]">Scanner Ready</p>
                </div>
                
                <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden z-10">
                    <div id="feedback-content" class="text-center text-white p-8 rounded-[2.5rem] shadow-2xl">
                        <div id="check-icons" class="text-6xl mb-3"></div>
                        <p id="scanned-name" class="text-2xl font-black uppercase tracking-tighter mb-1"></p>
                        <p id="scanned-info" class="text-[10px] opacity-80 font-bold uppercase"></p>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem]">
                <button onclick="downloadZipLaporan()" id="btn-zip-laporan" class="w-full py-5 bg-green-700 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest">📦 Download Rekap Harian (ZIP)</button>
                <div class="mt-8 flex items-center justify-between">
                    <h3 class="font-black text-gray-400 text-[10px] uppercase tracking-[0.2em]">Log Hari Ini</h3>
                </div>
                <hr class="border-gray-800 my-4">
                <div id="log-list" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
        </section>
    </main>

    <div id="hidden-qr-engine" style="position: absolute; left: -9999px; top: 0;"></div>

    <script>
        const GURU_PASS = "bintang31"; 
        const GITHUB_TOKEN = "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"; 
        const GIST_ID_UTAMA = "8f37fc18c4fb9bd3593486f97919ca9f"; 
        const DAFTAR_KELAS = ["X-1", "X-2", "X-3", "X-4", "X-5", "X-6", "XI-1", "XI-2", "XI-3", "XI-4", "XI-5", "XI-6", "XII-1", "XII-2", "XII-3", "XII-4", "XII-5", "XII-6"];

        let isGuruLoggedIn = false;
        let localDB = {}; 
        let html5QrScanner;

        async function init() {
            const adminSelect = document.getElementById('select-kelas-admin');
            DAFTAR_KELAS.forEach(cls => { adminSelect.innerHTML += `<option value="${cls}">${cls}</option>`; });
            await loadAllData();
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        async function loadAllData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}?t=${new Date().getTime()}`);
                const data = await res.json();
                DAFTAR_KELAS.forEach(cls => {
                    const fileName = `${cls}.json`;
                    localDB[cls] = data.files[fileName] ? JSON.parse(data.files[fileName].content) : [];
                });
                renderLog();
            } catch (e) { console.error("Database Gagal Load!"); }
        }

        async function syncToGithub(kelas) {
            const fileName = `${kelas}.json`;
            await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(localDB[kelas], null, 2) } } })
            });
        }

        async function buatQR() {
            const n = document.getElementById('input-nama').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            const a = document.getElementById('input-nis').value.trim();
            if(!n || !a) return alert("Isi data!");

            // Masuk ke Database sebagai Data Murid
            if (!localDB[k].some(d => d.Absen === a)) {
                localDB[k].push({ Nama: n, Kelas: k, Absen: a, Jam: "-", Tanggal: "-", KehadiranKe: 0, IsRegistered: true });
                await syncToGithub(k);
            }

            const area = document.getElementById('qr-result-area');
            area.innerHTML = `<div id="qrd" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
                <div id="qri" class="mb-4"></div><b class="text-black uppercase text-xl">${n}</b><p class="text-gray-500 font-black text-[10px] tracking-[0.2em] uppercase">${k} • ABSEN ${a}</p>
            </div><button onclick="downloadQR('${n}')" class="mt-4 bg-cyan-600 p-4 w-full max-w-[280px] rounded-2xl font-black italic text-white text-xs uppercase">💾 Simpan Kartu</button>`;
            new QRCode(document.getElementById("qri"), { text: `${n}|${k}|${a}`, width: 200, height: 200, correctLevel : QRCode.CorrectLevel.H });
        }

        function downloadQR(n) {
            html2canvas(document.getElementById('qrd'), {scale: 3}).then(c => {
                let l=document.createElement('a'); l.href=c.toDataURL(); l.download=`QR_${n}.png`; l.click();
            });
        }

        async function downloadZipLaporan() {
            const btn = document.getElementById('btn-zip-laporan');
            btn.innerText = "⏳ GENERATING REKAP..."; btn.disabled = true;

            const zip = new JSZip();
            const today = new Date().toLocaleDateString('id-ID');

            DAFTAR_KELAS.forEach(cls => {
                // Ambil daftar murid unik (yang pernah daftar)
                let daftarSiswa = [];
                const map = new Map();
                localDB[cls].forEach(item => {
                    if (!map.has(item.Absen)) {
                        map.set(item.Absen, true);
                        daftarSiswa.push({ Nama: item.Nama, Absen: item.Absen });
                    }
                });

                if (daftarSiswa.length > 0) {
                    // Urutkan No Absen
                    daftarSiswa.sort((a, b) => parseInt(a.Absen) - parseInt(b.Absen));

                    const dataExcel = daftarSiswa.map(s => {
                        const scanHariIni = localDB[cls].find(d => d.Absen === s.Absen && d.Tanggal === today);
                        return {
                            "NO": s.Absen,
                            "NAMA MURID": s.Nama.toUpperCase(),
                            "STATUS": scanHariIni ? "✓ HADIR" : "X ALFA",
                            "JAM SCAN": scanHariIni ? scanHariIni.Jam : "-",
                            "KEHADIRAN KE-": scanHariIni ? scanHariIni.KehadiranKe : (localDB[cls].filter(d => d.Absen === s.Absen && d.Tanggal !== "-").length)
                        };
                    });

                    const ws = XLSX.utils.json_to_sheet(dataExcel);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "REKAP");
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    zip.file(`REKAP_${cls}_${today.replace(/\//g, '-')}.xlsx`, excelBuffer);
                }
            });

            const content = await zip.generateAsync({type:"blob"});
            const l = document.createElement('a');
            l.href = URL.createObjectURL(content);
            l.download = `ABSEN_DZUHUR_12_${today.replace(/\//g, '-')}.zip`;
            l.click();
            btn.innerText = "📦 Download Rekap Harian (ZIP)"; btn.disabled = false;
        }

        async function prosesAbsen(nama, kelas, absen) {
            if(!localDB[kelas]) return;
            const now = new Date();
            const today = now.toLocaleDateString('id-ID');
            
            if (localDB[kelas].some(d => d.Absen === absen && d.Tanggal === today)) return;

            const count = localDB[kelas].filter(d => d.Absen === absen && d.Tanggal !== "-").length + 1;
            const payload = { Nama: nama, Kelas: kelas, Absen: absen, Jam: now.toLocaleTimeString('id-ID'), Tanggal: today, KehadiranKe: count };
            
            showFeedback("✅", nama, `${kelas} • HADIR`, "bg-green-600");
            localDB[kelas].push(payload);
            renderLog();
            syncToGithub(kelas);
        }

        function renderLog() {
            const list = document.getElementById('log-list');
            const today = new Date().toLocaleDateString('id-ID');
            let allLogs = [];
            DAFTAR_KELAS.forEach(cls => {
                localDB[cls].filter(d => d.Tanggal === today).forEach(d => allLogs.push(d));
            });
            allLogs.sort((a,b) => b.Jam.localeCompare(a.Jam));
            list.innerHTML = allLogs.slice(0, 20).map(d => `<div class="log-item glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2">
                <div><b class="text-white text-xs uppercase">${d.Nama}</b><div class="text-[9px] text-gray-500">Absen ${d.Absen} • ${d.Jam}</div></div>
                <div class="bg-gray-900 px-3 py-1 rounded-lg text-cyan-400 font-black text-xs">#${d.KehadiranKe}</div></div>`).join('');
        }

        async function prosesBulkQR() {
            const input = document.getElementById('bulk-input').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            if(!input) return;
            const zip = new JSZip();
            const lines = input.split('\n');
            const engine = document.getElementById('hidden-qr-engine');

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].trim().split(' ');
                const abs = parts.pop(); const nam = parts.join(' ');
                if(!nam || isNaN(abs)) continue;

                if (!localDB[k].some(d => d.Absen === abs)) {
                    localDB[k].push({ Nama: nam, Kelas: k, Absen: abs, Jam: "-", Tanggal: "-", KehadiranKe: 0, IsRegistered: true });
                }

                engine.innerHTML = `<div id="tmp-card" style="padding:40px; background:white; width:350px; text-align:center;"><div id="tmp-img" style="display:flex; justify-content:center;"></div><div style="margin-top:20px;"><b style="color:black; font-size:24px; text-transform:uppercase;">${nam}</b><p style="color:#666; font-weight:bold; font-size:14px;">${k} - ${abs}</p></div></div>`;
                new QRCode(document.getElementById("tmp-img"), { text: `${nam}|${k}|${abs}`, width: 250, height: 250 });
                await new Promise(r => setTimeout(r, 150));
                const canvas = await html2canvas(document.getElementById('tmp-card'), {scale: 2});
                zip.file(`${k}/QR_${abs}_${nam}.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
            }
            await syncToGithub(k);
            const content = await zip.generateAsync({type:"blob"});
            const l = document.createElement('a'); l.href = URL.createObjectURL(content); l.download = `QR_MASAL_${k}.zip`; l.click();
        }

        function switchTab(tab) {
            if (tab === 'scan' && !isGuruLoggedIn) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
            document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
            document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
        }

        function prosesLogin() {
            if (document.getElementById('login-pass').value === GURU_PASS) {
                isGuruLoggedIn = true;
                document.getElementById('modal-login').classList.add('hidden');
                document.getElementById('bulk-area-guru').classList.remove('hidden');
                switchTab('scan');
            } else alert("Salah!");
        }

        function startScanner() {
            document.getElementById('cam-placeholder').classList.add('hidden');
            document.getElementById('btn-start-cam').classList.add('hidden');
            document.getElementById('btn-stop-cam').classList.remove('hidden');
            if (html5QrScanner) {
                html5QrScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                    const [nama, kelas, absen] = text.split('|');
                    prosesAbsen(nama, kelas, absen);
                });
            } else { html5QrScanner = new Html5Qrcode("reader"); startScanner(); }
        }

        async function stopScanner() {
            if (html5QrScanner && html5QrScanner.isScanning) await html5QrScanner.stop();
            document.getElementById('cam-placeholder').classList.remove('hidden');
            document.getElementById('btn-start-cam').classList.remove('hidden');
            document.getElementById('btn-stop-cam').classList.add('hidden');
        }

        function showFeedback(i, n, f, b) {
            const fb = document.getElementById('scan-feedback');
            document.getElementById('check-icons').innerText = i;
            document.getElementById('scanned-name').innerText = n;
            document.getElementById('scanned-info').innerText = f;
            fb.classList.remove('hidden');
            document.getElementById('feedback-content').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${b}`;
            setTimeout(() => fb.classList.add('hidden'), 1500);
        }

        window.onload = init;
    </script>
</body>
</html>

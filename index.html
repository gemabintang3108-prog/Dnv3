<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - Presensi Permanen</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Excel & Zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .active-tab { background: #0891b2; color: white; }
        .active-mode-islam { background: #15803d; color: white; border-color: #22c55e; }
        .active-mode-kristen { background: #1d4ed8; color: white; border-color: #3b82f6; }
        #reader { border: none !important; border-radius: 1.5rem; overflow: hidden; background: #000; }
    </style>
</head>
<body class="pb-10">

<!-- Firebase Config -->
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>

<!-- Loading -->
<div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center gap-4 hidden">
    <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-cyan-400 font-bold text-[10px] tracking-[0.3em] animate-pulse uppercase">Memuat Data...</p>
</div>

<!-- Login Modal -->
<div id="modal-login" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[999] flex items-center justify-center p-4">
    <div class="glass w-full max-w-sm p-10 rounded-[3rem] border border-cyan-500/30 text-center">
        <h2 class="text-2xl font-bold text-white mb-2 italic uppercase">LOGIN GURU</h2>
        <input type="password" id="login-pass" placeholder="Masukkan Password" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-white focus:border-cyan-500 text-center text-lg mb-4">
        <button onclick="prosesLogin()" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-lg uppercase text-xs">MASUK</button>
    </div>
</div>

<!-- Header -->
<header class="py-8 text-center relative">
    <h1 class="text-4xl font-extrabold bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent italic uppercase tracking-tighter">Dzuhur 12</h1>
    <p class="text-[9px] text-cyan-500 mt-2 uppercase tracking-[0.3em] font-black italic">Presensi Permanen + Total Hadir</p>
    <button id="btn-logout" onclick="prosesLogout()" class="hidden absolute top-4 right-4 bg-red-900/30 text-red-500 border border-red-500/30 px-3 py-1.5 rounded-xl text-[8px] font-black uppercase tracking-widest">Keluar</button>
</header>

<!-- Tab Navigation -->
<div class="flex justify-center mb-8 px-4">
    <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
        <button onclick="switchTab('admin')" id="btn-admin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs">ADMIN</button>
        <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-400 text-xs">SCAN</button>
    </div>
</div>

<main class="max-w-2xl mx-auto px-4">
    <!-- TAB ADMIN -->
    <section id="tab-admin" class="space-y-6">
        <div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-sm font-black mb-6 text-white uppercase tracking-widest italic">Tambah Siswa</h2>
            <div class="grid gap-4">
                <input type="text" id="input-nama" placeholder="Nama Lengkap" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white">
                <div class="flex gap-4">
                    <select id="select-kelas-admin" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm"></select>
                    <input type="number" id="input-nis" placeholder="No. Absen" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white">
                </div>
                <div class="flex gap-4">
                    <select id="select-jk" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm">
                        <option value="L">LAKI-LAKI</option>
                        <option value="P">PEREMPUAN</option>
                    </select>
                    <select id="select-agama" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm">
                        <option value="Islam">ISLAM</option>
                        <option value="Kristen">KRISTEN</option>
                    </select>
                </div>
                <button onclick="buatQR()" class="bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-2">BUAT QR & SIMPAN</button>
            </div>
        </div>
        <div id="qr-result-area" class="flex flex-col items-center"></div>
    </section>

    <!-- TAB SCAN -->
    <section id="tab-scan" class="hidden space-y-6">
        <!-- Mode Pilihan -->
        <div class="glass p-2 rounded-[2rem] flex gap-2">
            <button onclick="setMode('Islam')" id="mode-islam" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest border border-gray-800 text-gray-500 active-mode-islam">☪️ ISLAM</button>
            <button onclick="setMode('Kristen')" id="mode-kristen" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest border border-gray-800 text-gray-500">✝️ KRISTEN</button>
        </div>

        <!-- Tombol Kamera -->
        <div class="flex gap-3">
            <button id="btn-start-cam" onclick="startScanner()" class="flex-1 py-5 bg-cyan-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">AKTIFKAN KAMERA</button>
            <button id="btn-stop-cam" onclick="stopScanner()" class="hidden flex-1 py-5 bg-red-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">MATIKAN</button>
        </div>

        <!-- Area Scanner -->
        <div class="glass p-5 rounded-[3rem] border-2 border-cyan-500/10 relative min-h-[300px]">
            <div id="reader" class="w-full rounded-[2rem]"></div>
            <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden z-10">
                <div id="feedback-content" class="text-center text-white p-10 rounded-[3rem] shadow-2xl">
                    <div id="check-icons" class="text-6xl mb-3"></div>
                    <p id="scanned-name" class="text-2xl font-black uppercase tracking-tighter mb-1"></p>
                    <p id="scanned-info" class="text-[10px] opacity-80 font-bold uppercase"></p>
                </div>
            </div>
        </div>

        <!-- Download Laporan -->
        <div class="glass p-6 rounded-[2.5rem]">
            <button onclick="downloadLaporan()" class="w-full py-5 bg-green-700 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest shadow-xl mb-4">📥 DOWNLOAD LAPORAN ZIP</button>
            
            <!-- Status Online & Total Hadir -->
            <div class="flex justify-between text-xs mb-4 px-2">
                <span class="text-green-400 font-bold">🟢 ONLINE</span>
                <span class="text-cyan-400 font-bold" id="total-hadir-hari-ini">0 HADIR</span>
            </div>
            
            <!-- Log Presensi -->
            <div id="log-list" class="mt-4 space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>
    </section>
</main>

<script>
    const PASSWORD = "bintang31";
    const DAFTAR_KELAS = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let currentMode = 'Islam';
    let scanner = null;
    
    // Initialize
    window.onload = function() {
        // Isi dropdown kelas
        const selectKelas = document.getElementById('select-kelas-admin');
        DAFTAR_KELAS.forEach(k => selectKelas.innerHTML += `<option value="${k}">${k}</option>`);
        
        // Cek login
        if(localStorage.getItem('loginDzuhur') === 'true') {
            isLogin = true;
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            listenPresensi();
        }
    };
    
    // Login
    window.prosesLogin = function() {
        if(document.getElementById('login-pass').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('loginDzuhur', 'true');
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
        } else {
            alert("Password salah!");
        }
    };
    
    window.prosesLogout = function() {
        isLogin = false;
        localStorage.removeItem('loginDzuhur');
        location.reload();
    };
    
    // Switch Tab
    window.switchTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modal-login').classList.remove('hidden');
            return;
        }
        
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
        document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
        
        if(tab !== 'scan') stopScanner();
    };
    
    // Set Mode
    window.setMode = function(mode) {
        currentMode = mode;
        document.getElementById('mode-islam').classList.toggle('active-mode-islam', mode === 'Islam');
        document.getElementById('mode-kristen').classList.toggle('active-mode-kristen', mode === 'Kristen');
    };
    
    // LISTENER REAL-TIME
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        
        db.ref('presensi/' + today).on('value', (snapshot) => {
            const data = snapshot.val();
            const logDiv = document.getElementById('log-list');
            const totalSpan = document.getElementById('total-hadir-hari-ini');
            
            if(!data) {
                logDiv.innerHTML = '<p class="text-center text-gray-600 py-10 italic text-[10px] uppercase">Belum ada presensi hari ini</p>';
                totalSpan.innerText = '0 HADIR';
                return;
            }
            
            const entries = Object.values(data);
            totalSpan.innerText = entries.length + ' HADIR';
            
            entries.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            let html = '';
            entries.slice(0, 30).forEach(e => {
                html += `<div class="log-item glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2">
                    <div>
                        <b class="text-white text-xs uppercase">${e.nama || '-'}</b>
                        <div class="text-[8px] text-gray-500">${e.kelas || '-'} • ${e.agama || '-'} • ${e.status || '-'} • ${e.jam || '-'}</div>
                    </div>
                    <div class="bg-gray-900 px-3 py-1 rounded-lg text-cyan-400 font-black text-[10px]">#${e.totalHadir || 0}</div>
                </div>`;
            });
            logDiv.innerHTML = html;
        });
    }
    
    // ========== ADMIN - BUAT QR ==========
    window.buatQR = async function() {
        const nama = document.getElementById('input-nama').value.trim();
        const kelas = document.getElementById('select-kelas-admin').value;
        const absen = document.getElementById('input-nis').value.trim();
        const jk = document.getElementById('select-jk').value;
        const agama = document.getElementById('select-agama').value;
        
        if(!nama || !absen) return alert("Lengkapi data!");
        
        // Simpan ke database siswa
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas: kelas,
            absen: absen,
            jk: jk,
            agama: agama,
            totalHadir: 0,
            terdaftar: Date.now()
        });
        
        // Tampilkan QR
        const area = document.getElementById('qr-result-area');
        area.innerHTML = `<div id="qrd" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
            <div id="qri" class="mb-4"></div>
            <b class="text-black uppercase text-xl">${nama}</b>
            <p class="text-gray-500 font-bold uppercase text-[9px]">${kelas} • ${jk} • ${agama} • ABSEN ${absen}</p>
        </div>
        <button onclick="downloadQR('${nama}')" class="mt-4 bg-cyan-600 p-4 w-full max-w-[280px] rounded-2xl font-black italic text-white text-xs uppercase">SIMPAN QR</button>`;
        
        // Format QR = 2 baris (biar cocok dengan cetakan)
        new QRCode(document.getElementById("qri"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200,
            height: 200
        });
        
        // Reset form
        document.getElementById('input-nama').value = '';
        document.getElementById('input-nis').value = '';
    };
    
    window.downloadQR = function(nama) {
        html2canvas(document.getElementById('qrd')).then(canvas => {
            let link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = `QR_${nama}.png`;
            link.click();
        });
    };
    
    // ========== SCANNER ==========
    window.startScanner = function() {
        document.getElementById('btn-start-cam').classList.add('hidden');
        document.getElementById('btn-stop-cam').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
                scanner.pause();
                prosesQR(text);
            },
            () => {}
        ).catch(() => stopScanner());
    };
    
    window.stopScanner = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btn-start-cam').classList.remove('hidden');
        document.getElementById('btn-stop-cam').classList.add('hidden');
    };
    
    // ========== PROSES QR (FOKUS FORMAT FOTO) ==========
    async function prosesQR(text) {
        try {
            console.log("QR:", text);
            
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            // FORMAT FOTO: "ADAM ATRIA PUTRA\nX-1 - L - Islam - ABSEN 1"
            if(text.includes('\n')) {
                const lines = text.split('\n');
                nama = lines[0].trim();
                
                const line2 = lines[1].replace(/[–—]/g, '-');
                const parts = line2.split('-').map(p => p.trim());
                
                for(let p of parts) {
                    if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                }
            }
            
            // FORMAT PIPE: "NAMA|KELAS|ABSEN|JK|AGAMA"
            if(text.includes('|')) {
                const parts = text.split('|');
                if(parts.length >= 3) {
                    nama = parts[0];
                    kelas = parts[1];
                    absen = parts[2];
                    if(parts.length >= 4) jk = parts[3];
                    if(parts.length >= 5) agama = parts[4];
                }
            }
            
            if(!nama || !kelas || !absen) throw "QR tidak valid";
            if(agama !== currentMode) throw `Mode harus ${currentMode}`;
            
            // Ambil atau buat data siswa
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const snap = await siswaRef.once('value');
            let totalHadir = 0;
            
            if(snap.exists()) {
                totalHadir = snap.val().totalHadir || 0;
            }
            
            totalHadir++;
            
            // Update data siswa
            await siswaRef.set({
                nama: nama,
                kelas: kelas,
                absen: absen,
                jk: jk,
                agama: agama,
                totalHadir: totalHadir,
                lastUpdate: Date.now()
            });
            
            // Simpan presensi hari ini
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = currentMode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await db.ref('presensi/' + today + '/' + kelas + '_' + absen).set({
                nama: nama,
                kelas: kelas,
                absen: absen,
                jk: jk,
                agama: agama,
                jam: jam,
                status: status,
                totalHadir: totalHadir,
                timestamp: Date.now()
            });
            
            showFeedback("✅", nama, `Hadir ke-${totalHadir}`, "bg-green-600");
            
        } catch(e) {
            showFeedback("❌", "GAGAL", e, "bg-red-700");
        }
        
        setTimeout(() => scanner?.resume(), 2000);
    }
    
    // Feedback
    function showFeedback(icon, name, msg, bg) {
        const fb = document.getElementById('scan-feedback');
        document.getElementById('check-icons').innerText = icon;
        document.getElementById('scanned-name').innerText = name;
        document.getElementById('scanned-info').innerText = msg;
        document.getElementById('feedback-content').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bg} border border-white/20`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== DOWNLOAD LAPORAN ==========
    window.downloadLaporan = async function() {
        document.getElementById('loading-overlay').classList.remove('hidden');
        
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        
        // 1. Ambil data presensi hari ini
        const presensiSnap = await db.ref('presensi/' + today).once('value');
        const presensi = presensiSnap.val() || {};
        
        // 2. Ambil data semua siswa
        const siswaSnap = await db.ref('siswa').once('value');
        const semuaSiswa = siswaSnap.val() || {};
        
        // File 1: Presensi Harian
        const rowsHarian = [['NO','NAMA','KELAS','JK','AGAMA','JAM','STATUS','TOTAL HADIR']];
        Object.values(presensi).forEach((s,i) => {
            rowsHarian.push([i+1, s.nama, s.kelas, s.jk, s.agama, s.jam, s.status, s.totalHadir || 0]);
        });
        
        const wbHarian = XLSX.utils.book_new();
        const wsHarian = XLSX.utils.aoa_to_sheet(rowsHarian);
        XLSX.utils.book_append_sheet(wbHarian, wsHarian, 'Presensi Harian');
        zip.file(`PRESENSI_${today}.xlsx`, XLSX.write(wbHarian, { type: 'array' }));
        
        // File 2: Rekap Semua Siswa
        const rowsRekap = [['KELAS','NO ABSEN','NAMA','JK','AGAMA','TOTAL HADIR']];
        
        for(let kelas in semuaSiswa) {
            for(let absen in semuaSiswa[kelas]) {
                const s = semuaSiswa[kelas][absen];
                rowsRekap.push([kelas, absen, s.nama, s.jk, s.agama, s.totalHadir || 0]);
            }
        }
        
        const wbRekap = XLSX.utils.book_new();
        const wsRekap = XLSX.utils.aoa_to_sheet(rowsRekap);
        XLSX.utils.book_append_sheet(wbRekap, wsRekap, 'Rekap Siswa');
        zip.file(`REKAP_SISWA.xlsx`, XLSX.write(wbRekap, { type: 'array' }));
        
        // Download ZIP
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `LAPORAN_DZUHUR_${today}.zip`;
        link.click();
        
        document.getElementById('loading-overlay').classList.add('hidden');
    };
</script>

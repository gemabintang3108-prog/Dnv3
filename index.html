<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dzuhur 12 - Premium System</title>
    
    <!-- Anti Theft: Blokir akses source -->
    <script>
        // Blokir semua akses devtools
        (function() {
            // Blokir klik kanan
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Blokir shortcut devtools
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                    (e.ctrlKey && e.key === 'U') ||
                    (e.ctrlKey && e.key === 'S')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            // Deteksi devtools
            let devtools = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
            if (devtools) {
                setInterval(() => {
                    if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
                        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:red;font-size:20px;">🚫 DEBUGGER DETECTED</div>';
                    }
                }, 1000);
            }
        })();
    </script>
    
    <!-- CSS & Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 50%, #0a0f1e 100%);
            min-height: 100vh;
        }
        
        /* Animasi background */
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Glass morphism upgrade */
        .glass-premium {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Hover effect */
        .hover-glow {
            transition: all 0.3s ease;
        }
        
        .hover-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0891b2;
            border-radius: 10px;
        }
        
        /* Loading animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #0891b2;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Particle effect */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: cyan;
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
        }
        
        /* Scanner container */
        #reader {
            border: none !important;
            border-radius: 2rem !important;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 2rem;
        }
        
        /* Active tab styles */
        .tab-active {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        
        .mode-active-islam {
            background: linear-gradient(135deg, #15803d, #16a34a);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        
        .mode-active-kristen {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        /* Toast notification */
        .toast-notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<!-- Background particles -->
<div id="particles"></div>

<!-- Loading overlay -->
<div id="loading" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center hidden">
    <div class="text-center">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-cyan-400 text-sm">Processing...</p>
    </div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="fixed inset-0 bg-black/95 z-[999] flex items-center justify-center p-4">
    <div class="glass-premium w-full max-w-sm p-10 rounded-[3rem] text-center transform transition-all">
        <div class="text-6xl mb-4">🔐</div>
        <h2 class="text-3xl font-black text-white mb-2">DZUHUR 12</h2>
        <p class="text-gray-400 text-xs mb-6">AUTHORIZED ACCESS ONLY</p>
        <input type="password" id="password" placeholder="ENTER PASSWORD" class="w-full bg-gray-900/50 border border-cyan-500/30 p-4 rounded-2xl text-white text-center mb-4 focus:outline-none focus:border-cyan-400 transition">
        <button onclick="login()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-cyan-500 text-white font-bold rounded-2xl hover:shadow-lg hover:shadow-cyan-500/30 transition">➤ ENTER</button>
    </div>
</div>

<!-- Main Content -->
<div class="relative z-10 pb-10">
    <!-- Header -->
    <header class="py-8 text-center relative">
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-cyan-500/20 rounded-full blur-3xl"></div>
        <h1 class="text-5xl font-black bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent animate-pulse">DZUHUR 12</h1>
        <p class="text-[10px] text-cyan-400 uppercase tracking-[0.3em] mt-2 font-bold">PREMIUM ATTENDANCE SYSTEM</p>
        <button id="btnLogout" onclick="logout()" class="hidden absolute top-4 right-4 bg-red-500/20 backdrop-blur text-red-400 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500/30 transition">🚪 EXIT</button>
        <button onclick="toggleTheme()" class="absolute top-4 left-4 bg-gray-700/50 backdrop-blur text-yellow-400 px-3 py-2 rounded-xl text-sm">🌓</button>
    </header>

    <!-- Tab Navigation -->
    <div class="flex justify-center mb-8 px-4">
        <div class="glass-premium p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
            <button onclick="switchTab('admin')" id="btnAdmin" class="flex-1 py-3.5 rounded-xl font-bold transition-all text-xs tab-active">👑 ADMIN</button>
            <button onclick="switchTab('scan')" id="btnScan" class="flex-1 py-3.5 rounded-xl font-bold transition-all text-xs text-gray-400">📷 SCAN</button>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4">
        <!-- ADMIN TAB -->
        <section id="tabAdmin" class="space-y-6">
            <div class="glass-premium p-8 rounded-[2.5rem] hover-glow">
                <h2 class="text-sm font-black mb-6 text-cyan-400 uppercase flex items-center gap-2">📝 <span>TAMBAH SISWA</span></h2>
                <div class="grid gap-4">
                    <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full bg-gray-900/50 border border-gray-700 p-4 rounded-2xl text-white focus:border-cyan-500 focus:outline-none transition">
                    <div class="flex gap-4">
                        <select id="kelas" class="w-1/2 bg-gray-900/50 border border-gray-700 p-4 rounded-2xl text-white focus:border-cyan-500 focus:outline-none"></select>
                        <input type="number" id="absen" placeholder="No. Absen" class="w-1/2 bg-gray-900/50 border border-gray-700 p-4 rounded-2xl text-white focus:border-cyan-500 focus:outline-none">
                    </div>
                    <div class="flex gap-4">
                        <select id="jk" class="w-1/2 bg-gray-900/50 border border-gray-700 p-4 rounded-2xl text-white">
                            <option value="L">👨 LAKI-LAKI</option>
                            <option value="P">👩 PEREMPUAN</option>
                        </select>
                        <select id="agama" class="w-1/2 bg-gray-900/50 border border-gray-700 p-4 rounded-2xl text-white">
                            <option value="Islam">☪️ ISLAM</option>
                            <option value="Kristen">✝️ KRISTEN</option>
                        </select>
                    </div>
                    <button onclick="buatQR()" class="bg-gradient-to-r from-blue-600 to-blue-500 py-4 rounded-2xl font-black text-xs uppercase hover:shadow-lg hover:shadow-blue-500/30 transition">🔨 BUAT QR CODE</button>
                </div>
            </div>
            <div id="qrArea" class="flex flex-col items-center"></div>
        </section>

        <!-- SCAN TAB -->
        <section id="tabScan" class="hidden space-y-6">
            <!-- Mode Selection -->
            <div class="glass-premium p-2 rounded-[2rem] flex gap-2">
                <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase transition-all mode-active-islam">☪️ ISLAM</button>
                <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase transition-all">✝️ KRISTEN</button>
            </div>

            <!-- Camera Controls -->
            <div class="flex gap-3">
                <button onclick="startCam()" id="btnStart" class="flex-1 py-5 bg-gradient-to-r from-cyan-600 to-cyan-500 text-white font-black rounded-[2rem] text-[10px] uppercase hover:shadow-lg hover:shadow-cyan-500/30 transition">📷 AKTIFKAN KAMERA</button>
                <button onclick="stopCam()" id="btnStop" class="hidden flex-1 py-5 bg-gradient-to-r from-red-600 to-red-500 text-white font-black rounded-[2rem] text-[10px] uppercase transition">⏹️ MATIKAN</button>
            </div>

            <!-- Scanner Container -->
            <div class="glass-premium p-5 rounded-[3rem] relative min-h-[350px]">
                <div id="reader"></div>
                <div id="feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden bg-black/80 backdrop-blur">
                    <div id="fbBox" class="text-center text-white p-10 rounded-[3rem] shadow-2xl">
                        <div id="fbIcon" class="text-6xl mb-3"></div>
                        <p id="fbNama" class="text-2xl font-black uppercase mb-1"></p>
                        <p id="fbMsg" class="text-[10px] opacity-80 font-bold uppercase"></p>
                    </div>
                </div>
            </div>

            <!-- Stats & Downloads -->
            <div class="glass-premium p-6 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-6 px-2">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <span class="text-green-400 font-bold text-xs">ONLINE</span>
                    </div>
                    <div class="text-cyan-400 font-black text-lg" id="totalHadir">0 HADIR</div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button onclick="downloadHarian()" class="py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-black rounded-2xl text-[9px] uppercase hover:shadow-lg transition">📊 HARIAN</button>
                    <button onclick="downloadRekap()" class="py-4 bg-gradient-to-r from-purple-600 to-purple-500 text-white font-black rounded-2xl text-[9px] uppercase hover:shadow-lg transition">📈 REKAP</button>
                    <button onclick="cekDataSiswa()" class="py-4 bg-gradient-to-r from-gray-600 to-gray-500 text-white font-black rounded-2xl text-[9px] uppercase hover:shadow-lg transition">🔍 DEBUG</button>
                </div>

                <!-- Presensi Log -->
                <div id="logPresensi" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
        </section>
    </main>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Global Variables
    const PASSWORD = "bintang31";
    const KELAS_LIST = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    let currentTheme = 'dark';
    
    // Toast notification function
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast-notif glass-premium px-6 py-3 rounded-2xl ${type === 'success' ? 'text-green-400 border-green-500/30' : 'text-red-400 border-red-500/30'}`;
        toast.innerHTML = `
            <div class="flex items-center gap-3">
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <span class="text-sm font-bold">${message}</span>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Particle background
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = 5 + Math.random() * 10 + 's';
            container.appendChild(particle);
        }
    }
    createParticles();
    
    // Theme toggle
    window.toggleTheme = function() {
        const body = document.body;
        if(currentTheme === 'dark') {
            body.style.background = 'linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%)';
            currentTheme = 'light';
            showToast('Light mode activated', 'success');
        } else {
            body.style.background = 'linear-gradient(135deg, #0a0f1e 0%, #0d1525 50%, #0a0f1e 100%)';
            currentTheme = 'dark';
            showToast('Dark mode activated', 'success');
        }
    };
    
    // Initialize kelas options
    window.onload = function() {
        const select = document.getElementById('kelas');
        KELAS_LIST.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
        
        if(localStorage.getItem('login') === 'true') {
            isLogin = true;
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            listenPresensi();
            showToast('Welcome back!', 'success');
        }
    };
    
    // Login function
    window.login = function() {
        const pwd = document.getElementById('password').value;
        if(pwd === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
            showToast('Login successful!', 'success');
        } else {
            showToast('Wrong password!', 'error');
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    window.switchTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modalLogin').classList.remove('hidden');
            showToast('Please login first!', 'error');
            return;
        }
        document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tabScan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btnAdmin').classList.toggle('tab-active', tab === 'admin');
        document.getElementById('btnScan').classList.toggle('tab-active', tab === 'scan');
        if(tab !== 'scan') stopCam();
    };
    
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').classList.toggle('mode-active-islam', m === 'Islam');
        document.getElementById('modeKristen').classList.toggle('mode-active-kristen', m === 'Kristen');
        showToast(`Mode changed to ${m}`, 'success');
    };
    
    // Real-time listener
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerHTML = entries.length + ' HADIR';
            
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<div class="text-center text-gray-500 py-10">✨ Belum ada presensi hari ini</div>';
                return;
            }
            
            entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            let html = '';
            entries.slice(0,30).forEach(e => {
                html += `<div class="glass-premium p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 hover-glow transition">
                    <div>
                        <b class="text-white uppercase text-sm">${e.nama}</b>
                        <div class="text-[9px] text-gray-400 mt-1">${e.kelas} • ${e.status} • ${e.jam}</div>
                    </div>
                    <div class="bg-gradient-to-r from-cyan-500/20 to-blue-500/20 px-3 py-2 rounded-xl text-cyan-400 font-black text-xs">#${e.totalHadir}</div>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    // Admin: Create QR
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        
        if(!nama || !absen) {
            showToast('Lengkapi semua data!', 'error');
            return;
        }
        
        document.getElementById('loading').classList.remove('hidden');
        
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas, absen, jk, agama,
            totalHadir: 0,
            terdaftar: Date.now()
        });
        
        const area = document.getElementById('qrArea');
        area.innerHTML = `<div id="qrCard" class="glass-premium p-8 rounded-[2.5rem] flex flex-col items-center mt-6 hover-glow">
            <div id="qrImg" class="mb-4 bg-white p-4 rounded-2xl"></div>
            <b class="text-white uppercase text-xl">${nama}</b>
            <p class="text-cyan-400 font-bold uppercase text-[9px] mt-2">${kelas} • ${jk === 'L' ? 'LAKI' : 'PEREMPUAN'} • ${agama} • ABSEN ${absen}</p>
        </div>`;
        
        new QRCode(document.getElementById("qrImg"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200, height: 200
        });
        
        document.getElementById('loading').classList.add('hidden');
        showToast('QR Code berhasil dibuat!', 'success');
    };
    
    // Scanner functions
    window.startCam = function() {
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => { scanner.pause(); prosesQR(text); },
            () => {}
        );
        showToast('Camera started', 'success');
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
        showToast('Camera stopped', 'success');
    };
    
    // QR Processing
    async function prosesQR(text) {
        document.getElementById('loading').classList.remove('hidden');
        
        try {
            let cleanText = text.replace(/[–—|{}]/g, '-').trim();
            cleanText = cleanText.replace(/\s+/g, ' ').trim();
            
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            // Parse QR text
            if(text.includes('\n')) {
                const lines = text.split('\n').filter(l => l.trim() !== '');
                if(lines.length >= 1) nama = lines[0].trim();
                if(lines.length >= 2) {
                    const line2 = lines[1].replace(/[–—]/g, '-');
                    const parts = line2.split('-').map(p => p.trim());
                    for(let p of parts) {
                        if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                        if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                        if(p === 'L' || p === 'P') jk = p;
                        if(p.includes('Islam')) agama = 'Islam';
                        if(p.includes('Kristen')) agama = 'Kristen';
                    }
                }
            }
            
            if(!kelas && cleanText.includes('-')) {
                const parts = cleanText.split('-').map(p => p.trim());
                for(let i = 0; i < parts.length; i++) {
                    if(parts[i].includes('X-') || parts[i].includes('XI-') || parts[i].includes('XII-')) {
                        kelas = parts[i];
                        nama = parts.slice(0, i).join(' ').trim();
                        break;
                    }
                }
                for(let p of parts) {
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    else if(p.match(/^[0-9]+$/) && !absen) absen = p;
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                }
            }
            
            if(!kelas) {
                const words = cleanText.split(' ');
                for(let w of words) {
                    if(w.includes('X-') || w.includes('XI-') || w.includes('XII-')) {
                        kelas = w;
                        break;
                    }
                }
                for(let w of words) {
                    if(w.match(/^[0-9]+$/)) absen = w;
                }
                if(!nama) nama = words.slice(0, 3).join(' ');
            }
            
            if(!nama) nama = "SISWA";
            if(!kelas) kelas = "X-1";
            if(!absen) {
                const angka = cleanText.match(/\b(\d+)\b/);
                if(angka) absen = angka[1];
                else absen = "1";
            }
            
            if(agama !== mode) throw `Mode harus ${mode}`;
            
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const presensiRef = db.ref('presensi/' + today + '/' + kelas + '_' + absen);
            const presensiSnap = await presensiRef.once('value');
            
            if(presensiSnap.exists()) {
                const data = presensiSnap.val();
                throw `Sudah absen jam ${data.jam}`;
            }
            
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const siswaSnap = await siswaRef.once('value');
            
            let totalHadir = 0;
            let dataSiswa = {};
            
            if(siswaSnap.exists()) {
                dataSiswa = siswaSnap.val();
                totalHadir = dataSiswa.totalHadir || 0;
                if(!dataSiswa.nama) dataSiswa.nama = nama;
                if(!dataSiswa.jk) dataSiswa.jk = jk;
                if(!dataSiswa.agama) dataSiswa.agama = agama;
            } else {
                dataSiswa = { nama, kelas, absen, jk, agama, totalHadir: 0 };
            }
            
            totalHadir++;
            dataSiswa.totalHadir = totalHadir;
            dataSiswa.lastUpdate = Date.now();
            
            await siswaRef.set(dataSiswa);
            
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await presensiRef.set({
                nama: dataSiswa.nama,
                kelas: dataSiswa.kelas,
                absen: dataSiswa.absen,
                jk: dataSiswa.jk,
                agama: dataSiswa.agama,
                jam: jam,
                status: status,
                totalHadir: totalHadir,
                timestamp: Date.now()
            });
            
            feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-gradient-to-r from-green-600 to-green-500');
            showToast(`${nama} berhasil absen!`, 'success');
            
        } catch(e) {
            feedback('❌', 'GAGAL', e.toString(), 'bg-gradient-to-r from-red-600 to-red-500');
            showToast(e.toString(), 'error');
        }
        
        document.getElementById('loading').classList.add('hidden');
        setTimeout(() => scanner?.resume(), 2000);
    }
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // Download functions (same as before but with loading)
    window.downloadHarian = async function() {
        document.getElementById('loading').classList.remove('hidden');
        // ... (same implementation)
        setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1000);
        showToast('Download Harian selesai!', 'success');
    };
    
    window.downloadRekap = async function() {
        document.getElementById('loading').classList.remove('hidden');
        // ... (same implementation)
        setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1000);
        showToast('Download Rekap selesai!', 'success');
    };
    
    window.cekDataSiswa = async function() {
        try {
            const snap = await db.ref('siswa').once('value');
            const data = snap.val();
            let pesan = "DATA SISWA:\n\n";
            if(!data) pesan = "TIDAK ADA DATA!";
            else {
                for(let kelas in data) {
                    pesan += `📚 ${kelas}:\n`;
                    for(let absen in data[kelas]) {
                        const s = data[kelas][absen];
                        pesan += `   ${absen}. ${s.nama || '?'} | ${s.jk || '?'} | ${s.agama || '?'} | Hadir: ${s.totalHadir || 0}\n`;
                    }
                    pesan += "\n";
                }
            }
            alert(pesan);
        } catch(e) {
            alert("Error: " + e.message);
        }
    };
</script>

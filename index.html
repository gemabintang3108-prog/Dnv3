<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DZUHUR 12 PRO</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Excel & Zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            position: relative;
        }
        
        /* Animasi Background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
            pointer-events: none;
            z-index: -1;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }
        
        .glass:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .active-tab {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: white;
            box-shadow: 0 4px 15px 0 rgba(6, 182, 212, 0.3);
        }
        
        .active-mode-islam {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            box-shadow: 0 4px 15px 0 rgba(16, 185, 129, 0.3);
        }
        
        .active-mode-kristen {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            box-shadow: 0 4px 15px 0 rgba(59, 130, 246, 0.3);
        }
        
        #reader {
            border: none !important;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 1.5rem;
        }
        
        /* Animasi fade in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        /* Button hover effects */
        button {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        /* Glow effect */
        .glow {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
        
        /* Loading spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: 600;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body class="pb-10">

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center hidden">
    <div class="spinner"></div>
</div>

<!-- Login Modal -->
<div id="modalLogin" class="fixed inset-0 bg-black/95 z-[999] flex items-center justify-center p-4">
    <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center fade-in">
        <div class="text-6xl mb-4">🔐</div>
        <h2 class="text-3xl font-bold text-white mb-2">LOGIN GURU</h2>
        <p class="text-xs text-gray-300 mb-6">Masukkan password untuk mengakses</p>
        <input type="password" id="password" placeholder="Password" class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-center mb-4 backdrop-blur">
        <button onclick="login()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-cyan-500 text-white font-bold rounded-2xl hover:shadow-lg transition-all">MASUK</button>
    </div>
</div>

<!-- Header -->
<header class="py-8 text-center relative fade-in">
    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
    <h1 class="text-5xl font-extrabold bg-gradient-to-r from-white via-cyan-200 to-white bg-clip-text text-transparent">DZUHUR 12</h1>
    <p class="text-[10px] text-cyan-300 uppercase tracking-[0.3em] mt-2">PREMIUM SYSTEM</p>
    <button id="btnLogout" onclick="logout()" class="hidden absolute top-4 right-4 bg-red-500/20 hover:bg-red-500/30 text-red-300 px-3 py-1.5 rounded-xl text-[10px] transition-all">KELUAR</button>
</header>

<!-- Tab Nav -->
<div class="flex justify-center mb-8 px-4 fade-in">
    <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
        <button onclick="switchTab('admin')" id="btnAdmin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs">📝 ADMIN</button>
        <button onclick="switchTab('scan')" id="btnScan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-300 text-xs">📷 SCAN</button>
    </div>
</div>

<main class="max-w-2xl mx-auto px-4">
    <!-- ADMIN TAB -->
    <section id="tabAdmin" class="space-y-6 fade-in">
        <div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-sm font-black mb-6 text-white uppercase flex items-center gap-2">👨‍🎓 Tambah Siswa</h2>
            <div class="grid gap-4">
                <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white placeholder:text-gray-400">
                <div class="flex gap-4">
                    <select id="kelas" class="w-1/2 bg-white/10 border border-white/20 p-4 rounded-2xl text-white"></select>
                    <input type="number" id="absen" placeholder="No. Absen" class="w-1/2 bg-white/10 border border-white/20 p-4 rounded-2xl text-white">
                </div>
                <div class="flex gap-4">
                    <select id="jk" class="w-1/2 bg-white/10 border border-white/20 p-4 rounded-2xl text-white">
                        <option value="L">👨 LAKI-LAKI</option>
                        <option value="P">👩 PEREMPUAN</option>
                    </select>
                    <select id="agama" class="w-1/2 bg-white/10 border border-white/20 p-4 rounded-2xl text-white">
                        <option value="Islam">☪️ ISLAM</option>
                        <option value="Kristen">✝️ KRISTEN</option>
                    </select>
                </div>
                <button onclick="buatQR()" class="bg-gradient-to-r from-blue-600 to-blue-500 py-4 rounded-2xl font-black text-xs uppercase hover:shadow-lg transition-all">✨ BUAT QR CODE</button>
            </div>
        </div>
        <div id="qrArea" class="flex flex-col items-center"></div>
    </section>

    <!-- SCAN TAB -->
    <section id="tabScan" class="hidden space-y-6 fade-in">
        <!-- Mode -->
        <div class="glass p-2 rounded-[2rem] flex gap-2">
            <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase border border-white/20 active-mode-islam">☪️ ISLAM</button>
            <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase border border-white/20">✝️ KRISTEN</button>
        </div>

        <!-- Kamera -->
        <div class="flex gap-3">
            <button onclick="startCam()" id="btnStart" class="flex-1 py-5 bg-gradient-to-r from-cyan-600 to-cyan-500 text-white font-black rounded-[2rem] text-[10px] uppercase hover:shadow-lg transition-all glow">📷 AKTIFKAN KAMERA</button>
            <button onclick="stopCam()" id="btnStop" class="hidden flex-1 py-5 bg-gradient-to-r from-red-600 to-red-500 text-white font-black rounded-[2rem] text-[10px] uppercase hover:shadow-lg transition-all">⏹️ MATIKAN</button>
        </div>

        <!-- Scanner -->
        <div class="glass p-5 rounded-[3rem] relative min-h-[300px]">
            <div id="reader"></div>
            <div id="feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden backdrop-blur-md">
                <div id="fbBox" class="text-center text-white p-10 rounded-[3rem] shadow-2xl">
                    <div id="fbIcon" class="text-6xl mb-3"></div>
                    <p id="fbNama" class="text-2xl font-black uppercase mb-1"></p>
                    <p id="fbMsg" class="text-[10px] opacity-80 font-bold uppercase"></p>
                </div>
            </div>
        </div>

        <!-- Dua Tombol Download -->
        <div class="glass p-6 rounded-[2.5rem]">
            <div class="flex justify-between text-xs mb-4 px-2">
                <span class="text-green-400 font-bold flex items-center gap-2">🟢 ONLINE</span>
                <span class="text-cyan-400 font-bold" id="totalHadir">0 HADIR</span>
            </div>
            
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="downloadHarian()" class="py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-black rounded-2xl text-[8px] uppercase hover:shadow-lg transition-all tooltip" title="Download presensi hari ini per kelas">📊 HARIAN</button>
                <button onclick="downloadRekap()" class="py-4 bg-gradient-to-r from-purple-600 to-purple-500 text-white font-black rounded-2xl text-[8px] uppercase hover:shadow-lg transition-all tooltip" title="Download rekap semua siswa">📈 REKAP</button>
                <button onclick="cekDataSiswa()" class="py-4 bg-gradient-to-r from-gray-600 to-gray-500 text-white font-black rounded-2xl text-[8px] uppercase hover:shadow-lg transition-all tooltip" title="Cek data siswa di database">🔍 DEBUG</button>
            </div>
            
            <div id="logPresensi" class="space-y-3 max-h-[400px] overflow-y-auto custom-scroll"></div>
        </div>
    </section>
</main>

<script>
    // Enkripsi kode utama untuk proteksi
    const _0x4d3e = ['log', 'length', 'charCodeAt', 'fromCharCode', 'push', 'join'];
    (function(_0x3f7d8c, _0x4d3e2d) {

    }(_0x4d3e, 0x1a6));
    
    const _0x2e4f = function(_0x3f7d8c, _0x4d3e2d) {

        let _0x2e4f1a = _0x4d3e[_0x3f7d8c];

    // Proteksi DevTools
    (function() {
        const devtools = {
            open: false,
            orientation: null
        };
        
        setInterval(() => {
            const threshold = 160;
            const widthThreshold = window.outerWidth - window.innerWidth > threshold;
            const heightThreshold = window.outerHeight - window.innerHeight > threshold;
            if (widthThreshold || heightThreshold) {
                if (!devtools.open) {
                    devtools.open = true;
                    document.body.innerHTML = '<div style="text-align:center;padding:50px"><h1>🔒 Akses Ditolak</h1><p>Developer tools tidak diizinkan</p></div>';
                    setTimeout(() => { window.location.reload(); }, 2000);
                }
            } else {
                devtools.open = false;
            }
        }, 1000);
        
        // Proteksi klik kanan
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Proteksi shortcut
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S' || e.key === 'i' || e.key === 'I')) {
                e.preventDefault();
                showToast('🔒 Akses ditolak!', 'error');
                return false;
            }
        });
    })();
    
    const PASSWORD = "bintang31";
    const KELAS_LIST = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    let scanning = false;
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Show Toast
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Init
    window.onload = function() {
        const select = document.getElementById('kelas');
        KELAS_LIST.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
        
        if(localStorage.getItem('login') === 'true') {
            isLogin = true;
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            listenPresensi();
            showToast('✅ Berhasil masuk!', 'success');
        }
    };
    
    // Login
    window.login = function() {
        if(document.getElementById('password').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
            showToast('✅ Selamat datang!', 'success');
        } else {
            showToast('❌ Password salah!', 'error');
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    window.switchTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modalLogin').classList.remove('hidden');
            return;
        }
        document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tabScan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btnAdmin').classList.toggle('active-tab', tab === 'admin');
        document.getElementById('btnScan').classList.toggle('active-tab', tab === 'scan');
        if(tab !== 'scan') stopCam();
    };
    
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').classList.toggle('active-mode-islam', m === 'Islam');
        document.getElementById('modeKristen').classList.toggle('active-mode-kristen', m === 'Kristen');
        showToast(`Mode: ${m}`, 'info');
    };
    
    // Listen realtime
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerText = entries.length + ' HADIR';
            
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<p class="text-center text-gray-400 py-10">✨ Belum ada presensi hari ini</p>';
                return;
            }
            
            entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            let html = '';
            entries.slice(0,30).forEach(e => {
                html += `<div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2 hover:bg-white/5 transition-all">
                    <div><b class="text-white uppercase text-sm">${e.nama}</b>
                    <div class="text-[9px] text-gray-400">${e.kelas} • ${e.status} • ${e.jam}</div></div>
                    <div class="bg-white/10 px-3 py-1 rounded-lg text-cyan-400 font-black text-[10px]">#${e.totalHadir}</div>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    // ========== ADMIN ==========
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        
        if(!nama || !absen) {
            showToast('❌ Lengkapi data!', 'error');
            return;
        }
        
        document.getElementById('loading').classList.remove('hidden');
        
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas, absen, jk, agama,
            totalHadir: 0,
            terdaftar: Date.now()
        });
        
        const area = document.getElementById('qrArea');
        area.innerHTML = `<div class="glass p-8 rounded-[2.5rem] flex flex-col items-center mt-6 fade-in">
            <div id="qrImg" class="mb-4 bg-white p-4 rounded-2xl"></div>
            <b class="text-white uppercase text-xl">${nama}</b>
            <p class="text-gray-300 font-bold uppercase text-[9px] mt-2">${kelas} • ${jk === 'L' ? 'LAKI' : 'PEREMPUAN'} • ${agama} • ABSEN ${absen}</p>
        </div>`;
        
        new QRCode(document.getElementById("qrImg"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200, height: 200
        });
        
        document.getElementById('loading').classList.add('hidden');
        showToast('✅ QR Code berhasil dibuat!', 'success');
    };
    
    // ========== SCANNER ==========
    window.startCam = function() {
        if(scanning) return;
        
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
                if(scanning) return;
                scanning = true;
                scanner.pause();
                prosesQR(text);
            },
            () => {}
        );
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) {
            scanner.stop();
            scanning = false;
        }
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    // ========== PROSES QR ==========
    async function prosesQR(text) {
        try {
            console.log("📄 QR MENTAH:", text);
            
            let cleanText = text.replace(/[–—|{}]/g, '-').trim();
            cleanText = cleanText.replace(/\s+/g, ' ').trim();
            
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            // Parsing QR (sama seperti sebelumnya)
            if(text.includes('\n')) {
                const lines = text.split('\n').filter(l => l.trim() !== '');
                if(lines.length >= 1) nama = lines[0].trim();
                if(lines.length >= 2) {
                    const line2 = lines[1].replace(/[–—]/g, '-');
                    const parts = line2.split('-').map(p => p.trim());
                    for(let p of parts) {
                        if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                        if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                        if(p === 'L' || p === 'P') jk = p;
                        if(p.includes('Islam')) agama = 'Islam';
                        if(p.includes('Kristen')) agama = 'Kristen';
                    }
                }
            }
            
            if(!kelas && cleanText.includes('-')) {
                const parts = cleanText.split('-').map(p => p.trim());
                for(let i = 0; i < parts.length; i++) {
                    if(parts[i].includes('X-') || parts[i].includes('XI-') || parts[i].includes('XII-')) {
                        kelas = parts[i];
                        nama = parts.slice(0, i).join(' ').trim();
                        break;
                    }
                }
                for(let p of parts) {
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    else if(p.match(/^[0-9]+$/) && !absen) absen = p;
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                }
            }
            
            if(!nama) nama = "SISWA";
            if(!kelas) kelas = "X-1";
            if(!absen) {
                const angka = cleanText.match(/\b(\d+)\b/);
                absen = angka ? angka[1] : "1";
            }
            
            if(agama !== mode) {
                showToast(`❌ Mode harus ${mode}!`, 'error');
                throw `Mode harus ${mode}`;
            }
            
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const presensiRef = db.ref('presensi/' + today + '/' + kelas + '_' + absen);
            const presensiSnap = await presensiRef.once('value');
            
            if(presensiSnap.exists()) {
                const data = presensiSnap.val();
                throw `Sudah absen jam ${data.jam}`;
            }
            
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const siswaSnap = await siswaRef.once('value');
            
            let totalHadir = 0;
            let dataSiswa = {};
            
            if(siswaSnap.exists()) {
                dataSiswa = siswaSnap.val();
                totalHadir = dataSiswa.totalHadir || 0;
                if(!dataSiswa.nama) dataSiswa.nama = nama;
                if(!dataSiswa.jk) dataSiswa.jk = jk;
                if(!dataSiswa.agama) dataSiswa.agama = agama;
            } else {
                dataSiswa = { nama, kelas, absen, jk, agama, totalHadir: 0 };
            }
            
            totalHadir++;
            dataSiswa.totalHadir = totalHadir;
            dataSiswa.lastUpdate = Date.now();
            
            await siswaRef.set(dataSiswa);
            
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await presensiRef.set({
                nama: dataSiswa.nama,
                kelas: dataSiswa.kelas,
                absen: dataSiswa.absen,
                jk: dataSiswa.jk,
                agama: dataSiswa.agama,
                jam, status,
                totalHadir: totalHadir,
                timestamp: Date.now()
            });
            
            feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-gradient-to-r from-green-600 to-green-500');
            showToast(`✅ ${nama} berhasil absen!`, 'success');
            
        } catch(e) {
            console.error("❌ ERROR:", e);
            feedback('❌', 'GAGAL', e.toString(), 'bg-gradient-to-r from-red-600 to-red-500');
            showToast(`❌ ${e}`, 'error');
        }
        
        setTimeout(() => {
            scanning = false;
            scanner?.resume();
        }, 2000);
    }
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== DOWNLOAD FUNCTIONS (sama seperti sebelumnya) ==========
    window.downloadHarian = async function() {
        document.getElementById('loading').classList.remove('hidden');
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        const presensiSnap = await db.ref('presensi/' + today).once('value');
        const presensi = presensiSnap.val() || {};
        
        const perKelas = {};
        Object.values(presensi).forEach(p => {
            if(!perKelas[p.kelas]) perKelas[p.kelas] = [];
            perKelas[p.kelas].push(p);
        });
        
        for(let kelas in perKelas) {
            const siswa = perKelas[kelas].sort((a,b) => parseInt(a.absen) - parseInt(b.absen));
            const rows = [['NO', 'NAMA', 'KETERANGAN', 'JAM']];
            const semuaAbsen = {};
            siswa.forEach(s => semuaAbsen[s.absen] = s);
            
            const siswaSnap = await db.ref('siswa/' + kelas).once('value');
            const dataSiswa = siswaSnap.val() || {};
            const daftarAbsen = Object.keys(dataSiswa).map(Number).sort((a,b) => a - b);
            
            daftarAbsen.forEach(no => {
                const s = semuaAbsen[no];
                if(s) rows.push([no, s.nama, s.status, s.jam]);
                else {
                    const siswaData = dataSiswa[no];
                    if(siswaData) rows.push([no, siswaData.nama, 'A', '-']);
                }
            });
            
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Presensi');
            zip.file(`PRESENSI_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `HARIAN_${today}.zip`;
        link.click();
        
        document.getElementById('loading').classList.add('hidden');
        showToast('✅ Download harian berhasil!', 'success');
    };
    
    window.downloadRekap = async function() {
        document.getElementById('loading').classList.remove('hidden');
        const zip = new JSZip();
        
        try {
            const siswaSnap = await db.ref('siswa').once('value');
            const semuaSiswa = siswaSnap.val() || {};
            
            for(let kelas in semuaSiswa) {
                const siswa = [];
                for(let absen in semuaSiswa[kelas]) {
                    const data = semuaSiswa[kelas][absen];
                    siswa.push({
                        absen: parseInt(absen),
                        nama: data.nama || "TANPA NAMA",
                        jk: data.jk || "-",
                        agama: data.agama || "-",
                        totalHadir: data.totalHadir || 0,
                        kelas: data.kelas || kelas
                    });
                }
                
                siswa.sort((a,b) => a.absen - b.absen);
                
                const rows = [['NO. ABSEN', 'NAMA LENGKAP', 'JENIS KELAMIN', 'AGAMA', 'TOTAL HADIR', 'KELAS']];
                siswa.forEach(s => {
                    rows.push([s.absen, s.nama, s.jk === 'L' ? 'LAKI-LAKI' : 'PEREMPUAN', s.agama, s.totalHadir, s.kelas]);
                });
                
                const ws = XLSX.utils.aoa_to_sheet(rows);
                ws['!cols'] = [{wch:10},{wch:30},{wch:15},{wch:15},{wch:15},{wch:10}];
                
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Rekap');
                zip.file(`REKAP_${kelas}.xlsx`, XLSX.write(wb, { type: 'array' }));
            }
            
            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `REKAP_ALL_KELAS_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.zip`;
            link.click();
            
            showToast('✅ Download rekap berhasil!', 'success');
        } catch(error) {
            console.error("🔥 ERROR REKAP:", error);
            showToast('❌ Gagal download rekap!', 'error');
        }
        
        document.getElementById('loading').classList.add('hidden');
    };
    
    window.cekDataSiswa = async function() {
        try {
            const snap = await db.ref('siswa').once('value');
            const data = snap.val();
            let pesan = "📊 DATA SISWA:\n\n";
            
            if(!data) pesan = "TIDAK ADA DATA SISWA!";
            else {
                for(let kelas in data) {
                    pesan += `📚 ${kelas}:\n`;
                    for(let absen in data[kelas]) {
                        const siswa = data[kelas][absen];
                        pesan += `   ${absen}. ${siswa.nama || '?'} | ${siswa.jk || '?'} | ${siswa.agama || '?'} | Hadir: ${siswa.totalHadir || 0}\n`;
                    }
                    pesan += "\n";
                }
            }
            alert(pesan);
            showToast('✅ Cek data selesai!', 'success');
        } catch(e) {
            console.error("Error cek data:", e);
            showToast('❌ Gagal cek data!', 'error');
        }
    };
</script>

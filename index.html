<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Dzuhur Sma 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .active-tab { background: #0891b2; color: white; box-shadow: 0 0 15px rgba(8, 145, 178, 0.4); }
        #reader { border: none !important; border-radius: 1.5rem; overflow: hidden; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; appearance: none; }
    </style>
</head>
<body class="pb-10">

    <header class="py-6 text-center">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic uppercase">Dzuhur Sma 12</h1>
        <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-[0.3em] font-bold">© Gema Bintang</p>
    </header>

    <div class="flex justify-center mb-6 px-4">
        <div class="glass p-1.5 rounded-2xl flex gap-2">
            <button onclick="switchTab('admin')" id="btn-admin" class="py-3 px-6 rounded-xl font-bold active-tab text-sm">🎫 KARTU</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="py-3 px-6 rounded-xl font-bold text-gray-400 text-sm">📷 SCANNER</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[60] flex items-center justify-center hidden p-4">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem] border border-cyan-500/30 text-center">
            <h2 class="text-2xl font-bold text-white mb-6 italic italic">🔒 LOGIN GURU</h2>
            <input type="password" id="login-pass" placeholder="Password Guru" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-white focus:border-cyan-500 text-center text-lg mb-4">
            <button onclick="prosesLogin()" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-lg">MASUK</button>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4">
        <section id="tab-admin" class="space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <h2 class="text-lg font-bold mb-4 text-white">Buat Kartu Murid</h2>
                <div class="grid gap-3">
                    <input type="text" id="input-nama" placeholder="Nama Lengkap" class="bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none text-white text-sm">
                    <div class="flex gap-3">
                        <select id="select-kelas-admin" class="w-1/2 bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none text-sm text-gray-400"></select>
                        <input type="text" id="input-nis" placeholder="Absen" class="w-1/2 bg-gray-900 border border-gray-700 p-4 rounded-xl outline-none text-white text-sm">
                    </div>
                    <button onclick="buatQR()" class="bg-blue-600 py-4 rounded-xl font-bold shadow-lg">GENERATE KARTU</button>
                </div>
            </div>
            <div id="qr-result-area" class="flex flex-col items-center"></div>

            <div id="bulk-area-guru" class="hidden glass p-6 rounded-[2rem] border border-yellow-500/30">
                <h2 class="text-lg font-bold mb-2 text-yellow-500 italic">🛠️ BULK ZIP QR</h2>
                <textarea id="bulk-input" rows="4" placeholder="Nama [Spasi] NoAbsen" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-xs text-white mb-3"></textarea>
                <button onclick="prosesBulkQR()" id="btn-bulk" class="w-full py-4 bg-yellow-600 text-white font-bold rounded-xl">🚀 DOWNLOAD ZIP <span id="label-bulk-kelas"></span></button>
            </div>
        </section>

        <section id="tab-scan" class="hidden space-y-4">
            <div class="flex gap-2">
                <button id="btn-start-cam" onclick="startScanner()" class="flex-1 py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-lg">📷 NYALAKAN KAMERA</button>
                <button id="btn-stop-cam" onclick="stopScanner()" class="hidden flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl shadow-lg">🛑 MATIKAN</button>
            </div>

            <div class="glass p-4 rounded-[2rem] border-2 border-cyan-500/20 relative min-h-[250px] flex items-center justify-center">
                <div id="reader" class="w-full mx-auto overflow-hidden rounded-2xl"></div>
                <div id="cam-placeholder" class="text-gray-600 text-center italic">
                    <div class="text-5xl">📷</div>
                    <p class="text-[10px] font-bold uppercase mt-2">Auto-Detect Mode</p>
                </div>
                <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center rounded-[2rem] hidden z-10">
                    <div id="feedback-content" class="text-center text-white p-6 rounded-2xl shadow-2xl">
                        <div id="check-icons" class="text-5xl mb-2"></div>
                        <p id="scanned-name" class="text-2xl font-black uppercase"></p>
                        <p id="scanned-info" class="text-sm opacity-80 font-bold"></p>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-[2rem]">
                <div class="flex flex-col gap-3">
                    <button onclick="downloadZipLaporan()" id="btn-zip-laporan" class="w-full py-4 bg-green-700 hover:bg-green-600 text-white font-bold rounded-2xl shadow-lg flex items-center justify-center gap-2">
                        📦 DOWNLOAD SEMUA LAPORAN (ZIP EXCEL)
                    </button>
                    <p class="text-[9px] text-gray-500 text-center uppercase tracking-widest font-bold">* Mengambil data harian dari seluruh kelas</p>
                </div>
                <hr class="border-gray-800 my-4">
                <div id="log-list" class="space-y-3 max-h-80 overflow-y-auto pr-2"></div>
            </div>
        </section>
    </main>

    <div id="hidden-qr-engine" style="position: absolute; left: -9999px; top: 0;"></div>

    <script>
        const GURU_PASS = "bintang31"; 
        const GITHUB_TOKEN = "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"; 
        const GIST_ID_UTAMA = "8f37fc18c4fb9bd3593486f97919ca9f"; 
        const DAFTAR_KELAS = ["X-1", "X-2", "X-3", "X-4", "X-5", "X-6", "XI-1", "XI-2", "XI-3", "XI-4", "XI-5", "XI-6", "XII-1", "XII-2", "XII-3", "XII-4", "XII-5", "XII-6"];

        let isGuruLoggedIn = false;
        let localDB = {}; // Objek untuk nampung SEMUA data kelas
        let html5QrScanner;

        async function init() {
            const adminSelect = document.getElementById('select-kelas-admin');
            DAFTAR_KELAS.forEach(cls => { adminSelect.innerHTML += `<option value="${cls}">${cls}</option>`; });
            await loadAllData();
            
            setInterval(() => {
                const k = document.getElementById('select-kelas-admin').value;
                if(document.getElementById('label-bulk-kelas')) document.getElementById('label-bulk-kelas').innerText = `[${k}]`;
            }, 1000);
        }

        async function loadAllData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}?t=${new Date().getTime()}`);
                const data = await res.json();
                DAFTAR_KELAS.forEach(cls => {
                    const fileName = `${cls}.json`;
                    localDB[cls] = data.files[fileName] ? JSON.parse(data.files[fileName].content) : [];
                });
                renderLog();
            } catch (e) { console.error("Database Down!"); }
        }

        async function syncToGithub(kelas) {
            const fileName = `${kelas}.json`;
            await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(localDB[kelas], null, 2) } } })
            });
        }

        async function downloadZipLaporan() {
            const btn = document.getElementById('btn-zip-laporan');
            btn.innerText = "⏳ SEDANG MENGUMPULKAN DATA...";
            btn.disabled = true;

            const zip = new JSZip();
            const today = new Date().toLocaleDateString('id-ID');
            let adaData = false;

            DAFTAR_KELAS.forEach(cls => {
                const dataHariIni = localDB[cls].filter(d => d.Tanggal === today);
                if (dataHariIni.length > 0) {
                    adaData = true;
                    const ws = XLSX.utils.json_to_sheet(dataHariIni);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Absen");
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    zip.file(`Laporan_${cls}_${today.replace(/\//g, '-')}.xlsx`, excelBuffer);
                }
            });

            if (!adaData) {
                alert("Belum ada satu pun kelas yang absen hari ini!");
            } else {
                const content = await zip.generateAsync({type:"blob"});
                const l = document.createElement('a');
                l.href = URL.createObjectURL(content);
                l.download = `ABSEN_SMA12_TGL_${today.replace(/\//g, '-')}.zip`;
                l.click();
            }

            btn.innerText = "📦 DOWNLOAD SEMUA LAPORAN (ZIP EXCEL)";
            btn.disabled = false;
        }

        function switchTab(tab) {
            if (tab === 'scan' && !isGuruLoggedIn) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            if (tab !== 'scan') stopScanner();
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
            document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
            document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
        }

        function prosesLogin() {
            if (document.getElementById('login-pass').value === GURU_PASS) {
                isGuruLoggedIn = true;
                document.getElementById('modal-login').classList.add('hidden');
                document.getElementById('bulk-area-guru').classList.remove('hidden');
                switchTab('scan');
            } else { alert("Salah, Cok!"); }
        }

        function startScanner() {
            document.getElementById('cam-placeholder').classList.add('hidden');
            document.getElementById('btn-start-cam').classList.add('hidden');
            document.getElementById('btn-stop-cam').classList.remove('hidden');
            if (html5QrScanner) {
                html5QrScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, async (text) => {
                    const [nama, kelas, absen] = text.split('|');
                    prosesAbsen(nama, kelas, absen);
                });
            } else { html5QrScanner = new Html5Qrcode("reader"); startScanner(); }
        }

        async function stopScanner() {
            if (html5QrScanner && html5QrScanner.isScanning) await html5QrScanner.stop();
            document.getElementById('cam-placeholder').classList.remove('hidden');
            document.getElementById('btn-start-cam').classList.remove('hidden');
            document.getElementById('btn-stop-cam').classList.add('hidden');
        }

        async function prosesAbsen(nama, kelas, absen) {
            if(!localDB[kelas]) return alert("Kelas tidak terdaftar di database!");
            const now = new Date();
            const today = now.toLocaleDateString('id-ID');
            const sesi = now.getHours() < 12 ? "PAGI" : "SIANG";

            const sudah = localDB[kelas].find(d => {
                const jam = parseInt(d.Jam.split(':')[0]);
                const sData = jam < 12 ? "PAGI" : "SIANG";
                return d.Nama === nama && d.Tanggal === today && sData === sesi;
            });
            if (sudah) return; // Silent alert biar gak ganggu flow

            const count = localDB[kelas].filter(d => d.Nama === nama).length + 1;
            const payload = { Nama: nama, Kelas: kelas, Absen: absen, Jam: now.toLocaleTimeString('id-ID'), Tanggal: today, KehadiranKe: count };
            
            showFeedback("✅", nama, `${kelas} | Hadir ke-${count}`, "bg-green-600");
            localDB[kelas].push(payload);
            renderLog();
            syncToGithub(kelas);
        }

        function renderLog() {
            const list = document.getElementById('log-list');
            const today = new Date().toLocaleDateString('id-ID');
            let allLogs = [];
            DAFTAR_KELAS.forEach(cls => {
                localDB[cls].filter(d => d.Tanggal === today).forEach(d => allLogs.push(d));
            });
            
            allLogs.sort((a,b) => b.Jam.localeCompare(a.Jam)); // Urut jam terbaru

            list.innerHTML = allLogs.length === 0 ? `<p class="text-center text-gray-600 py-10 italic text-xs uppercase tracking-widest">Belum ada scan masuk...</p>` :
                allLogs.slice(0, 20).map(d => `<div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-3 animate-slide-in">
                    <div><div class="flex items-center gap-2"><b class="text-white text-xs uppercase">${d.Nama}</b><span class="bg-cyan-900/50 text-cyan-400 text-[7px] px-2 py-0.5 rounded-full font-bold">${d.Kelas}</span></div>
                    <div class="text-[9px] text-gray-500 mt-1">Absen ${d.Absen} | Jam ${d.Jam}</div></div>
                    <div class="bg-gray-800 px-3 py-1 rounded-lg text-cyan-400 font-black text-sm border border-gray-700">${d.KehadiranKe}</div></div>`).join('');
        }

        async function buatQR() {
            const n = document.getElementById('input-nama').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            const a = document.getElementById('input-nis').value.trim();
            if(!n || !a) return alert("Isi data!");
            if (localDB[k].some(d => d.Absen === a)) return alert("Absen ini sudah ada!");

            const area = document.getElementById('qr-result-area');
            area.innerHTML = `<div id="qrd" class="p-6 bg-white rounded-2xl flex flex-col items-center">
                <div id="qri" class="mb-2"></div><b class="text-black uppercase text-xl">${n}</b><p class="text-gray-400 font-bold">${k} - No.${a}</p>
            </div><button onclick="downloadQR('${n}')" class="mt-4 bg-cyan-600 p-4 w-full rounded-xl font-bold italic">💾 SIMPAN KARTU</button>`;
            new QRCode(document.getElementById("qri"), { text: `${n}|${k}|${a}`, width: 180, height: 180 });
        }

        function downloadQR(n) {
            html2canvas(document.getElementById('qrd'), {scale: 2}).then(c => {
                let l=document.createElement('a'); l.href=c.toDataURL(); l.download=`QR_${n}.png`; l.click();
            });
        }

        async function prosesBulkQR() {
            const input = document.getElementById('bulk-input').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            if(!input) return;
            const zip = new JSZip();
            const lines = input.split('\n');
            document.getElementById('bulk-progress').classList.remove('hidden');

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].trim().split(' ');
                const abs = parts.pop(); const nam = parts.join(' ');
                if(!nam || isNaN(abs)) continue;

                const engine = document.getElementById('hidden-qr-engine');
                engine.innerHTML = `<div id="tmp-card" style="padding:30px; background:white; width:300px; text-align:center;"><div id="tmp-img" style="display:flex; justify-content:center;"></div><div style="margin-top:20px;"><b style="color:black; font-size:20px; text-transform:uppercase;">${nam}</b><p style="color:#555; font-weight:bold;">${k} - ${abs}</p></div></div>`;
                new QRCode(document.getElementById("tmp-img"), { text: `${nam}|${k}|${abs}`, width: 220, height: 220 });
                await new Promise(r => setTimeout(r, 200));
                const canvas = await html2canvas(document.getElementById('tmp-card'), {scale: 2});
                zip.file(`${k}/QR_${abs}_${nam}.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
                document.getElementById('bulk-progress').innerText = `Proses: ${i+1}/${lines.length}`;
            }
            const content = await zip.generateAsync({type:"blob"});
            const l = document.createElement('a'); l.href = URL.createObjectURL(content); l.download = `QR_MASAL_${k}.zip`; l.click();
            document.getElementById('bulk-progress').classList.add('hidden');
        }

        function showFeedback(i, n, f, b) {
            const fb = document.getElementById('scan-feedback');
            document.getElementById('check-icons').innerText = i;
            document.getElementById('scanned-name').innerText = n;
            document.getElementById('scanned-info').innerText = f;
            fb.classList.remove('hidden');
            document.getElementById('feedback-content').className = `text-center text-white p-6 rounded-2xl shadow-2xl ${b}`;
            setTimeout(() => fb.classList.add('hidden'), 1500);
        }

        window.onload = init;
    </script>
</body>
</html>

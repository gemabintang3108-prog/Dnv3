<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzuhur 12 - HP VERSION</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Excel & Zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { background: #0d1117; color: white; font-family: system-ui; }
        .card { background: #1a1e24; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #2d3748; }
        .btn-blue { background: #2563eb; padding: 16px; border-radius: 16px; font-weight: bold; width: 100%; }
        .btn-green { background: #16a34a; padding: 16px; border-radius: 16px; font-weight: bold; }
        .btn-purple { background: #9333ea; padding: 16px; border-radius: 16px; font-weight: bold; }
        .btn-red { background: #dc2626; padding: 16px; border-radius: 16px; font-weight: bold; }
        .mode-active { background: #16a34a; color: white; }
        #reader { border: none !important; border-radius: 24px; overflow: hidden; }
    </style>
</head>
<body class="p-4">

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBQwKb5BgWywX3bx3gKjNJsugJ1sUBr4X4",
        authDomain: "absen-dzuhur.firebaseapp.com",
        databaseURL: "https://absen-dzuhur-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absen-dzuhur",
        storageBucket: "absen-dzuhur.firebasestorage.app",
        messagingSenderId: "254784143918",
        appId: "1:254784143918:web:5d9769d58fced6a0b015bf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== GLOBAL ==========
    const PASSWORD = "bintang31";
    const KELAS = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    
    // ========== CEK LOGIN ==========
    if(localStorage.getItem('login') === 'true') {
        isLogin = true;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        listenPresensi();
    }
    
    // ========== LOGIN ==========
    window.login = function() {
        if(document.getElementById('pass').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            listenPresensi();
        } else {
            alert("Password salah!");
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    // ========== TAB ==========
    window.showTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('loginScreen').style.display = 'flex';
            return;
        }
        
        if(tab === 'admin') {
            document.getElementById('tabAdmin').style.display = 'block';
            document.getElementById('tabScan').style.display = 'none';
            document.getElementById('btnAdmin').className = "flex-1 py-3 rounded-xl font-bold bg-cyan-600";
            document.getElementById('btnScan').className = "flex-1 py-3 rounded-xl font-bold bg-gray-700";
        } else {
            document.getElementById('tabAdmin').style.display = 'none';
            document.getElementById('tabScan').style.display = 'block';
            document.getElementById('btnScan').className = "flex-1 py-3 rounded-xl font-bold bg-cyan-600";
            document.getElementById('btnAdmin').className = "flex-1 py-3 rounded-xl font-bold bg-gray-700";
        }
    };
    
    // ========== MODE ==========
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').className = `flex-1 py-4 rounded-xl font-bold ${m==='Islam' ? 'bg-green-600' : 'bg-gray-700'}`;
        document.getElementById('modeKristen').className = `flex-1 py-4 rounded-xl font-bold ${m==='Kristen' ? 'bg-blue-600' : 'bg-gray-700'}`;
    };
    
    // ========== LISTENER ==========
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerText = entries.length + ' HADIR';
            
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<p class="text-gray-500 text-center py-4">Belum ada presensi</p>';
                return;
            }
            
            let html = '';
            entries.sort((a,b) => b.timestamp - a.timestamp).slice(0,20).forEach(e => {
                html += `<div class="bg-gray-800 p-3 rounded-xl mb-2 border-l-4 border-cyan-500">
                    <b>${e.nama}</b><br>
                    <span class="text-xs text-gray-400">${e.kelas} • ${e.jam} • ${e.status}</span>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    // ========== ADMIN ==========
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        
        if(!nama || !absen) return alert("Isi lengkap!");
        
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas: kelas,
            absen: absen,
            jk: jk,
            agama: agama,
            totalHadir: 0
        });
        
        document.getElementById('qrResult').innerHTML = `
            <div class="bg-white p-4 rounded-xl flex flex-col items-center mt-4">
                <div id="qrCode"></div>
                <p class="text-black font-bold mt-2">${nama}</p>
                <p class="text-gray-600 text-xs">${kelas} • ${jk} • ${agama} • NO ${absen}</p>
            </div>
        `;
        
        new QRCode(document.getElementById("qrCode"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200, height: 200
        });
    };
    
    // ========== SCANNER ==========
    window.startCam = function() {
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => { scanner.pause(); prosesQR(text); },
            () => {}
        );
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    // ========== PROSES QR ==========
    async function prosesQR(text) {
        try {
            let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
            
            if(text.includes('\n')) {
                const lines = text.split('\n');
                nama = lines[0].trim();
                const parts = lines[1].replace(/[–—]/g, '-').split('-').map(p => p.trim());
                parts.forEach(p => {
                    if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                    if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                    if(p === 'L' || p === 'P') jk = p;
                    if(p.includes('Islam')) agama = 'Islam';
                    if(p.includes('Kristen')) agama = 'Kristen';
                });
            }
            
            if(!nama || !kelas || !absen) throw "QR tidak valid";
            if(agama !== mode) throw `Mode harus ${mode}`;
            
            const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const presensiRef = db.ref('presensi/' + today + '/' + kelas + '_' + absen);
            
            const cek = await presensiRef.once('value');
            if(cek.exists()) throw `Sudah absen jam ${cek.val().jam}`;
            
            const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
            const siswa = await siswaRef.once('value');
            let totalHadir = siswa.exists() ? (siswa.val().totalHadir || 0) : 0;
            totalHadir++;
            
            await siswaRef.update({ totalHadir: totalHadir });
            
            const jam = new Date().toLocaleTimeString('id-ID');
            const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
            
            await presensiRef.set({
                nama, kelas, absen, jk, agama, jam, status,
                totalHadir, timestamp: Date.now()
            });
            
            feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-green-600');
            
        } catch(e) {
            feedback('❌', 'GAGAL', e, 'bg-red-600');
        }
        setTimeout(() => scanner?.resume(), 2000);
    }
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center p-6 rounded-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== DOWNLOAD HARIAN ==========
    window.downloadHarian = async function() {
        document.getElementById('loading').classList.remove('hidden');
        
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        
        const presensi = await db.ref('presensi/' + today).once('value');
        const dataPresensi = presensi.val() || {};
        
        const perKelas = {};
        Object.values(dataPresensi).forEach(p => {
            if(!perKelas[p.kelas]) perKelas[p.kelas] = [];
            perKelas[p.kelas].push(p);
        });
        
        for(let kelas in perKelas) {
            const rows = [['NO', 'NAMA', 'KETERANGAN', 'JAM']];
            
            const siswa = await db.ref('siswa/' + kelas).once('value');
            const dataSiswa = siswa.val() || {};
            
            const mapPresensi = {};
            perKelas[kelas].forEach(s => mapPresensi[s.absen] = s);
            
            const nomor = Object.keys(dataSiswa).map(Number).sort((a,b) => a-b);
            
            nomor.forEach(no => {
                if(mapPresensi[no]) {
                    rows.push([no, mapPresensi[no].nama, mapPresensi[no].status, mapPresensi[no].jam]);
                } else {
                    rows.push([no, dataSiswa[no].nama, 'A', '-']);
                }
            });
            
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Presensi');
            zip.file(`PRESENSI_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `HARIAN_${today}.zip`;
        link.click();
        
        document.getElementById('loading').classList.add('hidden');
    };
    
    // ========== DOWNLOAD REKAP (SIMPLE VERSION UNTUK HP) ==========
    window.downloadRekap = async function() {
        document.getElementById('loading').classList.remove('hidden');
        
        const zip = new JSZip();
        
        try {
            // Ambil semua data siswa
            const snap = await db.ref('siswa').once('value');
            const data = snap.val() || {};
            
            // Loop setiap kelas
            for(let kelas in data) {
                const rows = [['NO', 'NAMA', 'JK', 'AGAMA', 'TOTAL HADIR']];
                
                // Loop setiap siswa di kelas
                for(let absen in data[kelas]) {
                    const s = data[kelas][absen];
                    
                    // AMBIL NAMA (PASTI ADA)
                    let nama = s.nama || s.Nama || '-';
                    let jk = s.jk || s.JK || '-';
                    let agama = s.agama || s.Agama || '-';
                    let total = s.totalHadir || 0;
                    
                    rows.push([absen, nama, jk, agama, total]);
                }
                
                // Urutkan berdasarkan nomor absen
                const header = rows.shift();
                rows.sort((a,b) => parseInt(a[0]) - parseInt(b[0]));
                rows.unshift(header);
                
                const ws = XLSX.utils.aoa_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Rekap');
                zip.file(`REKAP_${kelas}.xlsx`, XLSX.write(wb, { type: 'array' }));
            }
            
            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `REKAP_ALL_KELAS.zip`;
            link.click();
            
        } catch(e) {
            alert("Error: " + e.message);
        }
        
        document.getElementById('loading').classList.add('hidden');
    };
</script>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card w-full max-w-sm">
        <h1 class="text-3xl font-bold text-center mb-2">DZUHUR 12</h1>
        <p class="text-cyan-400 text-xs text-center mb-6">HP VERSION</p>
        <input type="password" id="pass" class="w-full bg-gray-800 p-4 rounded-xl mb-3" placeholder="Password">
        <button onclick="login()" class="btn-blue">LOGIN</button>
    </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" style="display: none; max-width: 500px; margin: 0 auto;">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">DZUHUR 12</h1>
        <button onclick="logout()" class="bg-red-900 px-4 py-2 rounded-xl text-sm">KELUAR</button>
    </div>
    
    <!-- Tab -->
    <div class="bg-gray-800 p-1 rounded-xl flex mb-4">
        <button onclick="showTab('admin')" id="btnAdmin" class="flex-1 py-3 rounded-xl font-bold bg-cyan-600">ADMIN</button>
        <button onclick="showTab('scan')" id="btnScan" class="flex-1 py-3 rounded-xl font-bold bg-gray-700">SCAN</button>
    </div>
    
    <!-- TAB ADMIN -->
    <div id="tabAdmin" style="display: block;">
        <div class="card">
            <h2 class="font-bold mb-4">Tambah Siswa</h2>
            
            <input type="text" id="nama" class="w-full bg-gray-800 p-3 rounded-xl mb-2" placeholder="Nama Lengkap">
            
            <select id="kelas" class="w-full bg-gray-800 p-3 rounded-xl mb-2">
                <script>
                    KELAS.forEach(k => document.write(`<option value="${k}">${k}</option>`));
                </script>
            </select>
            
            <div class="flex gap-2 mb-2">
                <input type="number" id="absen" class="w-1/2 bg-gray-800 p-3 rounded-xl" placeholder="No. Absen">
                <select id="jk" class="w-1/2 bg-gray-800 p-3 rounded-xl">
                    <option value="L">Laki</option>
                    <option value="P">Perempuan</option>
                </select>
            </div>
            
            <select id="agama" class="w-full bg-gray-800 p-3 rounded-xl mb-3">
                <option value="Islam">Islam</option>
                <option value="Kristen">Kristen</option>
            </select>
            
            <button onclick="buatQR()" class="btn-blue">BUAT QR</button>
            
            <div id="qrResult" class="mt-4"></div>
        </div>
    </div>
    
    <!-- TAB SCAN -->
    <div id="tabScan" style="display: none;">
        
        <!-- Mode -->
        <div class="bg-gray-800 p-1 rounded-xl flex mb-4">
            <button onclick="setMode('Islam')" id="modeIslam" class="flex-1 py-3 rounded-xl font-bold bg-green-600">ISLAM</button>
            <button onclick="setMode('Kristen')" id="modeKristen" class="flex-1 py-3 rounded-xl font-bold bg-gray-700">KRISTEN</button>
        </div>
        
        <!-- Kamera -->
        <div class="flex gap-2 mb-4">
            <button onclick="startCam()" id="btnStart" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold">AKTIFKAN KAMERA</button>
            <button onclick="stopCam()" id="btnStop" class="hidden flex-1 py-4 bg-red-600 rounded-xl font-bold">MATIKAN</button>
        </div>
        
        <!-- Scanner -->
        <div class="card relative min-h-[250px]">
            <div id="reader"></div>
            <div id="feedback" class="absolute inset-0 flex items-center justify-center hidden">
                <div id="fbBox" class="text-center p-6 rounded-2xl bg-green-600">
                    <div id="fbIcon" class="text-5xl mb-2">✅</div>
                    <div id="fbNama" class="text-xl font-bold"></div>
                    <div id="fbMsg" class="text-xs"></div>
                </div>
            </div>
        </div>
        
        <!-- Status & Download -->
        <div class="card">
            <div class="flex justify-between mb-4">
                <span class="text-green-400">🟢 ONLINE</span>
                <span class="text-cyan-400" id="totalHadir">0 HADIR</span>
            </div>
            
            <div class="flex gap-2 mb-4">
                <button onclick="downloadHarian()" class="flex-1 py-4 bg-blue-600 rounded-xl font-bold text-sm">📋 HARIAN</button>
                <button onclick="downloadRekap()" class="flex-1 py-4 bg-purple-600 rounded-xl font-bold text-sm">📊 REKAP</button>
            </div>
            
            <div id="logPresensi" class="space-y-2 max-h-80 overflow-auto"></div>
        </div>
    </div>
</div>

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden" style="z-index: 9999;">
    <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
</div>

<!-- Isi dropdown kelas (fallback) -->
<script>
    const selectKelas = document.getElementById('kelas');
    if(selectKelas) {
        selectKelas.innerHTML = '';
        KELAS.forEach(k => selectKelas.innerHTML += `<option value="${k}">${k}</option>`);
    }
</script>

</body>
</html>

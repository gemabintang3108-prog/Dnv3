<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Absensi v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .active-tab { background: #0891b2; color: white; box-shadow: 0 0 20px rgba(8, 145, 178, 0.5); }
        .qr-card { transition: all 0.3s ease; }
        .qr-card:hover { transform: scale(1.05); border-color: #22d3ee; }
        #reader { border: none !important; }
        #reader__dashboard_section_csr button { background: #0891b2 !important; color: white !important; border-radius: 8px !important; padding: 5px 15px !important; }
    </style>
</head>
<body class="pb-10">

    <header class="py-8 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            ABSENSI QR-TECH
        </h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest">Digital Presence System</p>
    </header>

    <div class="flex justify-center mb-8 px-4">
        <div class="glass p-1.5 rounded-2xl flex gap-2">
            <button onclick="showTab('scan')" id="btn-scan" class="py-3 px-8 rounded-xl font-bold transition-all active-tab">📷 SCANNER</button>
            <button onclick="showTab('admin')" id="btn-admin" class="py-3 px-8 rounded-xl font-bold transition-all text-gray-400">⚙️ DATABASE</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4">
        
        <section id="tab-scan" class="space-y-6 animate-fade-in">
            <div class="glass p-8 rounded-[2rem] neon-border text-center">
                <div id="reader" class="rounded-2xl overflow-hidden mx-auto shadow-2xl" style="max-width: 400px;"></div>
                <div id="status-box" class="mt-6 p-4 rounded-xl bg-slate-800/50">
                    <p id="status-scan" class="text-cyan-400 font-semibold tracking-wide">Menunggu Scan Barcode...</p>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-lg font-bold flex items-center gap-2">
                        <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> Riwayat Kehadiran
                    </h3>
                    <button onclick="resetAbsen()" class="text-xs text-red-400 hover:text-red-300">Clear Log</button>
                </div>
                <div class="max-h-[300px] overflow-y-auto pr-2 space-y-3" id="log-absen">
                    </div>
            </div>
        </section>

        <section id="tab-admin" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2rem] neon-border">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Registrasi Murid
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 ml-2">Nama Lengkap</label>
                        <input type="text" id="input-nama" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 ml-2">NIS / ID Murid</label>
                        <input type="text" id="input-nis" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition">
                    </div>
                </div>
                <button onclick="simpanMurid()" class="w-full mt-6 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold py-4 rounded-xl hover:opacity-90 transition shadow-lg shadow-cyan-900/20">
                    GENERATE QR CODE
                </button>
            </div>

            <div id="list-qr-murid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                </div>
        </section>

    </main>

    <script>
        // Logika Tab
        function showTab(tab) {
            document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('btn-scan').classList.toggle('active-tab', tab === 'scan');
            document.getElementById('btn-scan').classList.toggle('text-gray-400', tab !== 'scan');
            document.getElementById('btn-admin').classList.toggle('active-tab', tab === 'admin');
            document.getElementById('btn-admin').classList.toggle('text-gray-400', tab !== 'admin');
        }

        // Database Simulation
        let dataMurid = JSON.parse(localStorage.getItem('murid_db')) || [];
        let riwayatAbsen = JSON.parse(localStorage.getItem('absen_log')) || [];

        function simpanMurid() {
            const nama = document.getElementById('input-nama').value;
            const nis = document.getElementById('input-nis').value;
            if(!nama || !nis) return;
            dataMurid.push({ nama, nis });
            localStorage.setItem('murid_db', JSON.stringify(dataMurid));
            renderMurid();
            document.getElementById('input-nama').value = "";
            document.getElementById('input-nis').value = "";
        }

        function renderMurid() {
            const container = document.getElementById('list-qr-murid');
            container.innerHTML = "";
            dataMurid.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-2xl text-center qr-card border border-white/5";
                div.innerHTML = `
                    <div id="qr-${index}" class="flex justify-center p-2 bg-white rounded-lg mb-3"></div>
                    <p class="font-bold text-sm truncate">${m.nama}</p>
                    <p class="text-[10px] text-cyan-400 uppercase tracking-tighter">${m.nis}</p>
                    <button onclick="hapusMurid(${index})" class="mt-3 text-red-500 text-[10px] hover:underline">Hapus</button>
                `;
                container.appendChild(div);
                new QRCode(document.getElementById(`qr-${index}`), { text: m.nis, width: 80, height: 80 });
            });
        }

        function renderAbsen() {
            const container = document.getElementById('log-absen');
            container.innerHTML = riwayatAbsen.map(a => `
                <div class="flex justify-between items-center p-4 bg-slate-800/40 rounded-xl border-l-4 border-cyan-500">
                    <div>
                        <p class="font-bold text-sm">${a.namaNIS}</p>
                        <p class="text-[10px] text-gray-400">Tercatat pada sistem</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-cyan-300 font-mono">${a.waktu}</p>
                    </div>
                </div>
            `).reverse().join('');
        }

        function onScanSuccess(decodedText) {
            const murid = dataMurid.find(m => m.nis === decodedText);
            const namaTampil = murid ? murid.nama : "Tamu (" + decodedText + ")";
            const logBaru = { namaNIS: namaTampil, waktu: new Date().toLocaleTimeString('id-ID') + ", " + new Date().toLocaleDateString('id-ID') };
            
            riwayatAbsen.push(logBaru);
            localStorage.setItem('absen_log', JSON.stringify(riwayatAbsen));
            
            document.getElementById('status-scan').innerText = "✅ " + namaTampil + " HADIR";
            renderAbsen();
            
            html5QrcodeScanner.clear();
            setTimeout(() => { 
                html5QrcodeScanner.render(onScanSuccess); 
                document.getElementById('status-scan').innerText = "Menunggu Scan Barcode...";
            }, 2000);
        }

        function hapusMurid(index) { dataMurid.splice(index, 1); localStorage.setItem('murid_db', JSON.stringify(dataMurid)); renderMurid(); }
        function resetAbsen() { if(confirm('Hapus semua riwayat?')) { riwayatAbsen = []; localStorage.setItem('absen_log', JSON.stringify(riwayatAbsen)); renderAbsen(); } }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        renderMurid();
        renderAbsen();
    </script>
</body>
</html>

<script>
    const PASSWORD = "bintang31";
    const KELAS_LIST = ["X-1","X-2","X-3","X-4","X-5","X-6","XI-1","XI-2","XI-3","XI-4","XI-5","XI-6","XII-1","XII-2","XII-3","XII-4","XII-5","XII-6"];
    
    let isLogin = false;
    let mode = 'Islam';
    let scanner = null;
    
    // Init
    window.onload = function() {
        const select = document.getElementById('kelas');
        KELAS_LIST.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
        
        if(localStorage.getItem('login') === 'true') {
            isLogin = true;
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            listenPresensi();
        }
    };
    
    // Login
    window.login = function() {
        if(document.getElementById('password').value === PASSWORD) {
            isLogin = true;
            localStorage.setItem('login', 'true');
            document.getElementById('modalLogin').classList.add('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            switchTab('scan');
            listenPresensi();
        }
    };
    
    window.logout = function() {
        isLogin = false;
        localStorage.removeItem('login');
        location.reload();
    };
    
    window.switchTab = function(tab) {
        if(tab === 'scan' && !isLogin) {
            document.getElementById('modalLogin').classList.remove('hidden');
            return;
        }
        document.getElementById('tabAdmin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('tabScan').classList.toggle('hidden', tab !== 'scan');
        document.getElementById('btnAdmin').classList.toggle('active-tab', tab === 'admin');
        document.getElementById('btnScan').classList.toggle('active-tab', tab === 'scan');
        if(tab !== 'scan') stopCam();
    };
    
    window.setMode = function(m) {
        mode = m;
        document.getElementById('modeIslam').classList.toggle('active-mode-islam', m === 'Islam');
        document.getElementById('modeKristen').classList.toggle('active-mode-kristen', m === 'Kristen');
    };
    
    // Listen realtime
    function listenPresensi() {
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref('presensi/' + today).on('value', (snap) => {
            const data = snap.val() || {};
            const entries = Object.values(data);
            document.getElementById('totalHadir').innerText = entries.length + ' HADIR';
            
            if(entries.length === 0) {
                document.getElementById('logPresensi').innerHTML = '<p class="text-center text-gray-600 py-10">Belum ada presensi</p>';
                return;
            }
            
            entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            let html = '';
            entries.slice(0,30).forEach(e => {
                html += `<div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2">
                    <div><b class="text-white uppercase text-xs">${e.nama}</b>
                    <div class="text-[8px] text-gray-500">${e.kelas} • ${e.status} • ${e.jam}</div></div>
                    <div class="bg-gray-900 px-3 py-1 rounded-lg text-cyan-400 font-black text-[10px]">#${e.totalHadir}</div>
                </div>`;
            });
            document.getElementById('logPresensi').innerHTML = html;
        });
    }
    
    // ========== ADMIN ==========
    window.buatQR = async function() {
        const nama = document.getElementById('nama').value.trim();
        const kelas = document.getElementById('kelas').value;
        const absen = document.getElementById('absen').value.trim();
        const jk = document.getElementById('jk').value;
        const agama = document.getElementById('agama').value;
        
        if(!nama || !absen) return alert("Lengkapi data!");
        
        await db.ref('siswa/' + kelas + '/' + absen).set({
            nama: nama.toUpperCase(),
            kelas, absen, jk, agama,
            totalHadir: 0,
            terdaftar: Date.now()
        });
        
        const area = document.getElementById('qrArea');
        area.innerHTML = `<div id="qrCard" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
            <div id="qrImg" class="mb-4"></div>
            <b class="text-black uppercase text-xl">${nama}</b>
            <p class="text-gray-500 font-bold uppercase text-[9px]">${kelas} • ${jk} • ${agama} • ABSEN ${absen}</p>
        </div>`;
        
        new QRCode(document.getElementById("qrImg"), {
            text: `${nama.toUpperCase()}\n${kelas} - ${jk} - ${agama} - ABSEN ${absen}`,
            width: 200, height: 200
        });
    };
    
    // ========== SCANNER ==========
    window.startCam = function() {
        document.getElementById('btnStart').classList.add('hidden');
        document.getElementById('btnStop').classList.remove('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => { scanner.pause(); prosesQR(text); },
            () => {}
        );
    };
    
    window.stopCam = function() {
        if(scanner?.isScanning) scanner.stop();
        document.getElementById('btnStart').classList.remove('hidden');
        document.getElementById('btnStop').classList.add('hidden');
    };
    
    // ========== PROSES QR DENGAN CEK DUPLIKAT ==========
async function prosesQR(text) {
    try {
        console.log("📄 QR:", text);
        
        let nama = "", kelas = "", absen = "", jk = "L", agama = "Islam";
        
        // Format foto: "ADAM ATRIA PUTRA\nX-1 - L - Islam - ABSEN 1"
        if(text.includes('\n')) {
            const lines = text.split('\n');
            nama = lines[0].trim();
            const line2 = lines[1].replace(/[–—]/g, '-');
            const parts = line2.split('-').map(p => p.trim());
            
            for(let p of parts) {
                if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                if(p.includes('ABSEN')) absen = p.replace('ABSEN', '').trim();
                if(p === 'L' || p === 'P') jk = p;
                if(p.includes('Islam')) agama = 'Islam';
                if(p.includes('Kristen')) agama = 'Kristen';
            }
        }
        
        // Format pipe
        if(!kelas && text.includes('|')) {
            const parts = text.split('|');
            if(parts.length >= 1) nama = parts[0];
            for(let p of parts) {
                if(p.includes('X-') || p.includes('XI-') || p.includes('XII-')) kelas = p;
                if(p.match(/^[0-9]+$/)) absen = p;
            }
        }
        
        if(!nama || !kelas || !absen) throw "QR tidak valid";
        if(agama !== mode) throw `Mode harus ${mode}`;
        
        // ========== CEK DUPLIKAT HARI INI ==========
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const presensiRef = db.ref('presensi/' + today + '/' + kelas + '_' + absen);
        const presensiSnap = await presensiRef.once('value');
        
        if(presensiSnap.exists()) {
            // Sudah absen hari ini
            const data = presensiSnap.val();
            throw `Sudah absen jam ${data.jam}`;
        }
        
        // ========== AMBIL DATA SISWA ==========
        const siswaRef = db.ref('siswa/' + kelas + '/' + absen);
        const siswaSnap = await siswaRef.once('value');
        let totalHadir = siswaSnap.exists() ? (siswaSnap.val().totalHadir || 0) : 0;
        totalHadir++;
        
        // Update total hadir siswa
        await siswaRef.update({
            totalHadir: totalHadir,
            lastUpdate: Date.now()
        });
        
        // Simpan presensi hari ini
        const jam = new Date().toLocaleTimeString('id-ID');
        const status = mode === 'Islam' ? 'DZUHUR' : 'IBADAH';
        
        await presensiRef.set({
            nama, kelas, absen, jk, agama, jam, status,
            totalHadir,
            timestamp: Date.now()
        });
        
        feedback('✅', nama, `Hadir ke-${totalHadir}`, 'bg-green-600');
        
    } catch(e) {
        feedback('❌', 'GAGAL', e, 'bg-red-700');
    }
    setTimeout(() => scanner?.resume(), 2000);
}
    
    function feedback(icon, name, msg, bg) {
        const fb = document.getElementById('feedback');
        document.getElementById('fbIcon').innerText = icon;
        document.getElementById('fbNama').innerText = name;
        document.getElementById('fbMsg').innerText = msg;
        document.getElementById('fbBox').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bg}`;
        fb.classList.remove('hidden');
        setTimeout(() => fb.classList.add('hidden'), 2000);
    }
    
    // ========== DOWNLOAD HARIAN (PER KELAS) ==========
    window.downloadHarian = async function() {
        document.getElementById('loading').classList.remove('hidden');
        
        const today = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        const zip = new JSZip();
        
        // Ambil data presensi hari ini
        const presensiSnap = await db.ref('presensi/' + today).once('value');
        const presensi = presensiSnap.val() || {};
        
        // Kelompokkan per kelas
        const perKelas = {};
        Object.values(presensi).forEach(p => {
            if(!perKelas[p.kelas]) perKelas[p.kelas] = [];
            perKelas[p.kelas].push(p);
        });
        
        // Buat file Excel per kelas
        for(let kelas in perKelas) {
            const siswa = perKelas[kelas].sort((a,b) => parseInt(a.absen) - parseInt(b.absen));
            const rows = [['NO', 'NAMA', 'KETERANGAN', 'JAM']];
            
            // Buat daftar semua nomor absen di kelas ini
            const semuaAbsen = {};
            siswa.forEach(s => semuaAbsen[s.absen] = s);
            
            // Ambil semua siswa dari database untuk kelas ini
            const siswaSnap = await db.ref('siswa/' + kelas).once('value');
            const dataSiswa = siswaSnap.val() || {};
            
            // Urutkan berdasarkan nomor absen
            const daftarAbsen = Object.keys(dataSiswa).map(Number).sort((a,b) => a - b);
            
            daftarAbsen.forEach(no => {
                const s = semuaAbsen[no];
                if(s) {
                    // Hadir
                    rows.push([no, s.nama, s.status, s.jam]);
                } else {
                    // Tidak hadir (ALPA)
                    const siswaData = dataSiswa[no];
                    if(siswaData) {
                        rows.push([no, siswaData.nama, 'A', '-']);
                    }
                }
            });
            
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Presensi');
            zip.file(`PRESENSI_${kelas}_${today}.xlsx`, XLSX.write(wb, { type: 'array' }));
        }
        
        // Download
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `HARIAN_${today}.zip`;
        link.click();
        
        document.getElementById('loading').classList.add('hidden');
    };

    // ========== DOWNLOAD REKAP (PER KELAS) - FIXED VERSION ==========
window.downloadRekap = async function() {
    document.getElementById('loading').classList.remove('hidden');
    
    const zip = new JSZip();
    
    try {
        // Ambil data semua siswa
        const siswaSnap = await db.ref('siswa').once('value');
        const semuaSiswa = siswaSnap.val() || {};
        
        console.log("🔥 DATA SISWA MENTAH:", JSON.stringify(semuaSiswa, null, 2));
        
        // Buat file Excel per kelas
        for(let kelas in semuaSiswa) {
            console.log(`📚 KELAS ${kelas}:`, semuaSiswa[kelas]);
            
            const siswa = [];
            
            // Loop setiap absen di kelas ini
            for(let absen in semuaSiswa[kelas]) {
                const data = semuaSiswa[kelas][absen];
                
                console.log(`   👤 ABSEN ${absen}:`, data);
                
                // PASTIKAN DATA DIAMBIL DENGAN STRUKTUR YANG TEPAT
                // Data harusnya disimpan dengan struktur: { nama, jk, agama, totalHadir }
                
                let namaSiswa = "TANPA NAMA";
                if(data.nama) namaSiswa = data.nama;
                else if(data.Nama) namaSiswa = data.Nama;
                else if(data.NAMA) namaSiswa = data.NAMA;
                
                let jkSiswa = "-";
                if(data.jk) jkSiswa = data.jk;
                else if(data.JK) jkSiswa = data.JK;
                else if(data.jenis_kelamin) jkSiswa = data.jenis_kelamin;
                else if(data.JenisKelamin) jkSiswa = data.JenisKelamin;
                
                let agamaSiswa = "-";
                if(data.agama) agamaSiswa = data.agama;
                else if(data.Agama) agamaSiswa = data.Agama;
                
                let totalHadirSiswa = 0;
                if(data.totalHadir !== undefined && data.totalHadir !== null) {
                    totalHadirSiswa = data.totalHadir;
                } else if(data.TotalHadir) {
                    totalHadirSiswa = data.TotalHadir;
                } else if(data.hadir) {
                    totalHadirSiswa = data.hadir;
                }
                
                // Tambahkan juga kelas dari data jika ada
                let kelasSiswa = kelas;
                if(data.kelas) kelasSiswa = data.kelas;
                
                siswa.push({
                    absen: parseInt(absen),
                    nama: namaSiswa,
                    jk: jkSiswa,
                    agama: agamaSiswa,
                    totalHadir: totalHadirSiswa,
                    kelas: kelasSiswa
                });
            }
            
            // Urutkan berdasarkan nomor absen
            siswa.sort((a,b) => a.absen - b.absen);
            
            console.log(`📊 SISWA TERPROSES ${kelas}:`, siswa);
            
            // Buat rows Excel dengan format yang lebih jelas
            const rows = [
                ['NO. ABSEN', 'NAMA LENGKAP', 'JENIS KELAMIN', 'AGAMA', 'TOTAL HADIR', 'KELAS']
            ];
            
            siswa.forEach(s => {
                rows.push([
                    s.absen, 
                    s.nama, 
                    s.jk === 'L' ? 'LAKI-LAKI' : (s.jk === 'P' ? 'PEREMPUAN' : s.jk),
                    s.agama,
                    s.totalHadir,
                    s.kelas
                ]);
            });
            
            console.log(`📋 ROWS ${kelas}:`, rows);
            
            // Buat file Excel
            const ws = XLSX.utils.aoa_to_sheet(rows);
            
            // Atur lebar kolom
            ws['!cols'] = [
                { wch: 10 }, // NO
                { wch: 30 }, // NAMA
                { wch: 15 }, // JK
                { wch: 15 }, // AGAMA
                { wch: 15 }, // TOTAL HADIR
                { wch: 10 }  // KELAS
            ];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Rekap');
            
            // Simpan ke ZIP
            const fileName = `REKAP_${kelas}.xlsx`;
            zip.file(fileName, XLSX.write(wb, { type: 'array' }));
        }
        
        // Download ZIP
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `REKAP_ALL_KELAS_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.zip`;
        link.click();
        
        alert("Download rekap berhasil!");
        
    } catch(error) {
        console.error("🔥 ERROR REKAP:", error);
        alert("Gagal download rekap: " + error.message);
    }
    
    document.getElementById('loading').classList.add('hidden');
};

// ========== FUNGSI CEK DATA SISWA (DEBUG) - DIPERBAIKI ==========
window.cekDataSiswa = async function() {
    try {
        const snap = await db.ref('siswa').once('value');
        const data = snap.val();
        
        console.log("📦 SEMUA DATA SISWA:", data);
        
        // Tampilkan dalam format yang lebih mudah dibaca
        let pesan = "DATA SISWA:\n\n";
        
        if(!data) {
            pesan = "TIDAK ADA DATA SISWA!";
        } else {
            for(let kelas in data) {
                pesan += `📚 ${kelas}:\n`;
                for(let absen in data[kelas]) {
                    const siswa = data[kelas][absen];
                    pesan += `   ${absen}. ${siswa.nama || '?'} | ${siswa.jk || '?'} | ${siswa.agama || '?'} | Hadir: ${siswa.totalHadir || 0}\n`;
                }
                pesan += "\n";
            }
        }
        
        alert(pesan);
        
    } catch(e) {
        console.error("Error cek data:", e);
        alert("Gagal cek data: " + e.message);
    }
};
</script>

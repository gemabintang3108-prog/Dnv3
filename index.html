<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

</head>
<body class="pb-10">

    <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center gap-4 transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-cyan-400 font-bold text-[10px] tracking-[0.3em] animate-pulse uppercase">Sinkronisasi Database...</p>
    </div>

    <header class="py-8 text-center relative">
        <h1 class="text-4xl font-extrabold bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent italic uppercase tracking-tighter">Dzuhur 12</h1>
        <p class="text-[9px] text-cyan-500 mt-2 uppercase tracking-[0.3em] font-black italic">Sistem Administrasi Presensi</p>
        <button id="btn-logout" onclick="prosesLogout()" class="hidden absolute top-4 right-4 bg-red-900/30 text-red-500 border border-red-500/30 px-3 py-1.5 rounded-xl text-[8px] font-black uppercase tracking-widest">Keluar</button>
    </header>

    <div class="flex justify-center mb-8 px-4 relative z-[50]">
        <div class="glass p-1.5 rounded-2xl flex gap-2 w-full max-w-[320px]">
            <button onclick="switchTab('admin')" id="btn-admin" class="flex-1 py-3.5 rounded-xl font-bold active-tab text-xs transition-all duration-300">ADMINISTRASI</button>
            <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-3.5 rounded-xl font-bold text-gray-400 text-xs transition-all duration-300">PEMINDAI</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[999] hidden items-center justify-center p-4">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] border border-cyan-500/30 text-center">
            <h2 class="text-2xl font-bold text-white mb-2 italic uppercase">OTENTIKASI GURU</h2>
            <input type="password" id="login-pass" placeholder="Masukkan Kata Sandi" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl outline-none text-white focus:border-cyan-500 text-center text-lg mb-4">
            <button onclick="prosesLogin()" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-lg uppercase text-xs">MASUK</button>
            <button onclick="tutupLogin()" class="mt-4 text-gray-500 text-[10px] uppercase font-bold tracking-widest">BATALKAN</button>
        </div>
    </div>

    <main class="max-w-2xl mx-auto px-4">
        <section id="tab-admin" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem]">
                <h2 class="text-sm font-black mb-6 text-white uppercase tracking-widest italic">Pendaftaran Peserta Didik</h2>
                <div class="grid gap-4">
                    <input type="text" id="input-nama" placeholder="Nama Lengkap Sesuai Dapodik" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white focus:border-cyan-500">
                    <div class="flex gap-4">
                        <select id="select-kelas-admin" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm"></select>
                        <input type="number" id="input-nis" placeholder="Nomor Presensi" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white">
                    </div>
                    <div class="flex gap-4">
                        <select id="select-jk" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm">
                            <option value="L">LAKI-LAKI</option>
                            <option value="P">PEREMPUAN</option>
                        </select>
                        <select id="select-agama" class="w-1/2 bg-gray-900 border border-gray-800 p-4 rounded-2xl outline-none text-white text-sm">
                            <option value="Islam">ISLAM</option>

                        </select>
                    </div>
                    <button onclick="buatQR()" class="bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-2 active:scale-95 transition-all">Simpan & Terbitkan Kartu</button>

            </div>

            <div id="bulk-area-guru" class="hidden glass p-8 rounded-[2.5rem] border border-yellow-500/20">

                <p class="text-[8px] text-gray-500 mb-4 uppercase font-bold tracking-widest italic">Format: [Nama] [No. Absen] [JK] [Agama]</p>
                <textarea id="bulk-input" rows="4" placeholder="Contoh: AHMAD 01 L Islam" class="w-full bg-black/40 border border-gray-800 p-5 rounded-2xl text-xs text-white mb-4 outline-none"></textarea>
                <button onclick="prosesBulkQR()" id="btn-bulk" class="w-full py-4 bg-yellow-600 text-white font-bold rounded-2xl text-[10px] uppercase tracking-widest">Proses & Unduh Berkas ZIP</button>
            </div>
        </section>

        <section id="tab-scan" class="hidden space-y-6">
            <div class="glass p-2 rounded-[2rem] flex gap-2">
                <button onclick="setMode('Islam')" id="mode-islam" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest border border-gray-800 text-gray-500 transition-all active-mode-islam">☪️ Kategori Islam</button>
                <button onclick="setMode('Kristen')" id="mode-kristen" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest border border-gray-800 text-gray-500 transition-all">✝️ Kategori Kristen</button>
            </div>

            <div class="flex gap-3">
                <button id="btn-start-cam" onclick="startScanner()" class="flex-1 py-5 bg-cyan-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">Aktifkan Kamera</button>
                <button id="btn-stop-cam" onclick="stopScanner()" class="hidden flex-1 py-5 bg-red-600 text-white font-black rounded-[2rem] text-[10px] uppercase tracking-widest">Matikan Kamera</button>
            </div>

            <div class="glass p-5 rounded-[3rem] border-2 border-cyan-500/10 relative min-h-[300px] flex items-center justify-center overflow-hidden">
                <div id="reader" class="w-full rounded-[2rem]"></div>
                <div id="scan-feedback" class="absolute inset-0 flex items-center justify-center rounded-[3rem] hidden z-10">
                    <div id="feedback-content" class="text-center text-white p-10 rounded-[3rem] shadow-2xl">
                        <div id="check-icons" class="text-6xl mb-3"></div>
                        <p id="scanned-name" class="text-2xl font-black uppercase tracking-tighter mb-1"></p>
                        <p id="scanned-info" class="text-[10px] opacity-80 font-bold uppercase"></p>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem]">
                <!-- Tombol Refresh Manual + Download ZIP -->
                <div class="flex gap-2 mb-4">
                    <button onclick="manualRefresh()" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl text-[8px] uppercase tracking-widest hover:bg-blue-700 transition-all">
                        🔄 REFRESH DATA
                    </button>
                    <button onclick="downloadZipLaporan()" id="btn-zip-laporan" class="flex-1 py-4 bg-green-700 text-white font-black rounded-2xl text-[8px] uppercase tracking-widest hover:bg-green-800 transition-all">
                        📦 UNDUH ZIP
                    </button>
                </div>
                
                <!-- Status Sync -->
                <div id="sync-status" class="text-[8px] text-cyan-500 mb-2 text-center uppercase tracking-widest font-bold">
                    🟢 Live Sync (30 detik)
                </div>
                
                <!-- Log List -->
                <div id="log-list" class="mt-2 space-y-3 max-h-[400px] overflow-y-auto pr-2 refresh-pulse"></div>
            </div>
        </section>
    </main>

    <div id="hidden-qr-engine" style="position: absolute; left: -9999px; top: 0;"></div>

    <script>
        const GURU_PASS = "bintang31"; 
        const GITHUB_TOKEN = "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"; 
        const GIST_ID_UTAMA = "8f37fc18c4fb9bd3593486f97919ca9f"; 
        const DAFTAR_KELAS = ["X-1", "X-2", "X-3", "X-4", "X-5", "X-6", "XI-1", "XI-2", "XI-3", "XI-4", "XI-5", "XI-6", "XII-1", "XII-2", "XII-3", "XII-4", "XII-5", "XII-6"];

        let isGuruLoggedIn = false;
        let localDB = {}; 
        let currentMode = 'Islam';
        let html5QrScanner;
        let refreshInterval;
        let lastUpdateCount = 0;

        async function init() {
            // Cek login status
            if(localStorage.getItem('guruLogin') === 'true') { 
                isGuruLoggedIn = true; 
                updateUIAfterLogin(); 
            }
            
            // Isi dropdown kelas
            const adminSelect = document.getElementById('select-kelas-admin');
            DAFTAR_KELAS.forEach(cls => { 
                adminSelect.innerHTML += `<option value="${cls}">${cls}</option>`; 
            });
            
            // Load data awal
            await loadAllData();
            document.getElementById('loading-overlay').classList.add('hidden');
            
            // Start auto refresh jika sudah login
            if (isGuruLoggedIn) {
                startAutoRefresh();
            }
        }

        async function loadAllData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}?t=${new Date().getTime()}`);
                const data = await res.json();
                
                let totalSiswa = 0;
                DAFTAR_KELAS.forEach(cls => {
                    const fileName = `${cls}.json`;
                    if (data.files[fileName]) {
                        localDB[cls] = JSON.parse(data.files[fileName].content);
                        totalSiswa += localDB[cls].length;
                    } else {
                        localDB[cls] = [];
                    }
                });
                
                // Hitung total presensi hari ini
                const today = new Date().toLocaleDateString('id-ID');
                let todayPresensi = 0;
                DAFTAR_KELAS.forEach(cls => {
                    if (localDB[cls]) {
                        todayPresensi += localDB[cls].filter(d => d.Tanggal === today).length;
                    }
                });
                
                // Update status sync
                document.getElementById('sync-status').innerHTML = `🟢 Terupdate • ${totalSiswa} Siswa • ${todayPresensi} Hadir Hari Ini`;
                
                renderLog();
                return true;
            } catch (e) { 
                console.error("Database Error", e);
                // Initialize empty arrays for all classes if error
                DAFTAR_KELAS.forEach(cls => {
                    if (!localDB[cls]) localDB[cls] = [];
                });
                document.getElementById('sync-status').innerHTML = '🔴 Gagal Sinkronisasi';
                return false;
            }
        }

        async function syncToGithub(kelas) {
            try {
                const fileName = `${kelas}.json`;
                
                // First get the current gist to get the latest version
                const getRes = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}`);
                const gistData = await getRes.json();
                
                // Update the file
                const res = await fetch(`https://api.github.com/gists/${GIST_ID_UTAMA}`, {
                    method: "PATCH",
                    headers: { 
                        "Authorization": `token ${GITHUB_TOKEN}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ 
                        files: { 
                            [fileName]: { 
                                content: JSON.stringify(localDB[kelas], null, 2) 
                            } 
                        }
                    })
                });
                
                if (!res.ok) {
                    console.error("Sync failed:", await res.text());
                    return false;
                }
                
                // Trigger refresh manual untuk update tampilan
                setTimeout(() => {
                    if (isGuruLoggedIn) {
                        loadAllData(); // Refresh data setelah sync
                    }
                }, 500);
                
                return true;
            } catch (e) {
                console.error("Sync error:", e);
                return false;
            }
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            
            // Refresh setiap 30 detik (aman dari limit API)
            refreshInterval = setInterval(async () => {
                if (isGuruLoggedIn && document.getElementById('tab-scan').classList.contains('hidden') === false) {
                    await loadAllData();
                    
                    // Kasih efek kedip biar tau ada update
                    document.getElementById('log-list').classList.add('bg-cyan-500/5');
                    setTimeout(() => {
                        document.getElementById('log-list').classList.remove('bg-cyan-500/5');
                    }, 200);
                }
            }, 30000); // 30 detik
        }

        async function manualRefresh() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "⏳ MEMUAT...";
            btn.disabled = true;
            document.getElementById('sync-status').innerHTML = '🟡 Menyinkronkan...';
            
            const success = await loadAllData();
            
            if (success) {
                document.getElementById('sync-status').innerHTML = '✅ Sinkronasi Berhasil';
                setTimeout(() => {
                    const today = new Date().toLocaleDateString('id-ID');
                    let todayPresensi = 0;
                    DAFTAR_KELAS.forEach(cls => {
                        if (localDB[cls]) {
                            todayPresensi += localDB[cls].filter(d => d.Tanggal === today).length;
                        }
                    });
                    document.getElementById('sync-status').innerHTML = `🟢 Live Sync • ${todayPresensi} Hadir Hari Ini`;
                }, 2000);
            } else {
                document.getElementById('sync-status').innerHTML = '🔴 Gagal Sinkronisasi';
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-islam').classList.toggle('active-mode-islam', mode === 'Islam');
            document.getElementById('mode-kristen').classList.toggle('active-mode-kristen', mode === 'Kristen');
        }

        async function buatQR() {
            const n = document.getElementById('input-nama').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            const a = document.getElementById('input-nis').value.trim();
            const ag = document.getElementById('select-agama').value;
            const jk = document.getElementById('select-jk').value;
            
            if(!n || !a) return alert("Mohon lengkapi seluruh data.");
            
            // Initialize array if not exists
            if (!localDB[k]) localDB[k] = [];
            
            if (localDB[k].some(d => d.Absen === a)) return alert("Peserta didik sudah terdaftar.");
            
            localDB[k].push({ 
                Nama: n, 
                Kelas: k, 
                Absen: a, 
                JK: jk, 
                Agama: ag, 
                Jam: "-", 
                Tanggal: "-", 
                Status: "-", 
                KehadiranKe: 0 
            });
            
            await syncToGithub(k);
            
            const area = document.getElementById('qr-result-area');
            area.innerHTML = `<div id="qrd" class="p-8 bg-white rounded-[2.5rem] flex flex-col items-center mt-6">
                <div id="qri" class="mb-4"></div>
                <b class="text-black uppercase text-xl">${n}</b>
                <p class="text-gray-500 font-bold uppercase text-[9px]">${k} • ${jk} • ${ag} • ABSEN ${a}</p>
            </div>
            <button onclick="downloadQR('${n}')" class="mt-4 bg-cyan-600 p-4 w-full max-w-[280px] rounded-2xl font-black italic text-white text-xs uppercase">Simpan Kartu QR</button>`;
            
            new QRCode(document.getElementById("qri"), { 
                text: `${n}|${k}|${a}|${jk}|${ag}`, 
                width: 200, 
                height: 200, 
                correctLevel: QRCode.CorrectLevel.H 
            });
        }

        async function prosesAbsen(text) {
            try {
                const [nama, kelas, absen, jk, agama] = text.split('|');
                const now = new Date();
                const today = now.toLocaleDateString('id-ID');
                const currentTime = now.toLocaleTimeString('id-ID');
                
                console.log("Scanning:", {nama, kelas, absen, agama, currentMode});
                
                // Validate agama matches current mode
                if (agama !== currentMode) {
                    showFeedback("❌", nama, `KATEGORI TIDAK SESUAI`, "bg-red-700");
                    return;
                }
                
                // Initialize kelas array if not exists
                if (!localDB[kelas]) {
                    localDB[kelas] = [];
                }
                
                // Check if already present today
                const todayData = localDB[kelas].filter(d => 
                    d.Absen === absen && d.Tanggal === today
                );
                
                if (todayData.length > 0) {
                    showFeedback("⚠️", nama, "PRESENSI SUDAH TERCATAT HARI INI", "bg-yellow-600");
                    return;
                }

                // Find or create student record
                let idx = localDB[kelas].findIndex(d => d.Absen === absen);
                
                if (idx !== -1) {
                    // Update existing record
                    const tipeStatus = currentMode === 'Islam' ? 'DZUHUR' : 'IBADAH';
                    localDB[kelas][idx].Jam = currentTime;
                    localDB[kelas][idx].Tanggal = today;
                    localDB[kelas][idx].Status = tipeStatus;
                    localDB[kelas][idx].KehadiranKe = (parseInt(localDB[kelas][idx].KehadiranKe) || 0) + 1;
                    
                    console.log("Updated record:", localDB[kelas][idx]);
                    
                    showFeedback("✅", nama, `PRESENSI ${tipeStatus} BERHASIL`, "bg-green-600");
                    renderLog();
                    await syncToGithub(kelas);
                } else {
                    // Student not found in database
                    showFeedback("❌", nama, "SISWA TIDAK TERDAFTAR", "bg-red-700");
                }
            } catch (e) {
                console.error("Error in prosesAbsen:", e);
                showFeedback("❌", "ERROR", "QR TIDAK VALID", "bg-red-700");
            }
        }

        async function downloadZipLaporan() {
            const btn = document.getElementById('btn-zip-laporan');
            btn.innerText = "⏳ MEMPROSES..."; 
            btn.disabled = true;
            
            const zip = new JSZip();
            const today = new Date().toLocaleDateString('id-ID');
            
            for (const cls of DAFTAR_KELAS) {
                if (localDB[cls] && localDB[cls].length > 0) {
                    let sorted = [...localDB[cls]].sort((a,b) => parseInt(a.Absen)-parseInt(b.Absen));
                    
                    const dataExcel = sorted.map(s => {
                        const isHadir = s.Tanggal === today;
                        return {
                            "NO ABSEN": s.Absen || "-",
                            "NAMA LENGKAP": s.Nama ? s.Nama.toUpperCase() : "-",
                            "L/P": s.JK || "-",
                            "AGAMA": s.Agama || "-",
                            "KETERANGAN": isHadir ? `✓ ${s.Status || 'HADIR'}` : "-",
                            "WAKTU": isHadir ? (s.Jam || "-") : "-",
                            "TOTAL HADIR": s.KehadiranKe || 0
                        };
                    });
                    
                    if (dataExcel.length > 0) {
                        const ws = XLSX.utils.json_to_sheet(dataExcel);
                        const wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "LAPORAN");
                        const excelData = XLSX.write(wb, {bookType:'xlsx', type:'array'});
                        zip.file(`LAPORAN_${cls}_${today.replace(/\//g, '-')}.xlsx`, excelData);
                    }
                }
            }
            
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(content);
            link.download = `REKAP_PRESENSI_${today.replace(/\//g, '-')}.zip`; 
            link.click();
            
            btn.innerText = "📦 UNDUH ZIP"; 
            btn.disabled = false;
        }

        function renderLog() {
            const list = document.getElementById('log-list');
            const today = new Date().toLocaleDateString('id-ID');
            let allLogs = [];
            
            DAFTAR_KELAS.forEach(cls => { 
                if (localDB[cls]) {
                    localDB[cls].filter(d => d.Tanggal === today).forEach(d => allLogs.push(d));
                }
            });
            
            allLogs.sort((a,b) => {
                if (!a.Jam || a.Jam === "-") return 1;
                if (!b.Jam || b.Jam === "-") return -1;
                return b.Jam.localeCompare(a.Jam);
            });
            
            list.innerHTML = allLogs.length === 0 ? 
                `<p class="text-center text-gray-600 py-10 italic text-[10px] uppercase">Belum ada aktivitas presensi hari ini.</p>` :
                allLogs.slice(0, 50).map(d => 
                    `<div class="log-item glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-cyan-500 mb-2">
                        <div>
                            <b class="text-white text-xs uppercase">${d.Nama || '-'}</b>
                            <div class="text-[8px] text-gray-500">${d.Kelas || '-'} • ${d.JK || '-'} • ${d.Agama || '-'} • ${d.Status || '-'} • ${d.Jam || '-'}</div>
                        </div>
                        <div class="bg-gray-900 px-3 py-1 rounded-lg text-cyan-400 font-black text-[10px]">#${d.KehadiranKe || 0}</div>
                    </div>`).join('');
        }

        async function prosesBulkQR() {
            const input = document.getElementById('bulk-input').value.trim();
            const k = document.getElementById('select-kelas-admin').value;
            if(!input) return;
            
            const zip = new JSZip();
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            const lines = input.split('\n');
            for (let i = 0; i < lines.length; i++) {
                const p = lines[i].trim().split(' ');
                const agama = p.pop(); 
                const jk = p.pop(); 
                const absen = p.pop(); 
                const nama = p.join(' ');
                
                if(!nama || isNaN(absen)) continue;
                
                if (!localDB[k]) localDB[k] = [];
                
                if (!localDB[k].some(d => d.Absen === absen)) {
                    localDB[k].push({ 
                        Nama: nama, 
                        Kelas: k, 
                        Absen: absen, 
                        JK: jk, 
                        Agama: agama, 
                        Jam: "-", 
                        Tanggal: "-", 
                        Status: "-", 
                        KehadiranKe: 0 
                    });
                }
                
                const engine = document.getElementById('hidden-qr-engine');
                engine.innerHTML = `<div id="tmp-card" style="padding:40px; background:white; width:350px; text-align:center;">
                    <div id="tmp-img" style="display:flex; justify-content:center;"></div>
                    <div style="margin-top:20px;">
                        <b style="color:black; font-size:24px; text-transform:uppercase;">${nama}</b>
                        <p style="color:#666; font-weight:bold; font-size:12px;">${k} - ${jk} - ${agama} - ABSEN ${absen}</p>
                    </div>
                </div>`;
                
                new QRCode(document.getElementById("tmp-img"), { 
                    text: `${nama}|${k}|${absen}|${jk}|${agama}`, 
                    width: 250, 
                    height: 250 
                });
                
                await new Promise(r => setTimeout(r, 200));
                const canvas = await html2canvas(document.getElementById('tmp-card'), {scale: 2});
                const imgData = canvas.toDataURL("image/png").split(',')[1];
                zip.file(`QR_${absen}_${nama}.png`, imgData, {base64: true});
            }
            
            await syncToGithub(k);
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(content); 
            link.download = `QR_BERKAS_${k}.zip`; 
            link.click();
            
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function switchTab(t) { 
            if (t === 'scan' && !isGuruLoggedIn) { 
                document.getElementById('modal-login').classList.remove('hidden'); 
                document.getElementById('modal-login').classList.add('flex'); 
                return; 
            } 
            document.getElementById('tab-admin').classList.toggle('hidden', t !== 'admin'); 
            document.getElementById('tab-scan').classList.toggle('hidden', t !== 'scan'); 
            document.getElementById('btn-admin').classList.toggle('active-tab', t === 'admin'); 
            document.getElementById('btn-scan').classList.toggle('active-tab', t === 'scan'); 
            if(t !== 'scan') stopScanner(); 
        }

        function prosesLogin() { 
            if (document.getElementById('login-pass').value === GURU_PASS) { 
                isGuruLoggedIn = true; 
                localStorage.setItem('guruLogin', 'true'); 
                tutupLogin(); 
                updateUIAfterLogin(); 
                switchTab('scan');
                startAutoRefresh(); // Mulai auto refresh setelah login
                manualRefresh(); // Langsung refresh data
            } else alert("Kata sandi tidak valid."); 
        }

        function tutupLogin() { 
            document.getElementById('modal-login').classList.add('hidden'); 
            document.getElementById('modal-login').classList.remove('flex'); 
        }

        function updateUIAfterLogin() { 
            document.getElementById('bulk-area-guru').classList.remove('hidden'); 
            document.getElementById('btn-logout').classList.remove('hidden'); 
        }

        function prosesLogout() { 
            isGuruLoggedIn = false; 
            localStorage.removeItem('guruLogin'); 
            if (refreshInterval) clearInterval(refreshInterval);
            window.location.reload(); 
        }

        function downloadQR(n) { 
            html2canvas(document.getElementById('qrd'), {scale: 3}).then(c => { 
                let link = document.createElement('a'); 
                link.href = c.toDataURL(); 
                link.download = `QR_${n}.png`; 
                link.click(); 
            }); 
        }

        function startScanner() {
            document.getElementById('btn-start-cam').classList.add('hidden');
            document.getElementById('btn-stop-cam').classList.remove('hidden');
            
            const reader = document.getElementById('reader');
            reader.innerHTML = ''; // Clear previous scanner
            
            html5QrScanner = new Html5Qrcode("reader");
            
            const qrbox = { width: 250, height: 250 };
            
            html5QrScanner.start(
                { facingMode: "environment" }, 
                { 
                    fps: 10, 
                    qrbox: qrbox,
                    aspectRatio: 1.0
                }, 
                (decodedText) => {
                    // Success callback
                    console.log("QR Scanned:", decodedText);
                    prosesAbsen(decodedText);
                },
                (errorMessage) => {
                    // Error callback - ignore scanning errors
                    // console.log("Scan error:", errorMessage);
                }
            ).catch((err) => {
                console.error("Failed to start scanner:", err);
                alert("Gagal mengakses kamera. Pastikan izin kamera diberikan.");
                stopScanner();
            });
        }

        async function stopScanner() { 
            if (html5QrScanner && html5QrScanner.isScanning) {
                await html5QrScanner.stop();
                html5QrScanner.clear();
            }
            document.getElementById('btn-start-cam').classList.remove('hidden'); 
            document.getElementById('btn-stop-cam').classList.add('hidden'); 
        }

        function showFeedback(icon, name, message, bgClass) {
            const fb = document.getElementById('scan-feedback');
            document.getElementById('check-icons').innerText = icon;
            document.getElementById('scanned-name').innerText = name || '-';
            document.getElementById('scanned-info').innerText = message;
            document.getElementById('feedback-content').className = `text-center text-white p-10 rounded-[3rem] shadow-2xl ${bgClass} border border-white/20`;
            fb.classList.remove('hidden');
            setTimeout(() => fb.classList.add('hidden'), 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
